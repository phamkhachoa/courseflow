version: 1
registry_scope: group-enterprise-data-foundation
target_maturity:
  P0: L3
  P1: L2
  P2: L1
reference_models:
  - id: apache-iceberg
    name: Apache Iceberg table specification
    url: https://iceberg.apache.org/spec/
    adoptedPattern: Open table format with snapshots, manifests, schema evolution and partition evolution.
  - id: openlineage
    name: OpenLineage object model
    url: https://openlineage.io/docs/spec/object-model/
    adoptedPattern: Runtime lineage modeled as jobs, runs and datasets with extensible facets.
  - id: datahub
    name: DataHub metadata platform
    url: https://docs.datahub.com/docs/features
    adoptedPattern: Discovery, lineage, profiling, governance, data contracts and collaborative metadata.
  - id: dagster-assets
    name: Dagster software-defined assets
    url: https://dagster.io/glossary/software-defined-assets
    adoptedPattern: Orchestration should model produced assets, dependencies and materialization state.
  - id: kafka-connect
    name: Apache Kafka Connect
    url: https://kafka.apache.org/documentation/
    adoptedPattern: Reusable source and sink connector model for enterprise event movement.
  - id: dbt-semantic-layer
    name: dbt Semantic Layer
    url: https://docs.getdbt.com/docs/use-dbt-semantic-layer/dbt-sl
    adoptedPattern: Centralized, governed metric definitions for consistent downstream consumption.
  - id: feast-feature-store
    name: Feast feature store
    url: https://docs.feast.dev/
    adoptedPattern: Production ML feature definition, validation and online/offline serving.
  - id: great-expectations
    name: Great Expectations checkpoints
    url: https://docs.greatexpectations.io/docs/reference/api/Checkpoint_class
    adoptedPattern: Production data validation checkpoints with validation results and actions.

capabilities:
  - id: source-onboarding
    name: Product Source Onboarding
    category: ingestion
    phase: P0
    owner: data-platform-team
    status: validated_as_code
    currentLevel: L1
    targetLevel: L3
    productAgnostic: true
    description: Register product sources, ownership, canonical topics, bridge mode, privacy and production evidence requirements.
    enterpriseOutcome: Every product joins the foundation through the same governed source path.
    platformScope:
      - product onboarding
      - source inventory
      - canonical topic mapping
      - source readiness
    referenceModels:
      - kafka-connect
      - datahub
    domainBindings:
      - finance
      - customer
      - ml-ai
      - enterprise-reporting
    useCaseBindings:
      - finance-benefit-reconciliation
      - ml-feature-governance
      - customer-account-health
    productionGates:
      - source_readiness_report_passed
      - schema_subject_registered
      - replay_proof_attached
      - change_control_approved
    requiredEvidence:
      - source registry entry
      - product onboarding metadata
      - source-to-Bronze readiness report
      - change-control evidence
    evidenceArtifacts:
      - path: products/README.md
        type: product_onboarding_standard
        purpose: Defines the repeatable product onboarding boundary.
        requiredForCurrentLevel: true
      - path: platform/ingestion/source-registry.yaml
        type: source_registry
        purpose: Registers source systems, canonical topics and production evidence requirements.
        requiredForCurrentLevel: true
      - path: src/enterprise_df/source_registry.py
        type: validator
        purpose: Emits and validates source readiness evidence.
        requiredForCurrentLevel: true
    gaps:
      - Production connector runtime is not deployed as live infrastructure.
      - Several pilot sources still depend on planned bridges or normalizers.
    nextMilestones:
      - Deploy staging source connector and registry integration for one non-LMS product.
      - Require source readiness evidence before enabling production Bronze ingestion.

  - id: event-cdc-ingestion-runtime
    name: Event and CDC Ingestion Runtime
    category: ingestion
    phase: P0
    owner: data-platform-team
    status: documented
    currentLevel: L0
    targetLevel: L3
    productAgnostic: true
    description: Live Kafka, outbox, CDC and batch connector runtime for Bronze source movement.
    enterpriseOutcome: Product data moves into the foundation reliably without direct OLTP reads by BI or ML.
    platformScope:
      - Kafka topics
      - outbox relay
      - Debezium CDC
      - connector operations
    referenceModels:
      - kafka-connect
      - openlineage
    domainBindings:
      - finance
      - customer
      - product-analytics
      - workforce
    useCaseBindings:
      - finance-benefit-reconciliation
      - product-usage-funnel
      - workforce-training-compliance
    productionGates:
      - ingestion_lag_slo_green
      - dlt_policy_enabled
      - backpressure_test_passed
      - offset_ledger_recorded
    requiredEvidence:
      - connector deployment manifest
      - lag metrics
      - DLT operations evidence
      - source offset ledger
    evidenceArtifacts:
      - path: platform/environments/prod/manifest.yaml
        type: environment_manifest
        purpose: Declares required production runtime services and current readiness.
        requiredForCurrentLevel: true
      - path: platform/ingestion/local-bronze-ingestion.md
        type: local_preflight
        purpose: Documents local ingestion flow before live runtime exists.
        requiredForCurrentLevel: true
    gaps:
      - Production manifest declares topology but not live IaC or deployed connector evidence.
      - Runtime DLT, backpressure and consumer lag controls are not yet active.
    nextMilestones:
      - Add live staging connector deployment evidence.
      - Bind connector health metrics into release gates.

  - id: schema-registry-compatibility
    name: Schema Registry and Compatibility
    category: governance
    phase: P0
    owner: data-platform-team
    status: validated_as_code
    currentLevel: L1
    targetLevel: L3
    productAgnostic: true
    description: Enforce event schema subjects, compatibility mode and producer or normalizer compliance.
    enterpriseOutcome: Source changes cannot silently break consumers or Bronze ingestion.
    platformScope:
      - JSON schema contracts
      - subject naming
      - backward-transitive compatibility
      - release evidence
    referenceModels:
      - kafka-connect
      - datahub
    domainBindings:
      - finance
      - recommendation
      - product-analytics
      - compliance
    useCaseBindings:
      - finance-benefit-reconciliation
      - ml-feature-governance
      - product-usage-funnel
    productionGates:
      - schema_registry_report_passed
      - producer_schema_id_present
      - backward_transitive_ci_passed
    requiredEvidence:
      - topic contract
      - payload schema
      - compatibility report
      - external attestation for production
    evidenceArtifacts:
      - path: platform/ingestion/schema-registry.md
        type: standard
        purpose: Defines subject naming and compatibility policy.
        requiredForCurrentLevel: true
      - path: src/enterprise_df/schema_registry.py
        type: local_validator
        purpose: Produces local schema registry compatibility report.
        requiredForCurrentLevel: true
      - path: contracts/event-envelope.v1.schema.json
        type: schema
        purpose: Shared enterprise event envelope.
        requiredForCurrentLevel: true
    gaps:
      - External registry publication and producer-side enforcement are not wired.
      - Production reports still rely on future external attestation workflow.
    nextMilestones:
      - Integrate Apicurio or Confluent registry into CI.
      - Require registry subject id in source readiness and release evidence.

  - id: bronze-lakehouse-evidence
    name: Bronze Lakehouse Evidence
    category: lakehouse
    phase: P0
    owner: data-platform-team
    status: validated_as_code
    currentLevel: L1
    targetLevel: L3
    productAgnostic: true
    description: Immutable Bronze records with source-position idempotency, hashes and offset ledger binding.
    enterpriseOutcome: Every landed record is replayable, auditable and tied to source positions.
    platformScope:
      - Bronze landing
      - source offset ledger
      - replay idempotency
      - quarantine evidence
    referenceModels:
      - apache-iceberg
      - openlineage
    domainBindings:
      - finance
      - recommendation
      - product-analytics
      - compliance
    useCaseBindings:
      - finance-benefit-reconciliation
      - ml-feature-governance
    productionGates:
      - source_offset_ledger_passed
      - quarantine_rows_within_policy
      - iceberg_commit_evidence_present
    requiredEvidence:
      - Bronze ingestion manifest
      - source offset ledger
      - source record hash bindings
      - quarantine summary
    evidenceArtifacts:
      - path: platform/ingestion/bronze-landing.md
        type: standard
        purpose: Defines Bronze landing and PII handling rules.
        requiredForCurrentLevel: true
      - path: platform/ingestion/source-offset-hash-idempotency.md
        type: standard
        purpose: Defines source offset and hash idempotency policy.
        requiredForCurrentLevel: true
      - path: src/enterprise_df/offset_ledger.py
        type: evidence_cli
        purpose: Emits source offset ledger evidence.
        requiredForCurrentLevel: true
    gaps:
      - Iceberg sink runtime is not yet deployed.
      - Append-only enforcement and compaction are documented but not operational.
    nextMilestones:
      - Persist offset ledger to immutable evidence storage.
      - Connect live Bronze commits to Iceberg metadata snapshots.

  - id: silver-gold-publication
    name: Silver and Gold Publication
    category: lakehouse
    phase: P0
    owner: data-platform-team
    status: validated_as_code
    currentLevel: L1
    targetLevel: L3
    productAgnostic: true
    description: Conformed Silver and business-ready Gold products with snapshot, lineage, quality and active pointer evidence.
    enterpriseOutcome: BI, ML and reverse ETL consume only trusted data product snapshots.
    platformScope:
      - Silver conformance
      - Gold marts
      - release promotion
      - active pointer
    referenceModels:
      - apache-iceberg
      - dagster-assets
    domainBindings:
      - finance
      - enterprise-reporting
      - ml-ai
      - customer
    useCaseBindings:
      - finance-benefit-reconciliation
      - enterprise-kpi-scorecard
      - data-product-control-tower
      - ml-feature-governance
    productionGates:
      - lakehouse_snapshot_evidence_passed
      - release_promotion_approved
      - active_pointer_updated
      - rollback_target_present
    requiredEvidence:
      - pipeline manifest
      - lakehouse snapshot evidence
      - release evidence
      - activation manifest
    evidenceArtifacts:
      - path: src/enterprise_df/snapshot_evidence.py
        type: evidence_cli
        purpose: Binds Silver and Gold outputs to Iceberg snapshot metadata.
        requiredForCurrentLevel: true
      - path: src/enterprise_df/promotion.py
        type: activation_cli
        purpose: Writes promotion and activation manifests with active pointer state.
        requiredForCurrentLevel: true
      - path: platform/lakehouse/iceberg-table-standards.md
        type: standard
        purpose: Defines Iceberg table, partition and retention standards.
        requiredForCurrentLevel: true
    gaps:
      - Data product contracts are still draft, not certified active.
      - Live table commits, compaction and rollback operations are not enforced by runtime.
    nextMilestones:
      - Add contract lifecycle from draft to certified to deprecated.
      - Require active pointer drift checks for production activations.

  - id: catalog-lineage-control-plane
    name: Catalog and Lineage Control Plane
    category: catalog_lineage
    phase: P0
    owner: data-platform-team
    status: validated_as_code
    currentLevel: L1
    targetLevel: L3
    productAgnostic: true
    description: Publish metadata, lineage, ownership and runtime evidence into the enterprise catalog.
    enterpriseOutcome: Users can discover trusted data and understand upstream/downstream impact.
    platformScope:
      - catalog bundle
      - OpenLineage export
      - publish manifest
      - owner and steward metadata
    referenceModels:
      - datahub
      - openlineage
    domainBindings:
      - finance
      - enterprise-reporting
      - compliance
      - ml-ai
    useCaseBindings:
      - finance-benefit-reconciliation
      - enterprise-kpi-scorecard
      - ml-feature-governance
    productionGates:
      - catalog_publish_manifest_passed
      - lineage_edges_complete
      - owner_steward_visible
    requiredEvidence:
      - catalog bundle
      - OpenLineage events
      - catalog publish manifest
      - change-control evidence
    evidenceArtifacts:
      - path: src/enterprise_df/catalog.py
        type: catalog_export
        purpose: Exports catalog and lineage metadata from contracts and manifests.
        requiredForCurrentLevel: true
      - path: src/enterprise_df/openlineage.py
        type: lineage_export
        purpose: Exports OpenLineage-style runtime events.
        requiredForCurrentLevel: true
      - path: src/enterprise_df/catalog_publish.py
        type: publish_manifest
        purpose: Produces auditable DataHub/OpenMetadata publish manifest.
        requiredForCurrentLevel: true
      - path: src/enterprise_df/control_tower.py
        type: data_product_control_tower_report
        purpose: Aggregates catalog, quality, access, lineage, release and capability evidence into a production-readiness decision report.
        requiredForCurrentLevel: true
      - path: platform/control-tower/README.md
        type: operating_model
        purpose: Defines the Data Product Control Tower operating view, personas, gates and escalation model.
        requiredForCurrentLevel: true
    gaps:
      - Catalog publish is a manifest, not a live DataHub/OpenMetadata integration.
      - Runtime orchestrator lineage is simulated from local artifacts.
    nextMilestones:
      - Push catalog bundle to DataHub or OpenMetadata in staging.
      - Collect OpenLineage events from actual orchestration jobs.

  - id: quality-slo-release-gates
    name: Quality, SLO and Release Gates
    category: quality
    phase: P0
    owner: data-platform-team
    status: validated_as_code
    currentLevel: L1
    targetLevel: L3
    productAgnostic: true
    description: Data quality profiles, freshness, ingestion lag, evidence profile and release gate decisions.
    enterpriseOutcome: Bad, stale or unevidenced data cannot become active enterprise data.
    platformScope:
      - quality profiles
      - freshness SLO
      - release evidence profiles
      - operations runbooks
    referenceModels:
      - great-expectations
      - dagster-assets
    domainBindings:
      - finance
      - ml-ai
      - enterprise-reporting
      - risk-compliance
    useCaseBindings:
      - finance-benefit-reconciliation
      - ml-feature-governance
      - risk-control-exception-monitoring
    productionGates:
      - quality_profile_passed
      - ingestion_lag_slo_green
      - freshness_slo_green
      - release_evidence_profile_passed
    requiredEvidence:
      - quality profile
      - release evidence profile
      - release evidence report
      - SLO runbook
    evidenceArtifacts:
      - path: platform/quality/profiles.yaml
        type: quality_profile_registry
        purpose: Defines reusable quality gates by use case and output.
        requiredForCurrentLevel: true
      - path: platform/observability/production-slo-release-gates.md
        type: release_gate_spec
        purpose: Defines P0 SLO and release gate policy.
        requiredForCurrentLevel: true
      - path: src/enterprise_df/release.py
        type: release_gate_engine
        purpose: Evaluates release evidence gates.
        requiredForCurrentLevel: true
    gaps:
      - Great Expectations or Soda runtime artifacts are not yet emitted by production jobs.
      - Alerting and incident burn-rate policy are documented but not live.
    nextMilestones:
      - Integrate external quality runtime and attach validation result artifacts.
      - Emit production SLO metrics from real pipelines.

  - id: access-privacy-enforcement
    name: Access, Privacy and Retention Enforcement
    category: access_privacy
    phase: P0
    owner: data-platform-security
    status: validated_as_code
    currentLevel: L1
    targetLevel: L3
    productAgnostic: true
    description: Row-level access, masking, tokenization, audit, retention, erasure and legal-hold evidence.
    enterpriseOutcome: Sensitive enterprise data remains isolated, auditable and compliant across products.
    platformScope:
      - access policies
      - access grants
      - retention policies
      - external attestations
    referenceModels:
      - datahub
      - dbt-semantic-layer
    domainBindings:
      - compliance
      - finance
      - customer
      - workforce
    useCaseBindings:
      - finance-benefit-reconciliation
      - enterprise-kpi-scorecard
      - customer-account-health
      - workforce-training-compliance
    productionGates:
      - access_policy_report_passed
      - access_grant_evidence_passed
      - retention_erasure_evidence_passed
      - audit_identity_bound
    requiredEvidence:
      - access policy registry
      - access grant registry
      - retention policy registry
      - signed external attestations
    evidenceArtifacts:
      - path: contracts/policies/access-policies.yaml
        type: policy_registry
        purpose: Defines access policy controls.
        requiredForCurrentLevel: true
      - path: governance/access-grants.yaml
        type: grant_registry
        purpose: Defines approved data access grants.
        requiredForCurrentLevel: true
      - path: contracts/policies/retention-policies.yaml
        type: retention_registry
        purpose: Defines retention and erasure controls.
        requiredForCurrentLevel: true
    gaps:
      - Query-engine RLS and masking enforcement are not deployed.
      - Access audit logs are generated as evidence, not collected from live query runtime.
    nextMilestones:
      - Bind Trino or Dremio policies to access-control decisions.
      - Capture runtime access decisions from the serving plane.

  - id: semantic-metric-serving
    name: Semantic Metrics and Serving
    category: semantic_serving
    phase: P0
    owner: enterprise-reporting-team
    status: validated_as_code
    currentLevel: L1
    targetLevel: L3
    productAgnostic: true
    description: Certified metrics and generated Trino or Dremio semantic views over approved Gold data products.
    enterpriseOutcome: Executives and product teams use one metric definition across BI and data apps.
    platformScope:
      - semantic metric registry
      - certified Gold binding
      - view generation
      - BI serving
    referenceModels:
      - dbt-semantic-layer
      - datahub
    domainBindings:
      - enterprise-reporting
      - finance
      - product-analytics
      - customer
    useCaseBindings:
      - enterprise-kpi-scorecard
      - finance-benefit-reconciliation
      - product-usage-funnel
    productionGates:
      - metric_owner_approved
      - source_gold_certified
      - semantic_view_manifest_passed
      - metric_lineage_registered
    requiredEvidence:
      - semantic metric registry
      - semantic view manifest
      - access policy evidence
      - catalog lineage
    evidenceArtifacts:
      - path: platform/serving/semantic-metrics.yaml
        type: metric_registry
        purpose: Defines governed semantic metrics.
        requiredForCurrentLevel: true
      - path: src/enterprise_df/semantic_views.py
