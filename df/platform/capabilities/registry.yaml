  - id: backfill-change-governance
    name: Backfill, Replay and Change Governance
    category: governance
    phase: P0
    owner: data-platform-team
    status: validated_as_code
    currentLevel: L1
    targetLevel: L3
    productAgnostic: true
    description: Govern production-impacting backfill, replay, correction, release and rollback workflows.
    enterpriseOutcome: Historical rebuilds cannot silently corrupt finance, BI, ML or compliance outputs.
    platformScope:
      - change requests
      - backfill readiness
      - active pointer drift guard
      - rollback evidence
    referenceModels:
      - apache-iceberg
      - openlineage
    domainBindings:
      - finance
      - compliance
      - enterprise-reporting
      - ml-ai
    useCaseBindings:
      - finance-benefit-reconciliation
      - enterprise-kpi-scorecard
      - ml-feature-governance
    productionGates:
      - change_control_approved
      - backfill_readiness_passed
      - active_pointer_matches_baseline
      - rollback_target_verified
    requiredEvidence:
      - change-control evidence
      - backfill readiness report
      - data diff report
      - active pointer evidence
    evidenceArtifacts:
      - path: governance/change-requests.yaml
        type: change_registry
        purpose: Registers production-impacting data platform changes.
        requiredForCurrentLevel: true
      - path: governance/backfill-requests.yaml
        type: backfill_registry
        purpose: Registers bounded backfill and replay requests.
        requiredForCurrentLevel: true
      - path: src/enterprise_df/backfill.py
        type: readiness_cli
        purpose: Emits backfill readiness report with active pointer drift guard.
        requiredForCurrentLevel: true
    gaps:
      - Production workflow is not integrated with a ticketing or approval system.
      - Concurrent lock enforcement is represented as evidence, not live locking.
    nextMilestones:
      - Bind change requests to enterprise ITSM workflow.
      - Enforce backfill locks in orchestration runtime.

  - id: platform-runtime-iac
    name: Platform Runtime and IaC
    category: orchestration
    phase: P0
    owner: platform-engineering
    status: validated_as_code
    currentLevel: L1
    targetLevel: L3
    productAgnostic: true
    description: Deploy highly available data plane services with service identity, secrets, network, HA and DR controls.
    enterpriseOutcome: The data foundation runs as reliable enterprise infrastructure, not only local tooling.
    platformScope:
      - environment manifests
      - service identity
      - secrets
      - HA and DR
      - orchestration runtime
    referenceModels:
      - dagster-assets
      - kafka-connect
    domainBindings:
      - compliance
      - finance
      - enterprise-reporting
      - product-analytics
    useCaseBindings:
      - finance-benefit-reconciliation
      - enterprise-kpi-scorecard
      - product-usage-funnel
    productionGates:
      - prod_environment_manifest_approved
      - runtime_iac_deployed
      - secrets_managed
      - dr_test_passed
    requiredEvidence:
      - environment manifest
      - runtime topology
      - IaC module registry
      - IaC plan and apply evidence
      - service identity audit
      - DR exercise report
    evidenceArtifacts:
      - path: platform/environments/prod/manifest.yaml
        type: environment_manifest
        purpose: Declares production runtime expectations and current readiness.
        requiredForCurrentLevel: true
      - path: platform/runtime/topology.yaml
        type: runtime_topology
        purpose: Declares product-agnostic runtime service topology, environment bindings, Dremio/TiDB phase gates and required controls.
        requiredForCurrentLevel: true
      - path: platform/runtime/iac-modules.yaml
        type: iac_module_registry
        purpose: Maps runtime services to local/staging/prod IaC profiles and module control requirements.
        requiredForCurrentLevel: true
      - path: platform/runtime/evidence/README.md
        type: runtime_evidence_contract
        purpose: Defines machine-readable plan, apply, drift, backup, DR and health evidence required for production-like runtime readiness.
        requiredForCurrentLevel: true
      - path: src/enterprise_df/runtime.py
        type: validator
        purpose: Validates runtime topology/IaC metadata, verifies machine-readable evidence and emits runtime readiness reports without requiring cloud access.
        requiredForCurrentLevel: true
      - path: platform/orchestration/README.md
        type: orchestration_standard
        purpose: Defines orchestration ownership and runner model.
        requiredForCurrentLevel: true
    gaps:
      - IaC profiles are skeletons and have not been applied to staging or production.
      - HA, backup and disaster recovery tests are represented as required readiness gates, not live execution evidence.
    nextMilestones:
      - Replace skeleton IaC profiles with provider-backed OpenTofu/Terraform modules for P0 runtime services.
      - Attach staging plan/apply, drift, backup and DR evidence to runtime readiness reports.
      - Enforce production runtime gates through CI/CD and release promotion workflow.

  - id: cost-usage-governance
