  - id: ml-feature-store-governance
    name: ML Feature Store Governance
    category: ml_ai
    phase: P1
    owner: ml-platform-team
    status: documented
    currentLevel: L0
    targetLevel: L2
    productAgnostic: true
    description: Govern feature datasets, point-in-time training snapshots, offline/online parity and drift or freshness gates.
    enterpriseOutcome: ML teams can reuse trustworthy features without reading product OLTP databases.
    platformScope:
      - feature datasets
      - model lineage
      - feature freshness
      - drift monitoring
    referenceModels:
      - feast-feature-store
      - openlineage
    domainBindings:
      - ml-ai
      - recommendation
      - risk-compliance
      - customer
    useCaseBindings:
      - ml-feature-governance
      - customer-account-health
      - risk-control-exception-monitoring
    productionGates:
      - point_in_time_correctness_passed
      - offline_online_parity_checked
      - feature_freshness_slo_green
      - model_lineage_registered
    requiredEvidence:
      - feature registry
      - training snapshot evidence
      - online materialization evidence
      - drift report
    evidenceArtifacts:
      - path: domains/ml-ai/README.md
        type: domain_plan
        purpose: Defines ML and AI data domain direction.
        requiredForCurrentLevel: true
      - path: use-cases/registry.yaml
        type: use_case_registry
        purpose: Registers ML feature governance as a platform use case.
        requiredForCurrentLevel: true
    gaps:
