version: 1
registryScope: group-enterprise-data-platform
owner: enterprise-reporting
description: >
  Governed semantic metric registry for certified and provisional enterprise KPIs. Metrics must
  point to approved Gold data products or approved semantic aggregates, declare owners and expose
  source columns so BI, Dremio, Trino and executive scorecards use the same definitions.
metrics:
  - metricId: revenue_net
    name: Net Revenue
    domain: finance
    owner: finance-analytics-po
    status: provisional
    source:
      dataProduct: gold.finance_revenue_daily
      timeColumn: report_date
    grain:
      - report_date
      - accounting_date
      - product_id
      - source_product_id
      - org_id
      - product_line
      - currency
    dimensions:
      - product_id
      - source_product_id
      - org_id
      - product_line
      - currency
    calculation:
      type: aggregate_sql
      expressionSql: SUM(net_revenue_cents) / 100.0
      referencedColumns:
        - net_revenue_cents
      unit: currency_major
    filters:
      - column: quality_passed
        operator: equals
        values: ["true"]
    freshnessSloMinutes: 240
    useCases:
      - enterprise-kpi-scorecard
      - enterprise-revenue-intelligence
    consumers:
      - DomainDataOwner
      - ApprovedBIConsumer
      - ExecutiveConsumer
    serving:
      trinoView: semantic.enterprise_metrics.revenue_net
      dremioVirtualDataset: semantic.enterprise_metrics.revenue_net
      materialization: virtual

