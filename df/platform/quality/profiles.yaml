        - report_date
        - metric_id
        - metric_domain
        - metric_value
        - metric_unit
        - threshold_status
        - source_data_product
        - source_metric_snapshot_hash
        - semantic_registry_hash
      gold.executive_scorecard_daily:
        - org_id
        - report_date
        - scorecard_id
        - section
        - metric_id
        - actual_value
        - status
        - certification_status
        - source_data_product
        - semantic_registry_hash
