      primaryOutputs:
        - gold.data_product_inventory
        - gold.contract_compliance_daily
        - gold.quality_sla_daily
        - gold.lineage_coverage_daily
    thresholds:
      maxQuarantineRows: 0
      minPrimaryOutputRows: 1
      requireUpstreamQuality: true
      requireAllOutputLayersQuality: true
      requireContentHash: true
    requiredOutputDataProducts:
