      - gold.contract_compliance_daily
      - gold.quality_sla_daily
      - gold.lineage_coverage_daily
    requiredColumns:
      gold.data_product_inventory:
        - org_id
        - report_date
        - data_product_name
        - owner_team
        - readiness_state
      gold.contract_compliance_daily:
        - org_id
        - report_date
        - data_product_name
        - contract_valid
        - failed_gate_count
      gold.quality_sla_daily:
        - org_id
        - report_date
        - data_product_name
        - sla_status
        - release_evidence_passed
      gold.lineage_coverage_daily:
