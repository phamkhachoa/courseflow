version: 1
registry_scope: group-enterprise-data-platform
profiles:
  - id: p0-finance-benefit-reconciliation
    name: P0 Finance Benefit Reconciliation
    owner: finance-analytics-po
    severity: P0
    description: Production release quality profile for finance benefit reconciliation Gold evidence.
    appliesTo:
      domains:
        - finance
      useCases:
        - finance-benefit-reconciliation
      primaryOutputs:
        - gold.finance_benefit_reconciliation
    thresholds:
      maxQuarantineRows: 0
      minPrimaryOutputRows: 1
      requireUpstreamQuality: true
      requireAllOutputLayersQuality: true
      requireContentHash: true
    requiredOutputDataProducts:
      - silver.finance_benefit_transactions
      - gold.finance_benefit_reconciliation
    requiredColumns:
      gold.finance_benefit_reconciliation:
        - org_id
        - dataset_snapshot_id
        - reconciliation_key
        - reconciliation_status
        - reason_code
        - source_record_hash_sha256

  - id: p0-enterprise-revenue-intelligence
    name: P0 Enterprise Revenue Intelligence
    owner: finance-analytics-po
