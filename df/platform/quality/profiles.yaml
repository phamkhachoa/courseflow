    thresholds:
      maxQuarantineRows: 0
      minPrimaryOutputRows: 1
      requireUpstreamQuality: true
      requireAllOutputLayersQuality: true
      requireContentHash: true
    requiredOutputDataProducts:
      - silver.finance_billing_transactions
      - gold.finance_revenue_daily
    requiredColumns:
      gold.finance_revenue_daily:
        - org_id
        - dataset_snapshot_id
        - report_date
        - accounting_date
        - revenue_daily_id
        - source_product_id
        - currency
        - net_revenue_cents
        - recognized_revenue_cents
        - revenue_status
        - source_record_hash_sha256

