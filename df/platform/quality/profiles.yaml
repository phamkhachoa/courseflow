        - data_product_name
        - static_lineage_present
        - runtime_lineage_present

  - id: p0-enterprise-kpi-scorecard
    name: P0 Enterprise KPI Scorecard
    owner: enterprise-reporting-po
    severity: P0
    description: Production release quality profile for non-PII executive KPI and scorecard Gold outputs materialized from semantic metrics.
    appliesTo:
      domains:
        - enterprise-reporting
      useCases:
        - enterprise-kpi-scorecard
