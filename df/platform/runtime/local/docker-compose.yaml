name: enterprise-df-local

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.8
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "19092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q Healthy"]
      interval: 10s
      timeout: 5s
      retries: 12

  schema-registry:
    image: apicurio/apicurio-registry-mem:2.6.5.Final
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: enterprise_df_local
      MINIO_ROOT_PASSWORD: enterprise_df_local_only_change_me
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - df-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  trino:
    image: trinodb/trino:454
    ports:
      - "18081:8080"
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/v1/info || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "19090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  df-runner:
    image: python:3.11-slim
    command: ["sleep", "infinity"]
    working_dir: /workspace/df
    volumes:
      - ../../:/workspace/df:ro
    depends_on:
      redpanda:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  df-minio-data:
