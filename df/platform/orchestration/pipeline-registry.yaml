version: 1
registryScope: group-enterprise-data-platform
owner: data-platform-team
description: >
  Declarative registry for runnable enterprise data platform pipelines. Active entries must match
  the Python runner implementation so orchestration, release evidence and use-case metadata do not
  drift.
runners:
  - runnerId: billing.revenue_daily.from_approved_bronze.v1
    name: Billing revenue daily from approved Bronze
    description: Build Silver finance billing transactions and Gold daily revenue aggregates from approved Bronze billing events.
    implementationStatus: active
    product: billing-platform
    domain: finance
    useCases:
      - enterprise-revenue-intelligence
    inputKind: approved_bronze_jsonl
    inputTopics:
      - finance.billing_transaction.settled.v1
    inputDataProducts:
      - bronze.events_billing_transaction_settled
    outputDataProducts:
      - silver.finance_billing_transactions
      - gold.finance_revenue_daily
    primaryOutput: gold.finance_revenue_daily
    evidenceCapabilities:
      - schema_registry
      - access_policy
      - catalog_lineage
      - release_gates
    requiredOptions: []
    optionalOptions:
      - upstream_manifest_path
      - snapshot_id
      - built_at
    execution:
      module: enterprise_df.pipelines.billing
      class: BillingRevenueDailyRunner

  - runnerId: control_tower.materialize_gold.from_report.v1
    name: Control Tower Gold materialization from report
    description: Materialize Data Product Control Tower report into four operational Gold datasets.
    implementationStatus: active
    product: enterprise-data-foundation
    domain: enterprise-reporting
    useCases:
      - data-product-control-tower
    inputKind: data_product_snapshot
    outputDataProducts:
      - gold.data_product_inventory
      - gold.contract_compliance_daily
      - gold.quality_sla_daily
      - gold.lineage_coverage_daily
    primaryOutput: gold.data_product_inventory
    evidenceCapabilities:
      - catalog_lineage
      - quality_slo
      - access_privacy
      - release_gates
      - capability_maturity
    requiredOptions: []
    optionalOptions:
      - snapshot_id
      - built_at
    execution:
      module: enterprise_df.pipelines.control_tower
      class: ControlTowerGoldMaterializationRunner

  - runnerId: enterprise_reporting.executive_scorecard.from_semantic_snapshot.v1
    name: Executive scorecard from semantic metric snapshot
    description: Materialize governed non-PII executive KPI and scorecard Gold outputs from a certified semantic metric snapshot.
    implementationStatus: active
    product: enterprise-data-foundation
    domain: enterprise-reporting
    useCases:
      - enterprise-kpi-scorecard
    inputKind: semantic_metric_snapshot
    inputDataProducts:
      - gold.finance_revenue_daily
      - gold.finance_benefit_reconciliation
      - gold.customer_360_profile
      - gold.access_risk_daily
      - gold.support_sla_daily
      - gold.recsys_interactions
      - gold.data_product_inventory
      - gold.contract_compliance_daily
      - gold.quality_sla_daily
      - gold.lineage_coverage_daily
    outputDataProducts:
      - gold.enterprise_kpi_daily
      - gold.executive_scorecard_daily
    primaryOutput: gold.executive_scorecard_daily
    evidenceCapabilities:
      - semantic_metrics
      - catalog_lineage
      - quality_slo
      - access_privacy
      - release_gates
    requiredOptions: []
    optionalOptions:
      - snapshot_id
      - built_at
    execution:
      module: enterprise_df.pipelines.scorecard
      class: ExecutiveScorecardRunner

  - runnerId: customer.account_health.from_approved_bronze.v1
    name: Customer account health from approved Bronze
    description: Build Silver customer identity links and Gold Customer 360 account-health profiles from approved Bronze CRM account events.
    implementationStatus: active
    product: crm-sales
    domain: customer
    useCases:
      - customer-account-health
    inputKind: approved_bronze_jsonl
    inputTopics:
      - customer.account.changed.v1
    inputDataProducts:
      - bronze.events_customer_account_changed
    outputDataProducts:
      - silver.customer_identity_link
      - gold.customer_360_profile
    primaryOutput: gold.customer_360_profile
    evidenceCapabilities:
      - schema_registry
      - access_policy
      - catalog_lineage
      - release_gates
    requiredOptions: []
    optionalOptions:
      - upstream_manifest_path
      - snapshot_id
      - built_at
    execution:
      module: enterprise_df.pipelines.customer
      class: CustomerAccountHealthRunner

  - runnerId: finance.benefit_reconciliation.from_approved_bronze.v1
    name: Finance benefit reconciliation from approved Bronze
    description: Build Silver benefit transactions and Gold finance reconciliation evidence from approved Bronze.
    implementationStatus: active
    product: enterprise-commerce
    domain: finance
    useCases:
      - finance-benefit-reconciliation
    inputKind: approved_bronze_jsonl
    inputTopics:
      - finance.benefit_settled.v1
    inputDataProducts:
      - bronze.events_benefit_settled
    outputDataProducts:
      - silver.finance_benefit_transactions
      - gold.finance_benefit_reconciliation
    primaryOutput: gold.finance_benefit_reconciliation
    evidenceCapabilities:
      - schema_registry
      - access_policy
      - catalog_lineage
      - release_gates
    requiredOptions: []
    optionalOptions:
      - upstream_manifest_path
      - snapshot_id
      - built_at
    execution:
      module: enterprise_df.pipelines.finance
      class: FinanceBenefitReconciliationRunner

  - runnerId: identity.access_governance.from_approved_bronze.v1
    name: Identity access governance from approved Bronze
    description: Build Silver identity subject state and Gold access-risk evidence from approved Bronze identity events.
    implementationStatus: active
    product: identity-platform
    domain: compliance
    useCases:
      - identity-access-governance
    inputKind: approved_bronze_jsonl
    inputTopics:
      - compliance.identity_subject.changed.v1
    inputDataProducts:
      - bronze.events_identity_subject_changed
    outputDataProducts:
      - silver.identity_subject
      - gold.access_risk_daily
    primaryOutput: gold.access_risk_daily
    evidenceCapabilities:
      - schema_registry
      - access_policy
      - catalog_lineage
      - release_gates
    requiredOptions: []
    optionalOptions:
      - upstream_manifest_path
      - snapshot_id
      - built_at
    execution:
      module: enterprise_df.pipelines.identity_access
      class: IdentityAccessGovernanceRunner

  - runnerId: recommendation.from_approved_bronze.v1
    name: Recommendation from approved Bronze
    description: Build Silver learner activity and Gold recommendation interaction snapshots from approved Bronze.
    implementationStatus: active
    product: lms-courseflow
    domain: recommendation
    useCases:
      - ml-feature-governance
    inputKind: approved_bronze_jsonl
    inputTopics:
      - recommendation.tracking.v1
    inputDataProducts:
      - bronze.events_recommendation_tracking
    outputDataProducts:
      - silver.learner_activity
      - gold.recsys_interactions
    primaryOutput: gold.recsys_interactions
    evidenceCapabilities:
      - schema_registry
      - access_policy
      - catalog_lineage
      - release_gates
    requiredOptions: []
    optionalOptions:
      - upstream_manifest_path
      - snapshot_id
      - built_at
    execution:
      module: enterprise_df.pipelines.recommendation
      class: RecommendationFromBronzeRunner

  - runnerId: recommendation.local_jsonl.v1
    name: Recommendation raw JSONL local pipeline
    description: Build local Bronze, Silver and Gold recommendation snapshots from raw event JSONL.
    implementationStatus: active
    product: lms-courseflow
    domain: recommendation
    useCases:
      - ml-feature-governance
    inputKind: raw_event_jsonl
    inputTopics:
      - recommendation.tracking.v1
    inputDataProducts: []
    outputDataProducts:
      - bronze.events_recommendation_tracking
      - silver.learner_activity
      - gold.recsys_interactions
    primaryOutput: gold.recsys_interactions
    evidenceCapabilities:
      - schema_registry
      - access_policy
      - catalog_lineage
      - release_gates
    requiredOptions: []
    optionalOptions:
      - snapshot_id
      - built_at
      - ingested_at
    execution:
      module: enterprise_df.pipelines.recommendation
      class: RecommendationRawJsonlRunner

  - runnerId: support.sla.from_approved_bronze.v1
    name: Support SLA from approved Bronze
    description: Build Silver support case state and Gold daily support SLA aggregates from approved Bronze support events.
    implementationStatus: active
    product: support-platform
    domain: customer
    useCases:
      - customer-support-experience-intelligence
    inputKind: approved_bronze_jsonl
    inputTopics:
      - customer.support_case.changed.v1
    inputDataProducts:
      - bronze.events_support_case_changed
    outputDataProducts:
      - silver.support_case
      - gold.support_sla_daily
    primaryOutput: gold.support_sla_daily
    evidenceCapabilities:
      - schema_registry
      - access_policy
      - catalog_lineage
      - release_gates
    requiredOptions: []
    optionalOptions:
      - upstream_manifest_path
      - snapshot_id
      - built_at
    execution:
      module: enterprise_df.pipelines.support
      class: SupportSlaRunner
