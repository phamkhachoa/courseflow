version: 1
registryScope: group-enterprise-data-platform
owner: data-platform-team
description: >
  Machine-readable source onboarding registry for enterprise Bronze ingestion. This registry records
  product ownership, raw source shape, canonical topic mapping, normalizer requirements, schema
  registry expectations and release evidence before production ingestion is enabled.
sources:
  - sourceId: billing-platform-billing-transaction-settled-outbox
    priority: P0
    status: pilot
    product: billing-platform
    domain: finance
    source:
      type: transactional_outbox
      system: billing-platform
      service: billing-service
      database: billing_ledger
      rawTopic: finance.billing_transaction.settled.v1
      rawEventTypes:
        - finance.billing_transaction.settled.v1
    canonical:
      topic: finance.billing_transaction.settled.v1
      bronzeTarget: bronze.events_billing_transaction_settled
      schemaSubject: finance.billing_transaction.settled.v1-value
      compatibility: BACKWARD_TRANSITIVE
    bridge:
      required: false
      mode: direct_canonical
      status: ready
      normalizerId: none
      preservesSourcePosition: true
      envelopeRequired: true
    privacy:
      piiHandling: tokenized_before_bronze
      tenantMapping: org_id_required
      subjectKeyStrategy: tokenized_subject_id
    evidence:
      schemaRegistryReportRequired: true
      replayProofRequired: true
      sourceOffsetRequired: true
      productionAttestationRequired: true

