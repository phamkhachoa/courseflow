version: 1
environment: local
tier: local
owner: data-platform-team
evidenceMode: developer_feedback
runtimeReadiness: local_preflight_only
description: Local single-developer data platform topology for contract, ingestion and pipeline feedback.
controls:
  serviceIdentity: generated_local_tokens
  secrets: generated_test_values
  storageEncryption: local_developer_default
  networkExposure: localhost_only
  piiPolicy: synthetic_or_hashed_fixtures_only
runtimeServices:
  - serviceId: event_backbone
    capability: Event backbone
    technology: Kafka-compatible local broker
    phase: P0
    required: true
    implementationStatus: local_emulated
    evidence: local broker health and topic listing
  - serviceId: outbox_relay
    capability: Transactional event publishing
    technology: Outbox relay pattern
    phase: P0
    required: true
    implementationStatus: local_contract_only
    evidence: product outbox bridge or fixture replay evidence
  - serviceId: cdc
    capability: Change data capture
    technology: Debezium-compatible connector
    phase: P0
    required: true
    implementationStatus: planned
    evidence: connector config validation before CDC-backed Bronze
  - serviceId: schema_registry
    capability: Schema registry
    technology: Apicurio or Confluent-compatible registry
    phase: P0
    required: true
    implementationStatus: local_emulated
    evidence: subject registration and compatibility report
  - serviceId: object_storage
    capability: Object storage
    technology: MinIO
    phase: P0
    required: true
    implementationStatus: local_emulated
    evidence: disposable lakehouse bucket
  - serviceId: table_format
    capability: Lakehouse table format
    technology: Apache Iceberg
    phase: P0
    required: true
    implementationStatus: local_contract_only
    evidence: catalog table identifier and snapshot manifest
  - serviceId: batch_processing
    capability: Batch processing
    technology: Spark local mode
    phase: P0
    required: true
    implementationStatus: local_emulated
    evidence: reproducible pipeline manifest
  - serviceId: sql_transform
    capability: SQL transformation
    technology: dbt Core
    phase: P0
    required: true
    implementationStatus: planned
    evidence: dbt run/test artifact when SQL marts are introduced
  - serviceId: orchestration
    capability: Orchestration
    technology: Dagster-compatible local runner
    phase: P0
    required: true
    implementationStatus: local_cli_runner
    evidence: enterprise-df run-use-case output
  - serviceId: data_quality
    capability: Data quality
    technology: Contract validator, Great Expectations/Soda/dbt tests
    phase: P0
    required: true
    implementationStatus: local_contract_only
    evidence: machine-readable quality report
  - serviceId: lakehouse_sql
    capability: Lakehouse SQL
    technology: Trino
    phase: P0
    required: true
    implementationStatus: planned
    evidence: query smoke test against approved Gold snapshot
  - serviceId: observability
    capability: Data platform observability
    technology: Prometheus and Grafana
    phase: P0
    required: true
    implementationStatus: local_metrics_export
    evidence: Prometheus textfile metrics export
  - serviceId: catalog_lineage
    capability: Catalog and lineage
    technology: DataHub or OpenMetadata
    phase: P1
    required: false
    implementationStatus: local_bundle_export
    evidence: catalog bundle and OpenLineage JSONL export
  - serviceId: semantic_lakehouse
    capability: Semantic lakehouse serving
    technology: Dremio
    phase: P1/P2
    required: false
    implementationStatus: candidate
    evidence: future POC benchmark
  - serviceId: distributed_htap
    capability: Distributed SQL and HTAP
    technology: TiDB + TiFlash
    phase: P3+
    required: false
    implementationStatus: conditional_future_option
    evidence: product-specific migration and SLO evidence only
