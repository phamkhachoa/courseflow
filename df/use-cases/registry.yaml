  - id: finance-benefit-reconciliation
    name: Finance Benefit Reconciliation
    domain: finance
    priority: P0
    status: pilot
    owner: finance-analytics-po
    businessOutcome: Reconcile paid orders, discounts, loyalty earn or burn, reward reversals, refunds and close-period finance outcomes across enterprise products.
    primaryConsumers:
      - fp-and-a
      - accounting
      - revenue-operations
      - finance-controls
    sourceProducts:
      - lms-courseflow
      - enterprise-commerce
      - billing-platform
    sourceSystems:
      - enrollment-service
      - promotion-service
      - loyalty-service
      - payment-platform
      - billing-service
      - revenue-recognition-service
    dataProducts:
      - name: bronze.events_enrollment_completed
        layer: BRONZE
        contractStatus: existing
      - name: bronze.events_benefit_settled
        layer: BRONZE
        contractStatus: existing
      - name: silver.finance_benefit_transactions
        layer: SILVER
        contractStatus: existing
      - name: gold.finance_benefit_reconciliation
        layer: GOLD
        contractStatus: existing
    kpis:
      - committed_discount_amount
      - points_earned
      - points_reversed
      - unreconciled_benefit_count
      - reconciliation_sla_age
    accessPersonas:
      - DataPlatformOperator
      - DomainDataOwner
      - ApprovedBIConsumer
    governance:
      classification: CONFIDENTIAL
      dataResidency: REGION_CONTROLLED
      containsPii: true
      tenantIsolation: REQUIRED
    platformCapabilities:
      - data-contracts
      - bronze-ingestion
      - financial-reconciliation-quality
      - lineage-catalog
      - semantic-metrics
    pipelineRunners:
      - finance.benefit_reconciliation.from_approved_bronze.v1
    implementation:
      pipelines:
        - runnerId: finance.benefit_reconciliation.from_approved_bronze.v1
          inputTopics:
            - finance.benefit_settled.v1
          inputDataProducts:
            - bronze.events_benefit_settled
          outputDataProducts:
            - silver.finance_benefit_transactions
            - gold.finance_benefit_reconciliation
          primaryOutput: gold.finance_benefit_reconciliation
          qualityProfile: p0-finance-benefit-reconciliation
          releaseEvidenceProfile: local-medallion-release.v1
    releaseGates:
      - contract_compatibility
      - quality_checks_must_pass
      - lineage_registered
      - access_policy_reviewed

