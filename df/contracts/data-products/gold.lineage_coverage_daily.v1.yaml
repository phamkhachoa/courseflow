contractVersion: 1
dataProduct:
  name: gold.lineage_coverage_daily
  layer: GOLD
  domain: enterprise-reporting
  product: enterprise-data-foundation
  domainOwner: enterprise-reporting-council
  ownerTeam: data-platform
  businessOwner: enterprise-data-platform-po
  technicalOwner: senior-data-platform
  dataSteward: enterprise-data-steward
  description: Daily catalog and runtime lineage coverage for governed data products.
  status: DRAFT
  deprecationPolicy: 180_day_notice_and_dual_publish_for_breaking_changes

source:
  upstream:
    - name: gold.data_product_inventory
      type: control_tower_table
      contractVersion: 1
  ingestionMode: batch
  eventTimeColumn: generated_at

schema:
  columns:
    - name: org_id
      type: uuid
      nullable: false
      pii: false
      description: Organization boundary used for tenant isolation.
    - name: report_date
      type: date
      nullable: false
      pii: false
      description: Reporting date for lineage coverage.
    - name: data_product_name
      type: string
      nullable: false
      pii: false
      description: Governed data product name.
    - name: upstream_count
      type: int
      nullable: false
      pii: false
      description: Number of declared upstream dependencies.
    - name: static_edge_count
      type: int
      nullable: false
      pii: false
      description: Number of static catalog lineage edges.
    - name: runtime_edge_count
      type: int
      nullable: false
      pii: false
      description: Number of runtime lineage edges.
    - name: runtime_run_count
      type: int
      nullable: false
      pii: false
      description: Number of runtime runs covering the data product.
    - name: catalog_system
      type: string
      nullable: false
      pii: false
      description: Catalog system declared by contract.
    - name: catalog_publish_status
      type: string
      nullable: false
      pii: false
      description: Latest catalog publish status.
      allowedValues: [READY, BLOCKED, NOT_ATTACHED, UNKNOWN]
    - name: openlineage_event_count
      type: int
      nullable: false
      pii: false
      description: Number of OpenLineage events attached to the latest publish evidence.
    - name: lineage_required
      type: boolean
      nullable: false
      pii: false
      description: Whether lineage is required by contract.
    - name: static_lineage_present
      type: boolean
      nullable: false
      pii: false
      description: Whether static catalog lineage is present.
    - name: runtime_lineage_present
      type: boolean
      nullable: false
      pii: false
      description: Whether runtime lineage evidence is present.
    - name: missing_lineage_reason
      type: string
      nullable: true
      pii: false
      description: Reason lineage coverage is incomplete.
    - name: last_runtime_run_id
      type: string
      nullable: true
      pii: false
      description: Last runtime run id covering this data product.
    - name: last_runtime_run_at
      type: timestamp
      nullable: true
      pii: false
      description: Last runtime run timestamp.
    - name: downstream_impact_count
      type: int
      nullable: false
      pii: false
      description: Count of downstream objects impacted by the data product.
    - name: downstream_p0_count
      type: int
      nullable: false
      pii: false
      description: Count of downstream P0 use cases or data products impacted by a lineage gap.
    - name: impact_severity
      type: string
      nullable: false
      pii: false
      description: Severity of the lineage impact.
      allowedValues: [P0, P1, P2, P3, NONE]
    - name: owner_action_required
      type: boolean
      nullable: false
      pii: false
      description: Whether owner action is required to close lineage coverage.
    - name: generated_at
      type: timestamp
      nullable: false
      pii: false
      description: Time the lineage coverage snapshot was generated.

quality:
  freshnessSloMinutes: 240
  checks:
    - name: lineage_product_not_null
      type: not_null
      column: data_product_name
    - name: lineage_key_unique
      type: unique
      columns: [org_id, report_date, data_product_name]
    - name: lineage_snapshot_freshness
      type: freshness
      column: generated_at

privacy:
  classification: CONFIDENTIAL
  dataResidency: REGION_CONTROLLED
  containsPii: false
  tenantIsolation: REQUIRED
  retentionDays: 1095
  erasureSupported: false
  subjectKeys: []
  erasureMode: NONE
  legalHoldPolicy: none
  rawPayloadPolicy: NO_RAW_PAYLOAD

serving:
  consumers: [BI, Compliance, OperationalService]
  accessPolicy: row_level_org_isolation
  accessPersonas: [DataPlatformOperator, DomainDataOwner, ApprovedBIConsumer, ComplianceConsumer, ExecutiveConsumer]
  consumerContract: catalog_registered_access_request_required
  publicationGate: quality_checks_must_pass

lineage:
  catalog: DataHub
  lineageRequired: true
