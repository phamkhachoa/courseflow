contractVersion: 1
dataProduct:
  name: gold.contract_compliance_daily
  layer: GOLD
  domain: enterprise-reporting
  product: enterprise-data-foundation
  domainOwner: enterprise-reporting-council
  ownerTeam: data-platform
  businessOwner: enterprise-data-platform-po
  technicalOwner: senior-data-platform
  dataSteward: enterprise-data-steward
  description: Daily contract, schema, access and retention compliance status for governed data products.
  status: DRAFT
  deprecationPolicy: 180_day_notice_and_dual_publish_for_breaking_changes

source:
  upstream:
    - name: gold.data_product_inventory
      type: control_tower_table
      contractVersion: 1
  ingestionMode: batch
  eventTimeColumn: generated_at

schema:
  columns:
    - name: org_id
      type: uuid
      nullable: false
      pii: false
      description: Organization boundary used for tenant isolation.
    - name: report_date
      type: date
      nullable: false
      pii: false
      description: Reporting date for compliance status.
    - name: data_product_name
      type: string
      nullable: false
      pii: false
      description: Governed data product name.
    - name: contract_hash
      type: string
      nullable: false
      pii: false
      description: SHA-256 hash of the evaluated contract.
    - name: contract_valid
      type: boolean
      nullable: false
      pii: false
      description: Whether the contract validator passed.
    - name: contract_status
      type: string
      nullable: false
      pii: false
      description: Contract lifecycle status.
    - name: schema_column_count
      type: int
      nullable: false
      pii: false
      description: Number of schema columns in the contract.
    - name: quality_check_count
      type: int
      nullable: false
      pii: false
      description: Number of declared quality checks.
    - name: access_policy_passed
      type: boolean
      nullable: false
      pii: false
      description: Whether the access policy evaluation passed.
    - name: consumer_contract_passed
      type: boolean
      nullable: false
      pii: false
      description: Whether the consumer contract evaluation passed.
    - name: compatibility_status
      type: string
      nullable: false
      pii: false
      description: Schema compatibility status from the latest registry report or local inference.
      allowedValues: [PASSED, FAILED, NOT_ATTACHED, UNKNOWN]
    - name: breaking_change_risk
      type: string
      nullable: false
      pii: false
      description: Breaking-change risk classification for the current contract.
      allowedValues: [LOW, MEDIUM, HIGH, UNKNOWN]
    - name: registry_report_uri
      type: string
      nullable: true
      pii: false
      description: Optional schema registry compatibility report URI.
    - name: registry_report_hash
      type: string
      nullable: true
      pii: false
      description: Optional schema registry compatibility report hash.
    - name: retention_policy_passed
      type: boolean
      nullable: false
      pii: false
      description: Whether retention policy checks passed.
    - name: privacy_policy_passed
      type: boolean
      nullable: false
      pii: false
      description: Whether privacy and access policy checks passed.
    - name: highest_severity
      type: string
      nullable: false
      pii: false
      description: Highest current blocker severity.
      allowedValues: [P0, P1, P2, P3, NONE]
    - name: failed_gate_count
      type: int
      nullable: false
      pii: false
      description: Count of failed P0 gates for this data product.
    - name: blocker_details
      type: json
      nullable: false
      pii: false
      description: Machine-readable blocker details for drill-through.
    - name: last_checked_at
      type: timestamp
      nullable: false
      pii: false
      description: Time contract compliance was checked.
    - name: generated_at
      type: timestamp
      nullable: false
      pii: false
      description: Time the compliance snapshot was generated.

quality:
  freshnessSloMinutes: 240
  checks:
    - name: compliance_product_not_null
      type: not_null
      column: data_product_name
    - name: compliance_key_unique
      type: unique
      columns: [org_id, report_date, data_product_name]
    - name: compliance_snapshot_freshness
      type: freshness
      column: generated_at
    - name: compatibility_status_allowed
      type: accepted_values
      column: compatibility_status
      values: [PASSED, FAILED, NOT_ATTACHED, UNKNOWN]

privacy:
  classification: CONFIDENTIAL
  dataResidency: REGION_CONTROLLED
  containsPii: false
  tenantIsolation: REQUIRED
  retentionDays: 1095
  erasureSupported: false
  subjectKeys: []
  erasureMode: NONE
  legalHoldPolicy: none
  rawPayloadPolicy: NO_RAW_PAYLOAD

serving:
  consumers: [BI, Compliance, OperationalService]
  accessPolicy: row_level_org_isolation
  accessPersonas: [DataPlatformOperator, DomainDataOwner, ApprovedBIConsumer, ComplianceConsumer, ExecutiveConsumer]
  consumerContract: catalog_registered_access_request_required
  publicationGate: quality_checks_must_pass

lineage:
  catalog: DataHub
  lineageRequired: true
