contractVersion: 1
dataProduct:
  name: gold.executive_scorecard_daily
  layer: GOLD
  domain: enterprise-reporting
  product: enterprise-data-foundation
  domainOwner: enterprise-reporting-council
  ownerTeam: data-platform
  businessOwner: enterprise-reporting-po
  technicalOwner: senior-data-platform
  dataSteward: enterprise-data-steward
  description: Executive-ready non-PII scorecard rows sourced from governed enterprise KPI facts.
  status: DRAFT
  deprecationPolicy: 180_day_notice_and_dual_publish_for_breaking_changes

source:
  upstream:
    - name: gold.enterprise_kpi_daily
      type: lakehouse_table
      contractVersion: 1
  ingestionMode: batch
  eventTimeColumn: report_date

schema:
  columns:
    - name: product_id
      type: string
      nullable: false
      pii: false
      description: Enterprise platform product that materialized the executive scorecard row.
    - name: dataset_snapshot_id
      type: string
      nullable: false
      pii: false
      description: Immutable Gold snapshot identifier.
    - name: scorecard_id
      type: string
      nullable: false
      pii: false
      description: Deterministic executive scorecard row id.
    - name: scorecard_name
      type: string
      nullable: false
      pii: false
      description: Executive scorecard name.
    - name: org_id
      type: uuid
      nullable: false
      pii: false
      description: Organization boundary used for row-level tenant isolation.
    - name: report_date
      type: date
      nullable: false
      pii: false
      description: Business report date for the scorecard observation.
    - name: section
      type: string
      nullable: false
      pii: false
      description: Executive scorecard section such as finance, customer, risk, data_trust or product.
    - name: metric_id
      type: string
      nullable: false
      pii: false
      description: Stable semantic metric identifier surfaced on the scorecard.
    - name: metric_name
      type: string
      nullable: false
      pii: false
      description: Human-readable metric name.
    - name: actual_value
      type: double
      nullable: false
      pii: false
      description: Current metric value.
    - name: target_value
      type: double
      nullable: true
      pii: false
      description: Target or threshold value when defined.
    - name: prior_value
      type: double
      nullable: true
      pii: false
      description: Comparable previous period metric value when supplied.
    - name: delta_value
      type: double
      nullable: true
      pii: false
      description: Difference between current and prior value when supplied or derived.
    - name: metric_unit
      type: string
      nullable: false
      pii: false
      description: Metric unit such as count, ratio, percent or currency_major.
    - name: currency
      type: string
      nullable: true
      pii: false
      description: ISO-4217 currency code when metric_unit is monetary.
    - name: status
      type: string
      nullable: false
      pii: false
      description: Executive threshold status.
      allowedValues: [GREEN, AMBER, RED, UNKNOWN]
    - name: trend
      type: string
      nullable: false
      pii: false
      description: Direction against prior value.
      allowedValues: [UP, DOWN, FLAT, UNKNOWN]
    - name: blocker_count
      type: int
      nullable: false
      pii: false
      description: Count of source or control-tower blockers associated with the scorecard row.
    - name: top_blocker_gate
      type: string
      nullable: true
      pii: false
      description: Highest priority blocker gate when the scorecard row is not green.
    - name: certification_status
      type: string
      nullable: false
      pii: false
      description: Certification state of the metric definition.
      allowedValues: [CERTIFIED, PROVISIONAL, EXPLORATORY]
    - name: source_data_product
      type: string
      nullable: false
      pii: false
      description: Gold source data product behind the semantic metric.
    - name: source_snapshot_id
      type: string
      nullable: false
      pii: false
      description: Source Gold snapshot id represented by this scorecard row.
    - name: source_metric_snapshot_id
      type: string
      nullable: false
      pii: false
      description: Source semantic metric snapshot id.
    - name: source_metric_snapshot_hash
      type: string
      nullable: false
      pii: false
      description: Source semantic metric snapshot content hash.
    - name: semantic_registry_hash
      type: string
      nullable: false
      pii: false
      description: Hash of the governed semantic metric registry used for the snapshot.
    - name: built_at
      type: timestamp
      nullable: false
      pii: false
      description: Time the Gold scorecard snapshot was materialized.
    - name: quality_passed
      type: boolean
      nullable: false
      pii: false
      description: Whether semantic and row-level quality checks passed.

quality:
  freshnessSloMinutes: 240
  checks:
    - name: executive_scorecard_id_not_null
      type: not_null
      column: scorecard_id
    - name: executive_scorecard_org_not_null
      type: not_null
      column: org_id
    - name: executive_scorecard_unique
      type: unique
      columns: [dataset_snapshot_id, scorecard_id]
    - name: executive_scorecard_status_allowed
      type: accepted_values
      column: status
      values: [GREEN, AMBER, RED, UNKNOWN]
    - name: executive_scorecard_certification_allowed
      type: accepted_values
      column: certification_status
      values: [CERTIFIED, PROVISIONAL, EXPLORATORY]
    - name: executive_scorecard_snapshot_freshness
      type: freshness
      column: built_at

privacy:
  classification: CONFIDENTIAL
  dataResidency: REGION_CONTROLLED
  containsPii: false
  tenantIsolation: REQUIRED
  retentionDays: 1095
  erasureSupported: false
  subjectKeys: []
  erasureMode: NONE
  legalHoldPolicy: none
  rawPayloadPolicy: NO_RAW_PAYLOAD

serving:
  consumers: [BI, Reporting, OperationalService]
  accessPolicy: row_level_org_isolation
  accessPersonas: [DataPlatformOperator, DomainDataOwner, ApprovedBIConsumer, ExecutiveConsumer]
  consumerContract: catalog_registered_access_request_required
  publicationGate: quality_checks_must_pass

lineage:
  catalog: DataHub
  lineageRequired: true
