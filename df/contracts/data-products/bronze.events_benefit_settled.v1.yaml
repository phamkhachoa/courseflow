contractVersion: 1
dataProduct:
  name: bronze.events_benefit_settled
  layer: BRONZE
  domain: finance
  product: enterprise-commerce
  domainOwner: finance-domain-council
  ownerTeam: data-platform
  businessOwner: finance-analytics-po
  technicalOwner: senior-data-platform
  dataSteward: enterprise-data-steward
  description: Raw benefit settlement events for payment, discount, loyalty, reward and refund reconciliation.
  status: DRAFT
  deprecationPolicy: 180_day_notice_and_dual_publish_for_breaking_changes

source:
  upstream: []
  ingestionMode: streaming
  eventTimeColumn: occurred_at

schema:
  columns:
    - name: product_id
      type: string
      nullable: false
      pii: false
      description: Enterprise product code that produced or owns this record.
    - name: source_product_id
      type: string
      nullable: false
      pii: false
      description: Business product that originated the order or benefit.
    - name: domain_id
      type: string
      nullable: false
      pii: false
      description: Enterprise data domain code used for mesh ownership and catalog grouping.
    - name: event_id
      type: uuid
      nullable: false
      pii: false
      description: Global event idempotency key.
    - name: event_type
      type: string
      nullable: false
      pii: false
      description: Finance settlement event type.
      allowedValues: [BENEFIT_SETTLED]
    - name: event_version
      type: int
      nullable: false
      pii: false
      description: Version of the source event contract.
    - name: source_service
      type: string
      nullable: false
      pii: false
      description: Service that emitted the event.
    - name: tenant_id
      type: string
      nullable: false
      pii: false
      description: Enterprise tenant boundary from the source event envelope.
    - name: org_id
      type: uuid
      nullable: false
      pii: false
      description: Organization boundary used for tenant isolation.
    - name: order_id
      type: string
      nullable: false
      pii: false
      description: Commerce order identifier.
    - name: payment_id
      type: string
      nullable: false
      pii: false
      description: Payment or settlement identifier.
    - name: benefit_transaction_id
      type: string
      nullable: false
      pii: false
      description: Benefit ledger transaction identifier.
    - name: reconciliation_key
      type: string
      nullable: false
      pii: false
      description: Business key used to group source evidence for reconciliation.
    - name: benefit_type
      type: string
      nullable: false
      pii: false
      description: Benefit category represented by this transaction.
    - name: entitlement_id
      type: string
      nullable: true
      pii: false
      description: Optional entitlement or source-right identifier related to the benefit.
    - name: beneficiary_id_hash
      type: string
      nullable: true
      pii: true
      description: Tokenized beneficiary identifier when available.
    - name: item_id
      type: string
      nullable: true
      pii: false
      description: Optional product, content, SKU or service item identifier.
    - name: currency
      type: string
      nullable: false
      pii: false
      description: ISO-4217 currency code.
    - name: expected_amount_cents
      type: long
      nullable: false
      pii: false
      description: Expected monetary amount for reconciliation in minor currency units.
    - name: actual_amount_cents
      type: long
      nullable: false
      pii: false
      description: Actual monetary amount from the source ledger in minor currency units.
    - name: expected_points
      type: long
      nullable: false
      pii: false
      description: Expected loyalty points for reconciliation.
    - name: actual_points
      type: long
      nullable: false
      pii: false
      description: Actual loyalty points from the source ledger.
    - name: list_price_cents
      type: long
      nullable: false
      pii: false
      description: Original list price in minor currency units.
    - name: final_amount_cents
      type: long
      nullable: false
      pii: false
      description: Customer final amount after discounts and rewards.
    - name: paid_amount_cents
      type: long
      nullable: false
      pii: false
      description: Amount captured by the payment platform.
    - name: committed_discount_cents
      type: long
      nullable: false
      pii: false
      description: Discount committed by promotion or coupon systems.
    - name: loyalty_points_earned
      type: long
      nullable: false
      pii: false
      description: Points earned by the settlement.
    - name: loyalty_points_burned
      type: long
      nullable: false
      pii: false
      description: Points burned by the settlement.
    - name: reward_amount_cents
      type: long
      nullable: false
      pii: false
      description: Reward monetary equivalent applied to the order.
    - name: refund_amount_cents
      type: long
      nullable: false
      pii: false
      description: Refunded amount in minor currency units.
    - name: settlement_status
      type: string
      nullable: false
      pii: false
      description: Settlement state from the payment source of truth.
    - name: benefit_status
      type: string
      nullable: false
      pii: false
      description: Benefit ledger state for committed or reversed benefits.
    - name: settled_at
      type: timestamp
      nullable: false
      pii: false
      description: Settlement business timestamp.
    - name: accounting_date
      type: date
      nullable: false
      pii: false
      description: Finance accounting date used for close and reconciliation windows.
    - name: reason_code
      type: string
      nullable: true
      pii: false
      description: Optional upstream reason code for known reconciliation state.
    - name: occurred_at
      type: timestamp
      nullable: false
      pii: false
      description: Business event time from the envelope.
    - name: published_at
      type: timestamp
      nullable: false
      pii: false
      description: Time the event was published into the platform stream.
    - name: ingested_at
      type: timestamp
      nullable: false
      pii: false
      description: Time the event landed in Bronze.
    - name: source_system
      type: string
      nullable: false
      pii: false
      description: Logical source system name from the source registry.
    - name: source_topic
      type: string
      nullable: false
      pii: false
      description: Kafka topic or equivalent source stream.
    - name: source_partition
      type: int
      nullable: true
      pii: false
      description: Kafka partition for replay lineage.
    - name: source_offset
      type: long
      nullable: true
      pii: false
      description: Kafka offset for replay lineage.
    - name: source_snapshot_id
      type: string
      nullable: true
      pii: false
      description: CDC snapshot, file manifest or source export id when no stream offset exists.
    - name: source_record_key
      type: string
      nullable: false
      pii: false
      description: Non-sensitive source key used for replay and deduplication evidence.
    - name: source_record_hash_sha256
      type: string
      nullable: false
      pii: false
      description: SHA-256 hash of canonical source identity and raw source record.
    - name: payload_hash_sha256
      type: string
      nullable: false
      pii: false
      description: SHA-256 hash of the platform-approved event payload.
    - name: schema_subject
      type: string
      nullable: false
      pii: false
      description: Schema registry subject used to validate the event payload.
    - name: schema_id
      type: string
      nullable: false
      pii: false
      description: Schema registry artifact id, version or local compatibility id.
    - name: raw_headers
      type: json
      nullable: false
      pii: false
      description: Source headers after secret stripping.
    - name: raw_payload
      type: json
      nullable: false
      pii: true
      description: Original event payload preserved for reproducible reprocessing.
    - name: ingest_run_id
      type: string
      nullable: false
      pii: false
      description: Orchestrator or sink run id that committed the Bronze row.
    - name: event_date
      type: date
      nullable: false
      pii: false
      description: Date derived from occurred_at for partition pruning.
    - name: ingest_date
      type: date
      nullable: false
      pii: false
      description: Date derived from ingested_at for operational triage.

quality:
  freshnessSloMinutes: 15
  checks:
    - name: product_id_not_null
      type: not_null
      column: product_id
    - name: event_id_not_null
      type: not_null
      column: event_id
    - name: source_position_unique
      type: unique
      columns: [source_topic, source_partition, source_offset]
    - name: benefit_event_type_allowed
      type: accepted_values
      column: event_type
      values: [BENEFIT_SETTLED]
    - name: no_sensitive_payload
      type: no_sensitive_payload
      column: raw_payload

privacy:
  classification: CONFIDENTIAL
  dataResidency: REGION_CONTROLLED
  containsPii: true
  tenantIsolation: REQUIRED
  retentionDays: 2555
  erasureSupported: true
  subjectKeys:
    - name: beneficiary_id_hash
      column: beneficiary_id_hash
      type: tokenized_subject_id
      required: true
  erasureMode: REGULATED_SUBJECT_DELETE
  legalHoldPolicy: regulated_legal_hold_check
  rawPayloadPolicy: SECURE_RAW_PAYLOAD_WITH_SUBJECT_ERASURE

serving:
  consumers: [DataPlatform]
  accessPolicy: platform_engineer_only
  accessPersonas: [DataPlatformOperator, DomainDataOwner]
  consumerContract: catalog_registered_access_request_required
  publicationGate: quality_checks_must_pass

lineage:
  catalog: DataHub
  lineageRequired: true
