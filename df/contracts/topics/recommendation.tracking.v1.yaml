contractVersion: 1
topic:
  name: recommendation.tracking.v1
  domain: recommendation
  product: lms-courseflow
  domainOwner: lms-domain-council
  ownerTeam: data-platform
  dataSteward: enterprise-data-steward
  sourceServices:
    - analytics-service
    - web-next-learning
  description: Recommendation impression, click and attributed enrollment tracking events for analytics and ML.
  status: DRAFT

schema:
  format: JSON_SCHEMA
  compatibility: BACKWARD_TRANSITIVE
  envelopeSchema: contracts/event-envelope.v1.schema.json
  payloadSchema: contracts/events/recommendation.tracking.v1.schema.json

privacy:
  classification: CONFIDENTIAL
  dataResidency: REGION_CONTROLLED
  containsPii: true
  tenantIsolation: REQUIRED
  retentionDays: 1095
  erasureSupported: true
  subjectKeys:
    - name: learner_id_hash
      topicPath: $.payload.learnerIdHash
      type: tokenized_subject_id
      required: true
  erasureMode: SUBJECT_DELETE
  legalHoldPolicy: standard_legal_hold_check
  rawPayloadPolicy: SECURE_RAW_PAYLOAD_WITH_SUBJECT_ERASURE

ingestion:
  bronzeTarget: bronze.events_recommendation_tracking
  partitionStrategy: event_date/source_service/event_type

quality:
  freshnessSloMinutes: 15
  checks:
    - name: event_id_not_null
      type: not_null
      column: eventId
    - name: event_type_allowed
      type: accepted_values
      column: payload.eventType
      values: [IMPRESSION, CLICK, ENROLLMENT]
    - name: source_offset_unique
      type: unique
      columns: [topic, partition, offset]
    - name: no_sensitive_payload
      type: no_sensitive_payload
      column: payload
