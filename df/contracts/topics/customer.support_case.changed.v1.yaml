contractVersion: 1
topic:
  name: customer.support_case.changed.v1
  domain: customer
  product: support-platform
  domainOwner: customer-domain-council
  ownerTeam: data-platform
  dataSteward: enterprise-data-steward
  sourceServices:
    - support-case-service
    - customer-feedback-service
  description: Tokenized support case lifecycle signal used for enterprise support SLA, Customer 360 and experience analytics.
  status: DRAFT

schema:
  format: JSON_SCHEMA
  compatibility: BACKWARD_TRANSITIVE
  envelopeSchema: contracts/event-envelope.v1.schema.json
  payloadSchema: contracts/events/customer.support_case.changed.v1.schema.json

privacy:
  classification: PII
  dataResidency: REGION_CONTROLLED
  containsPii: true
  tenantIsolation: REQUIRED
  retentionDays: 1095
  erasureSupported: true
  subjectKeys:
    - name: customer_id_hash
      topicPath: $.payload.customerIdHash
      type: tokenized_subject_id
      required: true
  erasureMode: SUBJECT_DELETE
  legalHoldPolicy: standard_legal_hold_check
  rawPayloadPolicy: SECURE_RAW_PAYLOAD_WITH_SUBJECT_ERASURE

ingestion:
  bronzeTarget: bronze.events_support_case_changed
  partitionStrategy: event_date/source_service/org_id

quality:
  freshnessSloMinutes: 30
  checks:
    - name: event_id_not_null
      type: not_null
      column: eventId
    - name: support_case_event_type_allowed
      type: accepted_values
      column: payload.eventType
      values: [SUPPORT_CASE_CHANGED]
    - name: source_offset_unique
      type: unique
      columns: [topic, partition, offset]
    - name: no_sensitive_payload
      type: no_sensitive_payload
      column: payload
