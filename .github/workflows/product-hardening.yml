name: Product Hardening Gates

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  backend:
    name: Backend reactor tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests
        run: mvn test

  admin-web:
    name: Admin web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/react-admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/react-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test admin app
        run: npm test

      - name: Build admin app
        run: npm run build

  learner-web:
    name: Learner web test and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/next-learning
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/next-learning/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test learner app
        run: npm test

      - name: Build learner app
        run: npm run build

  learner-mobile:
    name: Learner mobile analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze mobile app
        run: flutter analyze

  smoke-artifacts:
    name: Smoke artifact checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate gateway smoke script syntax
        run: node --check backend/scripts/product-hardening-smoke.mjs

      - name: Validate backup drill script syntax
        run: bash -n backend/scripts/postgres-backup-drill.sh

      - name: Validate Docker Compose topology
        run: >
          docker compose
          -f backend/infra/docker/docker-compose.yml
          -f backend/infra/docker/docker-compose.services.yml
          -f backend/infra/docker/docker-compose.observability.yml
          config --quiet
