name: Product Hardening Gates

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      run_local_cluster_smoke:
        description: "Boot the full local backend cluster and run gateway plus promotion runtime smoke"
        required: false
        type: boolean
        default: false
      run_keycloak_security_smoke:
        description: "Run the Keycloak/OIDC security smoke against a reachable staging cluster"
        required: false
        type: boolean
        default: false
      run_promotion_runtime_smoke:
        description: "Run the promotion runtime smoke against a reachable staging cluster"
        required: false
        type: boolean
        default: false
      run_recommendation_ml_ops_smoke:
        description: "Run the Recommendation ML ops smoke against a reachable staging cluster"
        required: false
        type: boolean
        default: false

jobs:
  backend:
    name: Backend reactor tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests
        run: mvn test

  recommendation-ml-python:
    name: Recommendation ML Python gates
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: courseflow
          POSTGRES_PASSWORD: courseflow
          POSTGRES_DB: cf_recommendation_ml
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U courseflow -d cf_recommendation_ml"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ai/services/recommendation-ml-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai/services/recommendation-ml-service/pyproject.toml

      - name: Install ML service
        run: python -m pip install -e ".[dev]"

      - name: Test ML service
        run: pytest

      - name: Lint ML service
        run: ruff check src tests

      - name: Type-check ML service
        run: mypy src tests

      - name: Run ML Postgres integration
        env:
          RECOMMENDATION_ML_INTEGRATION_DB_URL: postgresql://courseflow:courseflow@localhost:5432/cf_recommendation_ml
          COURSEFLOW_INTERNAL_JWT_SECRET: courseflow-local-internal-jwt-secret-change-me-32
        run: pytest tests/test_postgres_integration.py

      - name: Build ML Docker image
        working-directory: .
        run: >
          docker build
          -f ai/services/recommendation-ml-service/Dockerfile
          -t courseflow-recommendation-ml-service:ci
          .

      - name: Validate ML Docker image contract
        working-directory: backend
        env:
          RECOMMENDATION_ML_IMAGE_CONTRACT_EVIDENCE_FILE: recommendation-ml-smoke-artifacts/recommendation-ml-image-contract-evidence.json
        run: node scripts/recommendation-ml-image-contract.mjs courseflow-recommendation-ml-service:ci

      - name: Run ML Docker image runtime smoke
        working-directory: backend
        env:
          PYTHON: python
          COURSEFLOW_INTERNAL_JWT_SECRET: courseflow-local-internal-jwt-secret-change-me-32
          RECOMMENDATION_ML_IMAGE_RUNTIME_EVIDENCE_FILE: recommendation-ml-smoke-artifacts/recommendation-ml-image-runtime-smoke-evidence.json
        run: scripts/recommendation-ml-image-runtime-smoke.sh courseflow-recommendation-ml-service:ci

      - name: Run ML local HTTP smoke
        working-directory: backend
        env:
          PYTHON: python
          COURSEFLOW_INTERNAL_JWT_SECRET: courseflow-local-internal-jwt-secret-change-me-32
          RECOMMENDATION_ML_LOCAL_SMOKE_EVIDENCE_FILE: recommendation-ml-smoke-artifacts/recommendation-ml-local-http-smoke-evidence.json
          RECOMMENDATION_ML_LOCAL_SMOKE_UVICORN_LOG: recommendation-ml-smoke-artifacts/recommendation-ml-local-http-smoke-uvicorn.log
        run: scripts/recommendation-ml-local-http-smoke.sh

      - name: Upload ML local HTTP smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recommendation-ml-local-http-smoke-artifacts
          path: backend/recommendation-ml-smoke-artifacts
          if-no-files-found: ignore

  admin-web:
    name: Admin web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/react-admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/react-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test admin app
        run: npm test

      - name: Lint admin app
        run: npm run lint

      - name: Build admin app
        run: npm run build

  learner-web:
    name: Learner web test and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/next-learning
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/next-learning/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test learner app
        run: npm test

      - name: Lint learner app
        run: npm run lint

      - name: Build learner app
        run: npm run build

  learner-mobile:
    name: Learner mobile analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze mobile app
        run: flutter analyze

  smoke-artifacts:
    name: Smoke artifact checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai/platform/pyproject.toml

      - name: Install AI Platform tooling
        run: python -m pip install -e "ai/platform[dev]"

      - name: Validate AI Platform registry
        run: |
          python -m pytest ai/platform/tests
          python -m courseflow_ai_platform.cli --ai-root ai

      - name: Validate gateway smoke script syntax
        run: node --check backend/scripts/product-hardening-smoke.mjs

      - name: Validate Keycloak security smoke script syntax
        run: node --check backend/scripts/keycloak-security-smoke.mjs

      - name: Validate promotion runtime smoke script syntax
        run: node --check backend/scripts/promotion-runtime-smoke.mjs

      - name: Validate promotion observability smoke script syntax
        run: node --check backend/scripts/promotion-observability-smoke.mjs

      - name: Validate recommendation ML ops smoke script syntax
        run: node --check backend/scripts/recommendation-ml-ops-smoke.mjs

      - name: Validate recommendation ML evidence verifier syntax
        run: node --check backend/scripts/recommendation-ml-evidence-verify.mjs

      - name: Validate recommendation ML evidence manifest syntax
        run: node --check backend/scripts/recommendation-ml-evidence-manifest.mjs

      - name: Validate recommendation ML image contract script syntax
        run: node --check backend/scripts/recommendation-ml-image-contract.mjs

      - name: Validate Keycloak realm validator syntax
        run: node --check backend/scripts/validate-keycloak-realm.mjs

      - name: Validate production Keycloak realm template
        run: node backend/scripts/validate-keycloak-realm.mjs backend/infra/docker/keycloak/courseflow-realm.prod-template.json --prod-template

      - name: Validate backup drill script syntax
        run: bash -n backend/scripts/postgres-backup-drill.sh

      - name: Validate production profile guard syntax
        run: bash -n backend/scripts/validate-prod-profile.sh

      - name: Validate recommendation ML local HTTP smoke syntax
        run: bash -n backend/scripts/recommendation-ml-local-http-smoke.sh

      - name: Validate recommendation ML image runtime smoke syntax
        run: bash -n backend/scripts/recommendation-ml-image-runtime-smoke.sh

      - name: Validate recommendation ML Python syntax
        run: python -m compileall -q ai/platform/src ai/platform/tests ai/services/recommendation-ml-service/src ai/services/recommendation-ml-service/tests

      - name: Validate Docker Compose topology
        run: >
          docker compose
          -f backend/infra/docker/docker-compose.yml
          -f backend/infra/docker/docker-compose.services.yml
          -f backend/infra/docker/docker-compose.observability.yml
          config --quiet

      - name: Validate production profile rejects defaults
        run: |
          set +e
          COURSEFLOW_JWT_SECRET=courseflow-local-cluster-jwt-secret-change-me-32 \
          COURSEFLOW_INTERNAL_JWT_SECRET=courseflow-local-internal-jwt-secret-change-me-32 \
          CERTIFICATE_SIGNING_SECRET=courseflow-local-certificate-signing-secret-change-me-32 \
          COURSEFLOW_DB_PASSWORD=courseflow \
          COURSEFLOW_STORAGE_ACCESS_KEY=courseflow \
          COURSEFLOW_STORAGE_SECRET_KEY=courseflow \
          COURSEFLOW_STORAGE_EXTERNAL_ENDPOINT=https://storage.example.invalid \
          KEYCLOAK_ADMIN_PASSWORD=admin \
            backend/scripts/validate-prod-profile.sh
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "::error::Production profile guard accepted default secrets"
            exit 1
          fi

      - name: Validate production Docker Compose profile
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out "$tmpdir/internal.key" >/dev/null 2>&1
          openssl rsa -pubout -in "$tmpdir/internal.key" -out "$tmpdir/internal.pub" >/dev/null 2>&1

          sts_clients=(
            api-gateway access-control-service user-management-service organization-service
            course-service enrollment-service assignment-service deadline-service
            announcement-service portfolio-service discussion-service notification-service
            chat-service media-service search-service analytics-service recommendation-ml-service gradebook-service
            quiz-service certificate-service peer-review-service live-session-service
            review-service checkout-service promotion-service loyalty-service outbox-relay
          )
          for client in "${sts_clients[@]}"; do
            env_name="COURSEFLOW_STS_$(printf '%s' "$client" | tr '[:lower:]' '[:upper:]' | tr '-' '_')_SECRET"
            export "$env_name=prod-ci-sts-${client}-secret-32-byte-minimum-value-001"
          done

          export COURSEFLOW_JWT_SECRET=prod-ci-jwt-secret-32-byte-minimum-value-001
          export COURSEFLOW_INTERNAL_JWT_ALGORITHM=RS256
          export COURSEFLOW_INTERNAL_JWT_PRIVATE_KEY="$(cat "$tmpdir/internal.key")"
          export COURSEFLOW_INTERNAL_JWT_PUBLIC_KEY="$(cat "$tmpdir/internal.pub")"
          export COURSEFLOW_INTERNAL_JWT_VERIFICATION_MODE=jwks
          export COURSEFLOW_INTERNAL_JWT_JWKS_URI=http://identity-token-converter-service:8080/oauth/jwks
          export COURSEFLOW_INTERNAL_SERVICE_TOKEN_MODE=sts
          export TOKEN_CONVERTER_URI=http://identity-token-converter-service:8080
          export CERTIFICATE_SIGNING_SECRET=prod-ci-cert-signing-secret-32-byte-minimum-value-001
          export COURSEFLOW_DB_PASSWORD=prod-ci-db-password-strong-value-001
          export RECOMMENDATION_ML_PRINCIPAL_HASH_SECRET=prod-ci-recommendation-ml-principal-hash-secret-32-byte-minimum-value-001
          export COURSEFLOW_STORAGE_ACCESS_KEY=prod-ci-storage-access-key
          export COURSEFLOW_STORAGE_SECRET_KEY=prod-ci-storage-secret-strong-value-001
          export COURSEFLOW_STORAGE_EXTERNAL_ENDPOINT=https://storage.example.invalid
          export EXTERNAL_TOKEN_MODE=oidc
          export KEYCLOAK_ADMIN_PASSWORD=prod-ci-keycloak-password-strong-value-001
          export KEYCLOAK_PUBLIC_BASE_URL=https://auth.example.invalid
          export KEYCLOAK_BASE_URL=https://auth.example.invalid
          export KEYCLOAK_REALM=courseflow
          export KEYCLOAK_ADMIN_CLIENT_ID=keycloak-user-lifecycle
          export KEYCLOAK_ADMIN_CLIENT_SECRET=prod-ci-keycloak-admin-client-secret-strong-value-001
          export KEYCLOAK_SETUP_EMAIL_CLIENT_ID=courseflow-admin-web
          export KEYCLOAK_SETUP_EMAIL_REDIRECT_URI=https://admin.example.invalid/login/callback
          export KEYCLOAK_ISSUER_URI=https://auth.example.invalid/realms/courseflow
          export KEYCLOAK_JWK_SET_URI=https://auth.example.invalid/realms/courseflow/protocol/openid-connect/certs
          export KEYCLOAK_AUDIENCE=courseflow-api
          export PROMOTION_COUPON_FINGERPRINT_KEY_ID=prod-ci-coupon-fingerprint-v1
          export PROMOTION_COUPON_FINGERPRINT_PEPPER=prod-ci-coupon-fingerprint-pepper-32-byte-minimum-value-001
          export PROMOTION_COUPON_LEGACY_FALLBACK_ENABLED=true
          export PROMOTION_REQUEST_SNAPSHOT_HASH_SECRET=prod-ci-request-snapshot-hash-secret-32-byte-minimum-value-001
          export PROMOTION_COUPON_ABUSE_GUARD_MODE=shadow
          export PROMOTION_COUPON_ABUSE_GUARD_KEY_ID=prod-ci-coupon-abuse-guard-v1
          export PROMOTION_COUPON_ABUSE_GUARD_PEPPER=prod-ci-coupon-abuse-guard-pepper-32-byte-minimum-value-001
          export PROMOTION_ADMIN_OPERATION_RATE_GUARD_MODE=shadow
          export PROMOTION_ADMIN_OPERATION_RATE_GUARD_KEY_ID=prod-ci-admin-operation-rate-guard-v1
          export PROMOTION_ADMIN_OPERATION_RATE_GUARD_PEPPER=prod-ci-admin-operation-rate-guard-pepper-32-byte-minimum-value-001
          export GRAFANA_ADMIN_PASSWORD=prod-ci-grafana-password-strong-value-001

          backend/scripts/validate-prod-profile.sh --compose --include-observability

  local-cluster-smoke:
    name: Local cluster gateway smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_local_cluster_smoke
    timeout-minutes: 90
    defaults:
      run:
        working-directory: backend
    env:
      COURSEFLOW_API_URL: http://localhost:28080/api
      COURSEFLOW_DIRECT_SERVICE_URL: http://course-service:8080
      COURSEFLOW_DIRECT_SERVICE_TRANSPORT: docker
      SPRING_LIQUIBASE_CONTEXTS: prod,demo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate gateway smoke script syntax
        run: node --check scripts/product-hardening-smoke.mjs

      - name: Validate Keycloak security smoke script syntax
        run: node --check scripts/keycloak-security-smoke.mjs

      - name: Validate promotion runtime smoke script syntax
        run: node --check scripts/promotion-runtime-smoke.mjs

      - name: Validate recommendation ML ops smoke script syntax
        run: node --check scripts/recommendation-ml-ops-smoke.mjs

      - name: Boot local backend cluster
        run: |
          set -euo pipefail
          docker compose \
            -f infra/docker/docker-compose.yml \
            -f infra/docker/docker-compose.services.yml \
            up --build -d

      - name: Wait for gateway readiness
        run: |
          set -euo pipefail

          wait_for_url() {
            name="$1"
            url="$2"
            deadline=$((SECONDS + 600))
            until curl -fsS "$url" >/dev/null; do
              if [ "$SECONDS" -ge "$deadline" ]; then
                echo "::error::Timed out waiting for ${name} at ${url}"
                docker compose \
                  -f infra/docker/docker-compose.yml \
                  -f infra/docker/docker-compose.services.yml \
                  ps
                exit 1
              fi
              sleep 10
            done
          }

          wait_for_url "gateway actuator health" "http://localhost:28080/actuator/health"
          wait_for_url "gateway public catalog" "http://localhost:28080/api/v1/courses"

      - name: Run Product Hardening gateway smoke
        run: node scripts/product-hardening-smoke.mjs

      - name: Run promotion runtime smoke
        run: node scripts/promotion-runtime-smoke.mjs

      - name: Collect local cluster logs
        if: failure()
        run: |
          set -euo pipefail
          mkdir -p product-hardening-smoke-logs
          docker compose \
            -f infra/docker/docker-compose.yml \
            -f infra/docker/docker-compose.services.yml \
            ps > product-hardening-smoke-logs/compose-ps.txt || true
          docker compose \
            -f infra/docker/docker-compose.yml \
            -f infra/docker/docker-compose.services.yml \
            logs --no-color > product-hardening-smoke-logs/compose.log || true

      - name: Upload local cluster logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: product-hardening-local-cluster-logs
          path: backend/product-hardening-smoke-logs
          if-no-files-found: ignore

      - name: Stop local backend cluster
        if: always()
        run: |
          docker compose \
            -f infra/docker/docker-compose.yml \
            -f infra/docker/docker-compose.services.yml \
            down -v --remove-orphans

  keycloak-security-smoke:
    name: Keycloak/OIDC security smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_keycloak_security_smoke
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    env:
      COURSEFLOW_API_URL: ${{ vars.COURSEFLOW_SECURITY_SMOKE_API_URL }}
      COURSEFLOW_TOKEN_CONVERTER_URL: ${{ vars.COURSEFLOW_SECURITY_SMOKE_TOKEN_CONVERTER_URL }}
      COURSEFLOW_DIRECT_SERVICE_URL: ${{ vars.COURSEFLOW_SECURITY_SMOKE_DIRECT_SERVICE_URL }}
      COURSEFLOW_SECURITY_SMOKE_ACCESS_TOKEN: ${{ secrets.COURSEFLOW_SECURITY_SMOKE_ACCESS_TOKEN }}
      COURSEFLOW_SECURITY_SMOKE_ALLOW_PASSWORD_GRANT: ${{ vars.COURSEFLOW_SECURITY_SMOKE_ALLOW_PASSWORD_GRANT }}
      COURSEFLOW_SECURITY_SMOKE_TOKEN_EXCHANGE_CLIENT_ID: ${{ vars.COURSEFLOW_SECURITY_SMOKE_TOKEN_EXCHANGE_CLIENT_ID }}
      COURSEFLOW_SECURITY_SMOKE_TOKEN_EXCHANGE_CLIENT_SECRET: ${{ secrets.COURSEFLOW_SECURITY_SMOKE_TOKEN_EXCHANGE_CLIENT_SECRET }}
      COURSEFLOW_STS_API_GATEWAY_SECRET: ${{ secrets.COURSEFLOW_STS_API_GATEWAY_SECRET }}
      COURSEFLOW_SECURITY_SMOKE_STS_CLIENT_ID: ${{ vars.COURSEFLOW_SECURITY_SMOKE_STS_CLIENT_ID }}
      COURSEFLOW_SECURITY_SMOKE_STS_CLIENT_SECRET: ${{ secrets.COURSEFLOW_SECURITY_SMOKE_STS_CLIENT_SECRET }}
      COURSEFLOW_STS_COURSE_SERVICE_SECRET: ${{ secrets.COURSEFLOW_STS_COURSE_SERVICE_SECRET }}
      KEYCLOAK_TOKEN_URL: ${{ vars.KEYCLOAK_TOKEN_URL }}
      KEYCLOAK_CLIENT_ID: ${{ vars.KEYCLOAK_CLIENT_ID }}
      KEYCLOAK_USERNAME: ${{ secrets.KEYCLOAK_USERNAME }}
      KEYCLOAK_PASSWORD: ${{ secrets.KEYCLOAK_PASSWORD }}
      KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Keycloak security smoke script syntax
        run: node --check scripts/keycloak-security-smoke.mjs

      - name: Validate staging smoke configuration
        run: |
          set -euo pipefail

          require_value() {
            name="$1"
            value="${!name:-}"
            if [ -z "${value//[[:space:]]/}" ]; then
              echo "::error::${name} must be configured for run_keycloak_security_smoke"
              exit 1
            fi
          }

          is_blank() {
            name="$1"
            value="${!name:-}"
            [ -z "${value//[[:space:]]/}" ]
          }

          require_value COURSEFLOW_API_URL
          require_value COURSEFLOW_TOKEN_CONVERTER_URL
          require_value COURSEFLOW_DIRECT_SERVICE_URL

          if is_blank COURSEFLOW_SECURITY_SMOKE_ACCESS_TOKEN; then
            if [ "${COURSEFLOW_SECURITY_SMOKE_ALLOW_PASSWORD_GRANT:-false}" != "true" ]; then
              echo "::error::Set COURSEFLOW_SECURITY_SMOKE_ACCESS_TOKEN or explicitly enable password grant for a non-production smoke realm"
              exit 1
            fi
            require_value KEYCLOAK_TOKEN_URL
            require_value KEYCLOAK_CLIENT_ID
            require_value KEYCLOAK_USERNAME
            require_value KEYCLOAK_PASSWORD
          fi

          if is_blank COURSEFLOW_SECURITY_SMOKE_TOKEN_EXCHANGE_CLIENT_SECRET &&
            is_blank COURSEFLOW_STS_API_GATEWAY_SECRET; then
            echo "::error::Set COURSEFLOW_SECURITY_SMOKE_TOKEN_EXCHANGE_CLIENT_SECRET or COURSEFLOW_STS_API_GATEWAY_SECRET"
            exit 1
          fi

          if is_blank COURSEFLOW_SECURITY_SMOKE_STS_CLIENT_SECRET &&
            is_blank COURSEFLOW_STS_COURSE_SERVICE_SECRET; then
            echo "::error::Set COURSEFLOW_SECURITY_SMOKE_STS_CLIENT_SECRET or COURSEFLOW_STS_COURSE_SERVICE_SECRET"
            exit 1
          fi

      - name: Run Keycloak/OIDC security smoke
        run: node scripts/keycloak-security-smoke.mjs

  promotion-runtime-smoke:
    name: Promotion runtime staging smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_promotion_runtime_smoke
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    env:
      PROMOTION_SMOKE_MODE: staging
      PROMOTION_SMOKE_GATEWAY_URL: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_GATEWAY_URL }}
      PROMOTION_SMOKE_TOKEN_CONVERTER_URL: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_TOKEN_CONVERTER_URL }}
      PROMOTION_SMOKE_PROMOTION_URL: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_PROMOTION_URL }}
      PROMOTION_SMOKE_PROMETHEUS_URL: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_PROMETHEUS_URL }}
      PROMOTION_OBSERVABILITY_REQUIRED_TARGETS: ${{ vars.COURSEFLOW_PROMOTION_OBSERVABILITY_REQUIRED_TARGETS }}
      PROMOTION_OBSERVABILITY_REQUIRED_COUPON_ABUSE_GUARD_RESULTS: ${{ vars.COURSEFLOW_PROMOTION_OBSERVABILITY_REQUIRED_COUPON_ABUSE_GUARD_RESULTS }}
      PROMOTION_OBSERVABILITY_REQUIRED_COUPON_LOOKUP_STORAGE_PATHS: ${{ vars.COURSEFLOW_PROMOTION_OBSERVABILITY_REQUIRED_COUPON_LOOKUP_STORAGE_PATHS }}
      PROMOTION_OBSERVABILITY_FORBIDDEN_COUPON_LOOKUP_STORAGE_PATHS: ${{ vars.COURSEFLOW_PROMOTION_OBSERVABILITY_FORBIDDEN_COUPON_LOOKUP_STORAGE_PATHS }}
      PROMOTION_OBSERVABILITY_MAX_FORBIDDEN_COUPON_LOOKUP_INCREASE: ${{ vars.COURSEFLOW_PROMOTION_OBSERVABILITY_MAX_FORBIDDEN_COUPON_LOOKUP_INCREASE }}
      PROMOTION_OBSERVABILITY_ADMIN_OPERATION_RATE_GUARD_REQUIRED: ${{ vars.COURSEFLOW_PROMOTION_OBSERVABILITY_ADMIN_OPERATION_RATE_GUARD_REQUIRED || 'true' }}
      PROMOTION_OBSERVABILITY_REQUIRED_ADMIN_OPERATION_RATE_GUARD_RESULTS: ${{ vars.COURSEFLOW_PROMOTION_OBSERVABILITY_REQUIRED_ADMIN_OPERATION_RATE_GUARD_RESULTS || 'allowed' }}
      PROMOTION_OBSERVABILITY_REQUIRED_ADMIN_OPERATION_RATE_GUARD_OPERATIONS: ${{ vars.COURSEFLOW_PROMOTION_OBSERVABILITY_REQUIRED_ADMIN_OPERATION_RATE_GUARD_OPERATIONS || 'coupon_import_dry_run' }}
      PROMOTION_OBSERVABILITY_REQUIRED_QUOTA_METRICS: ${{ vars.COURSEFLOW_PROMOTION_OBSERVABILITY_REQUIRED_QUOTA_METRICS }}
      PROMOTION_OBSERVABILITY_REQUIRED_QUOTA_FALLBACK_RESULTS: ${{ vars.COURSEFLOW_PROMOTION_OBSERVABILITY_REQUIRED_QUOTA_FALLBACK_RESULTS }}
      PROMOTION_OBSERVABILITY_CUTOVER_WINDOW: ${{ vars.COURSEFLOW_PROMOTION_OBSERVABILITY_CUTOVER_WINDOW }}
      PROMOTION_CUTOVER_ENVIRONMENT: ${{ vars.COURSEFLOW_PROMOTION_CUTOVER_ENVIRONMENT || 'staging' }}
      PROMOTION_CUTOVER_EVIDENCE_ENABLED: ${{ vars.COURSEFLOW_PROMOTION_CUTOVER_EVIDENCE_ENABLED || 'true' }}
      PROMOTION_CUTOVER_EVIDENCE_SCOPES: ${{ vars.COURSEFLOW_PROMOTION_CUTOVER_EVIDENCE_SCOPES }}
      PROMOTION_CUTOVER_EVIDENCE_FILE: promotion-runtime-smoke-artifacts/promotion-cutover-evidence.json
      PROMOTION_SMOKE_TENANT_ID: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_TENANT_ID }}
      PROMOTION_SMOKE_APPLICATION_ID: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_APPLICATION_ID }}
      PROMOTION_SMOKE_EXPECTED_CAMPAIGN_CODE: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_EXPECTED_CAMPAIGN_CODE }}
      PROMOTION_SMOKE_UNBOUND_APPLICATION_ID: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_UNBOUND_APPLICATION_ID }}
      PROMOTION_SMOKE_SUSPENDED_APPLICATION_ID: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_SUSPENDED_APPLICATION_ID }}
      PROMOTION_SMOKE_SUSPENDED_BINDING_APPLICATION_ID: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_SUSPENDED_BINDING_APPLICATION_ID }}
      PROMOTION_SMOKE_EMPTY_BINDING_APPLICATION_ID: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_EMPTY_BINDING_APPLICATION_ID }}
      PROMOTION_SMOKE_EVALUATE_ONLY_APPLICATION_ID: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_EVALUATE_ONLY_APPLICATION_ID }}
      PROMOTION_SMOKE_COUPON_APPLICATION_ID: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_COUPON_APPLICATION_ID }}
      PROMOTION_SMOKE_COUPON_CAMPAIGN_CODE: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_COUPON_CAMPAIGN_CODE }}
      PROMOTION_SMOKE_QUOTA_APPLICATION_ID: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_QUOTA_APPLICATION_ID }}
      PROMOTION_SMOKE_QUOTA_CAMPAIGN_CODE: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_QUOTA_CAMPAIGN_CODE }}
      PROMOTION_SMOKE_HOT_QUOTA_PARALLEL_ATTEMPTS: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_HOT_QUOTA_PARALLEL_ATTEMPTS }}
      PROMOTION_SMOKE_HOT_QUOTA_SOAK_WAVES: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_HOT_QUOTA_SOAK_WAVES || '1' }}
      PROMOTION_SMOKE_HOT_QUOTA_SOAK_ARTIFACT_FILE: promotion-runtime-smoke-artifacts/promotion-hot-quota-soak.json
      PROMOTION_SMOKE_REQUIRE_COUPON_INVENTORY_READY: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_REQUIRE_COUPON_INVENTORY_READY }}
      PROMOTION_SMOKE_COUPON_IMPORT_GATEWAY_ENABLED: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_COUPON_IMPORT_GATEWAY_ENABLED || 'true' }}
      PROMOTION_SMOKE_COUPON_CAMPAIGN_ID: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_COUPON_CAMPAIGN_ID }}
      PROMOTION_SMOKE_COUPON_FINGERPRINT_KEY_ID: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_COUPON_FINGERPRINT_KEY_ID }}
      PROMOTION_SMOKE_CHECKOUT_CLIENT_SECRET: ${{ secrets.COURSEFLOW_PROMOTION_SMOKE_CHECKOUT_CLIENT_SECRET }}
      PROMOTION_SMOKE_PROMOTION_CLIENT_SECRET: ${{ secrets.COURSEFLOW_PROMOTION_SMOKE_PROMOTION_CLIENT_SECRET }}
      PROMOTION_SMOKE_ADMIN_ACCESS_TOKEN: ${{ secrets.COURSEFLOW_PROMOTION_SMOKE_ADMIN_ACCESS_TOKEN }}
      PROMOTION_SMOKE_COUPON_FINGERPRINT_PEPPER: ${{ secrets.COURSEFLOW_PROMOTION_SMOKE_COUPON_FINGERPRINT_PEPPER }}
      PROMOTION_SMOKE_COUPON_VALID_CODE: ${{ secrets.COURSEFLOW_PROMOTION_SMOKE_COUPON_VALID_CODE }}
      PROMOTION_SMOKE_COUPON_INACTIVE_CODE: ${{ secrets.COURSEFLOW_PROMOTION_SMOKE_COUPON_INACTIVE_CODE }}
      PROMOTION_SMOKE_COUPON_NOT_STARTED_CODE: ${{ secrets.COURSEFLOW_PROMOTION_SMOKE_COUPON_NOT_STARTED_CODE }}
      PROMOTION_SMOKE_COUPON_EXPIRED_CODE: ${{ secrets.COURSEFLOW_PROMOTION_SMOKE_COUPON_EXPIRED_CODE }}
      PROMOTION_SMOKE_COUPON_HOLDER_MISMATCH_CODE: ${{ secrets.COURSEFLOW_PROMOTION_SMOKE_COUPON_HOLDER_MISMATCH_CODE }}
      PROMOTION_SMOKE_COUPON_EXHAUSTED_CODE: ${{ secrets.COURSEFLOW_PROMOTION_SMOKE_COUPON_EXHAUSTED_CODE }}
      PROMOTION_SMOKE_COUPON_INVALID_CODE: ${{ secrets.COURSEFLOW_PROMOTION_SMOKE_COUPON_INVALID_CODE }}
      PROMOTION_SMOKE_COUPON_ABUSE_GUARD_BURST_ATTEMPTS: ${{ vars.COURSEFLOW_PROMOTION_SMOKE_COUPON_ABUSE_GUARD_BURST_ATTEMPTS }}
      PROMOTION_SMOKE_PROMOTION_DATABASE_URL: ${{ secrets.COURSEFLOW_PROMOTION_SMOKE_PROMOTION_DATABASE_URL }}
      PROMOTION_SMOKE_OUTBOX_DATABASE_URL: ${{ secrets.COURSEFLOW_PROMOTION_SMOKE_OUTBOX_DATABASE_URL }}
      PROMOTION_SMOKE_ALLOW_SKIP_DB_CHECKS: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install PostgreSQL client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Validate promotion staging smoke script syntax
        run: |
          node --check scripts/promotion-runtime-smoke.mjs
          node --check scripts/promotion-observability-smoke.mjs

      - name: Validate promotion staging smoke configuration
        run: |
          set -euo pipefail

          require_value() {
            name="$1"
            value="${!name:-}"
            if [ -z "${value//[[:space:]]/}" ]; then
              echo "::error::${name} must be configured for run_promotion_runtime_smoke"
              exit 1
            fi
          }

          require_value PROMOTION_SMOKE_GATEWAY_URL
          require_value PROMOTION_SMOKE_TOKEN_CONVERTER_URL
          require_value PROMOTION_SMOKE_PROMOTION_URL
          require_value PROMOTION_SMOKE_PROMETHEUS_URL
          require_value PROMOTION_SMOKE_EXPECTED_CAMPAIGN_CODE
          require_value PROMOTION_SMOKE_UNBOUND_APPLICATION_ID
          require_value PROMOTION_SMOKE_SUSPENDED_APPLICATION_ID
          require_value PROMOTION_SMOKE_SUSPENDED_BINDING_APPLICATION_ID
          require_value PROMOTION_SMOKE_EMPTY_BINDING_APPLICATION_ID
          require_value PROMOTION_SMOKE_EVALUATE_ONLY_APPLICATION_ID
          require_value PROMOTION_SMOKE_COUPON_APPLICATION_ID
          require_value PROMOTION_SMOKE_COUPON_CAMPAIGN_CODE
          require_value PROMOTION_SMOKE_QUOTA_APPLICATION_ID
          require_value PROMOTION_SMOKE_QUOTA_CAMPAIGN_CODE
          require_value PROMOTION_SMOKE_COUPON_FINGERPRINT_KEY_ID
          require_value PROMOTION_SMOKE_CHECKOUT_CLIENT_SECRET
          require_value PROMOTION_SMOKE_PROMOTION_CLIENT_SECRET
          require_value PROMOTION_SMOKE_COUPON_FINGERPRINT_PEPPER
          require_value PROMOTION_SMOKE_COUPON_VALID_CODE
          require_value PROMOTION_SMOKE_COUPON_INACTIVE_CODE
          require_value PROMOTION_SMOKE_COUPON_NOT_STARTED_CODE
          require_value PROMOTION_SMOKE_COUPON_EXPIRED_CODE
          require_value PROMOTION_SMOKE_COUPON_HOLDER_MISMATCH_CODE
          require_value PROMOTION_SMOKE_COUPON_EXHAUSTED_CODE
          require_value PROMOTION_SMOKE_COUPON_INVALID_CODE
          require_value PROMOTION_SMOKE_PROMOTION_DATABASE_URL
          require_value PROMOTION_SMOKE_OUTBOX_DATABASE_URL

          if [ "${PROMOTION_SMOKE_COUPON_IMPORT_GATEWAY_ENABLED:-false}" = "true" ]; then
            require_value PROMOTION_SMOKE_ADMIN_ACCESS_TOKEN
            require_value PROMOTION_SMOKE_COUPON_CAMPAIGN_ID
          fi

          if [ "${PROMOTION_OBSERVABILITY_ADMIN_OPERATION_RATE_GUARD_REQUIRED:-false}" = "true" ] \
            && [ "${PROMOTION_SMOKE_COUPON_IMPORT_GATEWAY_ENABLED:-false}" != "true" ]; then
            echo "::error::Admin operation guard evidence requires PROMOTION_SMOKE_COUPON_IMPORT_GATEWAY_ENABLED=true"
            exit 1
          fi

          if [ "${PROMOTION_CUTOVER_EVIDENCE_ENABLED:-false}" = "true" ]; then
            require_value PROMOTION_SMOKE_ADMIN_ACCESS_TOKEN
            require_value PROMOTION_CUTOVER_EVIDENCE_SCOPES
          fi

          if [ "${PROMOTION_SMOKE_ALLOW_SKIP_DB_CHECKS:-false}" = "true" ]; then
            echo "::error::Promotion staging smoke must run with database checks enabled"
            exit 1
          fi

          psql --version

      - name: Run promotion runtime staging smoke
        run: |
          set -euo pipefail
          mkdir -p promotion-runtime-smoke-artifacts
          node scripts/promotion-runtime-smoke.mjs 2>&1 | tee promotion-runtime-smoke-artifacts/promotion-runtime-smoke.log

      - name: Run promotion observability staging smoke
        run: |
          set -euo pipefail
          mkdir -p promotion-runtime-smoke-artifacts
          node scripts/promotion-observability-smoke.mjs 2>&1 | tee promotion-runtime-smoke-artifacts/promotion-observability-smoke.log

      - name: Upload promotion runtime smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promotion-runtime-staging-smoke-log
          path: backend/promotion-runtime-smoke-artifacts
          if-no-files-found: ignore

  recommendation-ml-ops-smoke:
    name: Recommendation ML ops staging smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_recommendation_ml_ops_smoke
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    env:
      RECOMMENDATION_ML_SMOKE_URL: ${{ vars.COURSEFLOW_RECOMMENDATION_ML_SMOKE_URL }}
      RECOMMENDATION_ML_SMOKE_ENVIRONMENT: ${{ vars.COURSEFLOW_RECOMMENDATION_ML_SMOKE_ENVIRONMENT || 'staging' }}
      RECOMMENDATION_ML_SMOKE_REQUIRE_HTTPS_URLS: ${{ vars.COURSEFLOW_RECOMMENDATION_ML_SMOKE_REQUIRE_HTTPS_URLS || 'true' }}
      RECOMMENDATION_ML_SMOKE_REJECT_LOCAL_URLS: ${{ vars.COURSEFLOW_RECOMMENDATION_ML_SMOKE_REJECT_LOCAL_URLS || 'true' }}
      RECOMMENDATION_ML_SMOKE_ANALYTICS_URL: ${{ vars.COURSEFLOW_RECOMMENDATION_ML_SMOKE_ANALYTICS_URL }}
      RECOMMENDATION_ML_SMOKE_PROMETHEUS_URL: ${{ vars.COURSEFLOW_RECOMMENDATION_ML_SMOKE_PROMETHEUS_URL }}
      RECOMMENDATION_ML_SMOKE_REQUIRED_TARGETS: ${{ vars.COURSEFLOW_RECOMMENDATION_ML_SMOKE_REQUIRED_TARGETS }}
      RECOMMENDATION_ML_SMOKE_REQUIRE_ACTIVE_MODEL: ${{ vars.COURSEFLOW_RECOMMENDATION_ML_SMOKE_REQUIRE_ACTIVE_MODEL || 'true' }}
      RECOMMENDATION_ML_SMOKE_MUTATION_FLOW_ENABLED: ${{ vars.COURSEFLOW_RECOMMENDATION_ML_SMOKE_MUTATION_FLOW_ENABLED || 'true' }}
      RECOMMENDATION_ML_SMOKE_EXPECT_SYNC_TRAIN_DISABLED: ${{ vars.COURSEFLOW_RECOMMENDATION_ML_SMOKE_EXPECT_SYNC_TRAIN_DISABLED || 'true' }}
      RECOMMENDATION_ML_SMOKE_REQUIRE_PREMINTED_TOKENS: ${{ vars.COURSEFLOW_RECOMMENDATION_ML_SMOKE_REQUIRE_PREMINTED_TOKENS || 'true' }}
      RECOMMENDATION_ML_SMOKE_ANALYTICS_CLIENT_METRIC_REQUIRED: ${{ vars.COURSEFLOW_RECOMMENDATION_ML_SMOKE_ANALYTICS_CLIENT_METRIC_REQUIRED || 'true' }}
      RECOMMENDATION_ML_SMOKE_ANALYTICS_CLIENT_METRIC_WINDOW: ${{ vars.COURSEFLOW_RECOMMENDATION_ML_SMOKE_ANALYTICS_CLIENT_METRIC_WINDOW || '30m' }}
      RECOMMENDATION_ML_SMOKE_MAX_QUEUED_AGE_SECONDS: ${{ vars.COURSEFLOW_RECOMMENDATION_ML_SMOKE_MAX_QUEUED_AGE_SECONDS || '900' }}
      RECOMMENDATION_ML_SMOKE_MAX_RUNNING_AGE_SECONDS: ${{ vars.COURSEFLOW_RECOMMENDATION_ML_SMOKE_MAX_RUNNING_AGE_SECONDS || '3600' }}
      RECOMMENDATION_ML_SMOKE_MAX_PENDING_ACTIVATION_APPROVAL_AGE_SECONDS: ${{ vars.COURSEFLOW_RECOMMENDATION_ML_SMOKE_MAX_PENDING_ACTIVATION_APPROVAL_AGE_SECONDS || '86400' }}
      RECOMMENDATION_ML_SMOKE_MAX_TOKEN_TTL_SECONDS: ${{ vars.COURSEFLOW_RECOMMENDATION_ML_SMOKE_MAX_TOKEN_TTL_SECONDS || '900' }}
      RECOMMENDATION_ML_SMOKE_MAX_EVIDENCE_AGE_HOURS: ${{ vars.COURSEFLOW_RECOMMENDATION_ML_SMOKE_MAX_EVIDENCE_AGE_HOURS || '24' }}
      RECOMMENDATION_ML_SMOKE_MAX_EVIDENCE_FUTURE_SKEW_MINUTES: ${{ vars.COURSEFLOW_RECOMMENDATION_ML_SMOKE_MAX_EVIDENCE_FUTURE_SKEW_MINUTES || '10' }}
      RECOMMENDATION_ML_SMOKE_CRITICAL_ALERTS: ${{ vars.COURSEFLOW_RECOMMENDATION_ML_SMOKE_CRITICAL_ALERTS || 'RecommendationMlNoActiveModel|RecommendationMlTrainingJobsStuck|RecommendationMlMigrationNotReady|RecommendationMlMetricsRefreshFailing|RecommendationMlConsumerFallbackElevated' }}
      RECOMMENDATION_ML_SMOKE_REQUIRED_ALERTS: ${{ vars.COURSEFLOW_RECOMMENDATION_ML_SMOKE_REQUIRED_ALERTS || 'RecommendationMlNoActiveModel,RecommendationMlTrainingJobsStuck,RecommendationMlMigrationNotReady,RecommendationMlMetricsRefreshFailing,RecommendationMlConsumerFallbackElevated' }}
      RECOMMENDATION_ML_SMOKE_CI_PROVIDER: github_actions
      RECOMMENDATION_ML_SMOKE_REPOSITORY: ${{ github.repository }}
      RECOMMENDATION_ML_SMOKE_COMMIT_SHA: ${{ github.sha }}
      RECOMMENDATION_ML_SMOKE_REF: ${{ github.ref_name }}
      RECOMMENDATION_ML_SMOKE_WORKFLOW: ${{ github.workflow }}
      RECOMMENDATION_ML_SMOKE_JOB: recommendation-ml-ops-smoke
      RECOMMENDATION_ML_SMOKE_RUN_ID: ${{ github.run_id }}
      RECOMMENDATION_ML_SMOKE_RUN_ATTEMPT: ${{ github.run_attempt }}
      RECOMMENDATION_ML_SMOKE_ACTOR: ${{ github.actor }}
      RECOMMENDATION_ML_SMOKE_SERVER_URL: ${{ github.server_url }}
      RECOMMENDATION_ML_SMOKE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      RECOMMENDATION_ML_SMOKE_TRAIN_TOKEN: ${{ secrets.COURSEFLOW_RECOMMENDATION_ML_SMOKE_TRAIN_TOKEN }}
      RECOMMENDATION_ML_SMOKE_INFER_TOKEN: ${{ secrets.COURSEFLOW_RECOMMENDATION_ML_SMOKE_INFER_TOKEN }}
      RECOMMENDATION_ML_SMOKE_OPS_TOKEN: ${{ secrets.COURSEFLOW_RECOMMENDATION_ML_SMOKE_OPS_TOKEN }}
      RECOMMENDATION_ML_SMOKE_OPS_CHECKER_TOKEN: ${{ secrets.COURSEFLOW_RECOMMENDATION_ML_SMOKE_OPS_CHECKER_TOKEN }}
      RECOMMENDATION_ML_SMOKE_ANALYTICS_MODEL_TOKEN: ${{ secrets.COURSEFLOW_RECOMMENDATION_ML_SMOKE_ANALYTICS_MODEL_TOKEN }}
      RECOMMENDATION_ML_SMOKE_INTERNAL_JWT_SECRET: ${{ secrets.COURSEFLOW_RECOMMENDATION_ML_SMOKE_INTERNAL_JWT_SECRET }}
      COURSEFLOW_INTERNAL_JWT_SECRET: ${{ secrets.COURSEFLOW_RECOMMENDATION_ML_SMOKE_INTERNAL_JWT_SECRET }}
      RECOMMENDATION_ML_SMOKE_EVIDENCE_FILE: recommendation-ml-smoke-artifacts/recommendation-ml-ops-smoke-evidence.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Recommendation ML ops smoke script syntax
        run: node --check scripts/recommendation-ml-ops-smoke.mjs

      - name: Validate Recommendation ML evidence verifier syntax
        run: node --check scripts/recommendation-ml-evidence-verify.mjs

      - name: Validate Recommendation ML evidence manifest syntax
        run: node --check scripts/recommendation-ml-evidence-manifest.mjs

      - name: Validate Recommendation ML staging smoke configuration
        run: |
          set -euo pipefail

          require_value() {
            name="$1"
            value="${!name:-}"
            if [ -z "${value//[[:space:]]/}" ]; then
              echo "::error::${name} must be configured for run_recommendation_ml_ops_smoke"
              exit 1
            fi
          }

          require_value RECOMMENDATION_ML_SMOKE_URL
          require_value RECOMMENDATION_ML_SMOKE_ENVIRONMENT
          require_value RECOMMENDATION_ML_SMOKE_ANALYTICS_URL
          require_value RECOMMENDATION_ML_SMOKE_PROMETHEUS_URL
          require_value RECOMMENDATION_ML_SMOKE_REQUIRED_TARGETS
          require_value RECOMMENDATION_ML_SMOKE_REQUIRED_ALERTS

          require_https_url() {
            name="$1"
            value="${!name:-}"
            case "$value" in
              https://localhost*|https://127.*|https://0.0.0.0*|https://[[]::1[]]*|https://host.docker.internal*)
                echo "::error::${name} must not point to a local host for staging smoke"
                exit 1
                ;;
              https://*)
                ;;
              *)
                echo "::error::${name} must be an HTTPS URL for staging smoke"
                exit 1
                ;;
            esac
          }

          if [ "${RECOMMENDATION_ML_SMOKE_REQUIRE_HTTPS_URLS:-true}" != "true" ]; then
            echo "::error::Recommendation ML staging smoke must require HTTPS URLs"
            exit 1
          fi
          if [ "${RECOMMENDATION_ML_SMOKE_REJECT_LOCAL_URLS:-true}" != "true" ]; then
            echo "::error::Recommendation ML staging smoke must reject local URLs"
            exit 1
          fi
          require_https_url RECOMMENDATION_ML_SMOKE_URL
          require_https_url RECOMMENDATION_ML_SMOKE_ANALYTICS_URL
          require_https_url RECOMMENDATION_ML_SMOKE_PROMETHEUS_URL

          if [ "${RECOMMENDATION_ML_SMOKE_REQUIRE_ACTIVE_MODEL:-true}" != "true" ]; then
            echo "::error::Recommendation ML production smoke requires an active model"
            exit 1
          fi
          if [ "${RECOMMENDATION_ML_SMOKE_MUTATION_FLOW_ENABLED:-true}" != "true" ]; then
            echo "::error::Recommendation ML staging smoke must enable the maker-checker mutation flow"
            exit 1
          fi
          if [ "${RECOMMENDATION_ML_SMOKE_EXPECT_SYNC_TRAIN_DISABLED:-true}" != "true" ]; then
            echo "::error::Recommendation ML staging smoke must prove sync training is disabled"
            exit 1
          fi
          if [ "${RECOMMENDATION_ML_SMOKE_REQUIRE_PREMINTED_TOKENS:-true}" != "true" ]; then
            echo "::error::Recommendation ML staging smoke must use pre-minted STS/JWKS tokens"
            exit 1
          fi
          if [ "${RECOMMENDATION_ML_SMOKE_ANALYTICS_CLIENT_METRIC_REQUIRED:-true}" != "true" ]; then
            echo "::error::Recommendation ML staging smoke must prove analytics-service ML client metrics"
            exit 1
          fi
          if ! printf '%s' "${RECOMMENDATION_ML_SMOKE_ANALYTICS_CLIENT_METRIC_WINDOW:-}" | grep -Eq '^[1-9][0-9]*[smhd]$'; then
            echo "::error::Recommendation ML analytics metric window must be a Prometheus range like 30m"
            exit 1
          fi
          if ! printf '%s' "${RECOMMENDATION_ML_SMOKE_MAX_QUEUED_AGE_SECONDS:-}" | grep -Eq '^[0-9]+$'; then
            echo "::error::Recommendation ML max queued age must be an integer"
            exit 1
          fi
          if [ "$RECOMMENDATION_ML_SMOKE_MAX_QUEUED_AGE_SECONDS" -gt 900 ]; then
            echo "::error::Recommendation ML max queued age must be <= 900 seconds"
            exit 1
          fi
          if ! printf '%s' "${RECOMMENDATION_ML_SMOKE_MAX_RUNNING_AGE_SECONDS:-}" | grep -Eq '^[0-9]+$'; then
            echo "::error::Recommendation ML max running age must be an integer"
            exit 1
          fi
          if [ "$RECOMMENDATION_ML_SMOKE_MAX_RUNNING_AGE_SECONDS" -gt 3600 ]; then
            echo "::error::Recommendation ML max running age must be <= 3600 seconds"
            exit 1
          fi
          if ! printf '%s' "${RECOMMENDATION_ML_SMOKE_MAX_PENDING_ACTIVATION_APPROVAL_AGE_SECONDS:-}" | grep -Eq '^[0-9]+$'; then
            echo "::error::Recommendation ML max pending activation approval age must be an integer"
            exit 1
          fi
          if [ "$RECOMMENDATION_ML_SMOKE_MAX_PENDING_ACTIVATION_APPROVAL_AGE_SECONDS" -gt 86400 ]; then
            echo "::error::Recommendation ML max pending activation approval age must be <= 86400 seconds"
            exit 1
          fi
          if ! printf '%s' "${RECOMMENDATION_ML_SMOKE_MAX_TOKEN_TTL_SECONDS:-}" | grep -Eq '^[0-9]+$'; then
            echo "::error::Recommendation ML smoke max token TTL must be an integer"
            exit 1
          fi
          if [ "$RECOMMENDATION_ML_SMOKE_MAX_TOKEN_TTL_SECONDS" -lt 60 ] \
            || [ "$RECOMMENDATION_ML_SMOKE_MAX_TOKEN_TTL_SECONDS" -gt 900 ]; then
            echo "::error::Recommendation ML smoke max token TTL must be between 60 and 900 seconds"
            exit 1
          fi
          if ! printf '%s' "${RECOMMENDATION_ML_SMOKE_MAX_EVIDENCE_AGE_HOURS:-}" | grep -Eq '^[0-9]+$'; then
            echo "::error::Recommendation ML smoke max evidence age must be an integer hour value"
            exit 1
          fi
          if [ "$RECOMMENDATION_ML_SMOKE_MAX_EVIDENCE_AGE_HOURS" -lt 1 ] \
            || [ "$RECOMMENDATION_ML_SMOKE_MAX_EVIDENCE_AGE_HOURS" -gt 24 ]; then
            echo "::error::Recommendation ML smoke max evidence age must be between 1 and 24 hours"
            exit 1
          fi
          if ! printf '%s' "${RECOMMENDATION_ML_SMOKE_MAX_EVIDENCE_FUTURE_SKEW_MINUTES:-}" | grep -Eq '^[0-9]+$'; then
            echo "::error::Recommendation ML smoke max evidence future skew must be an integer minute value"
            exit 1
          fi
          if [ "$RECOMMENDATION_ML_SMOKE_MAX_EVIDENCE_FUTURE_SKEW_MINUTES" -lt 0 ] \
            || [ "$RECOMMENDATION_ML_SMOKE_MAX_EVIDENCE_FUTURE_SKEW_MINUTES" -gt 30 ]; then
            echo "::error::Recommendation ML smoke max evidence future skew must be between 0 and 30 minutes"
            exit 1
          fi

          require_value RECOMMENDATION_ML_SMOKE_TRAIN_TOKEN
          require_value RECOMMENDATION_ML_SMOKE_INFER_TOKEN
          require_value RECOMMENDATION_ML_SMOKE_OPS_TOKEN
          require_value RECOMMENDATION_ML_SMOKE_OPS_CHECKER_TOKEN
          require_value RECOMMENDATION_ML_SMOKE_ANALYTICS_MODEL_TOKEN
          require_value RECOMMENDATION_ML_SMOKE_REPOSITORY
          require_value RECOMMENDATION_ML_SMOKE_COMMIT_SHA
          require_value RECOMMENDATION_ML_SMOKE_REF
          require_value RECOMMENDATION_ML_SMOKE_WORKFLOW
          require_value RECOMMENDATION_ML_SMOKE_JOB
          require_value RECOMMENDATION_ML_SMOKE_RUN_ID
          require_value RECOMMENDATION_ML_SMOKE_RUN_ATTEMPT
          require_value RECOMMENDATION_ML_SMOKE_ACTOR
          require_value RECOMMENDATION_ML_SMOKE_RUN_URL
          if ! printf '%s' "$RECOMMENDATION_ML_SMOKE_COMMIT_SHA" | grep -Eq '^[0-9a-fA-F]{40}$'; then
            echo "::error::Recommendation ML smoke commit SHA provenance must be a 40-character Git SHA"
            exit 1
          fi
          if ! printf '%s' "$RECOMMENDATION_ML_SMOKE_RUN_ID" | grep -Eq '^[0-9]+$'; then
            echo "::error::Recommendation ML smoke run ID provenance must be numeric"
            exit 1
          fi
          if ! printf '%s' "$RECOMMENDATION_ML_SMOKE_RUN_ATTEMPT" | grep -Eq '^[0-9]+$'; then
            echo "::error::Recommendation ML smoke run attempt provenance must be numeric"
            exit 1
          fi

      - name: Run Recommendation ML ops staging smoke
        run: |
          set -euo pipefail
          mkdir -p recommendation-ml-smoke-artifacts
          node scripts/recommendation-ml-ops-smoke.mjs 2>&1 | tee recommendation-ml-smoke-artifacts/recommendation-ml-ops-smoke.log

      - name: Validate Recommendation ML ops staging smoke evidence
        run: >
          node scripts/recommendation-ml-evidence-verify.mjs
          recommendation-ml-smoke-artifacts/recommendation-ml-ops-smoke-evidence.json
          --mode=staging
          --expected-environment="${RECOMMENDATION_ML_SMOKE_ENVIRONMENT}"
          --expected-service-url="${RECOMMENDATION_ML_SMOKE_URL}"
          --expected-analytics-url="${RECOMMENDATION_ML_SMOKE_ANALYTICS_URL}"
          --expected-prometheus-url="${RECOMMENDATION_ML_SMOKE_PROMETHEUS_URL}"
          --expected-prometheus-targets="${RECOMMENDATION_ML_SMOKE_REQUIRED_TARGETS}"
          --expected-required-alerts="${RECOMMENDATION_ML_SMOKE_REQUIRED_ALERTS}"
          --expected-max-queued-age-seconds="${RECOMMENDATION_ML_SMOKE_MAX_QUEUED_AGE_SECONDS}"
          --expected-max-running-age-seconds="${RECOMMENDATION_ML_SMOKE_MAX_RUNNING_AGE_SECONDS}"
          --expected-max-pending-activation-approval-age-seconds="${RECOMMENDATION_ML_SMOKE_MAX_PENDING_ACTIVATION_APPROVAL_AGE_SECONDS}"
          --expected-max-token-ttl-seconds="${RECOMMENDATION_ML_SMOKE_MAX_TOKEN_TTL_SECONDS}"
          --expected-analytics-metric-window="${RECOMMENDATION_ML_SMOKE_ANALYTICS_CLIENT_METRIC_WINDOW}"
          --max-age-hours="${RECOMMENDATION_ML_SMOKE_MAX_EVIDENCE_AGE_HOURS}"
          --max-future-skew-minutes="${RECOMMENDATION_ML_SMOKE_MAX_EVIDENCE_FUTURE_SKEW_MINUTES}"
          --expected-repository="${RECOMMENDATION_ML_SMOKE_REPOSITORY}"
          --expected-commit-sha="${RECOMMENDATION_ML_SMOKE_COMMIT_SHA}"
          --expected-ref="${RECOMMENDATION_ML_SMOKE_REF}"
          --expected-workflow="${RECOMMENDATION_ML_SMOKE_WORKFLOW}"
          --expected-job="${RECOMMENDATION_ML_SMOKE_JOB}"
          --expected-run-id="${RECOMMENDATION_ML_SMOKE_RUN_ID}"
          --expected-run-attempt="${RECOMMENDATION_ML_SMOKE_RUN_ATTEMPT}"
          --expected-actor="${RECOMMENDATION_ML_SMOKE_ACTOR}"
          --expected-run-url="${RECOMMENDATION_ML_SMOKE_RUN_URL}"

      - name: Create Recommendation ML ops smoke artifact manifest
        run: >
          node scripts/recommendation-ml-evidence-manifest.mjs
          --output=recommendation-ml-smoke-artifacts/recommendation-ml-ops-smoke-manifest.json
          --checksum-output=recommendation-ml-smoke-artifacts/recommendation-ml-ops-smoke-manifest.json.sha256
          recommendation-ml-smoke-artifacts/recommendation-ml-ops-smoke-evidence.json
          recommendation-ml-smoke-artifacts/recommendation-ml-ops-smoke.log

      - name: Verify Recommendation ML ops smoke artifact manifest
        run: >
          node scripts/recommendation-ml-evidence-manifest.mjs
          --verify=recommendation-ml-smoke-artifacts/recommendation-ml-ops-smoke-manifest.json
          --checksum=recommendation-ml-smoke-artifacts/recommendation-ml-ops-smoke-manifest.json.sha256

      - name: Upload Recommendation ML ops smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recommendation-ml-ops-staging-smoke-artifacts
          path: backend/recommendation-ml-smoke-artifacts
          if-no-files-found: ignore
