server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: identity-auth-v1
          uri: ${IDENTITY_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - RewritePath=/api/v1/(?<segment>auth/.*), /$\{segment}
        - id: identity-user-me
          uri: ${IDENTITY_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/users/me
          filters:
            - RewritePath=/api/v1/(?<segment>users/me), /$\{segment}
        - id: identity-admin-user-assignments
          uri: ${IDENTITY_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/admin/v1/users/*/assignments,/api/admin/v1/users/*/assignments/**
          filters:
            - RewritePath=/api/admin/v1/(?<segment>users/.+), /internal/$\{segment}
        - id: identity-admin-users-root
          uri: ${IDENTITY_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/admin/v1/users,/api/admin/v1/users/
          filters:
            - SetPath=/backoffice/users
        - id: identity-admin-users-child
          uri: ${IDENTITY_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/admin/v1/users/**
          filters:
            - RewritePath=/api/admin/v1/users/(?<segment>.+), /backoffice/users/$\{segment}
        - id: identity-admin-roles
          uri: ${IDENTITY_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/admin/v1/roles,/api/admin/v1/roles/**
          filters:
            - RewritePath=/api/admin/v1/(?<segment>roles.*), /internal/$\{segment}
        - id: identity-admin-permissions
          uri: ${IDENTITY_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/admin/v1/permissions
          filters:
            - SetPath=/internal/permissions
        - id: organization-admin
          uri: ${ORGANIZATION_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/admin/v1/organizations/**,/api/admin/v1/terms,/api/admin/v1/terms/**,/api/admin/v1/sections,/api/admin/v1/sections/**
          filters:
            - RewritePath=/api/admin/v1/(?<segment>.*), /internal/$\{segment}
        - id: enrollment-admin-capacity
          uri: ${ENROLLMENT_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/admin/v1/courses/*/capacity
          filters:
            - RewritePath=/api/admin/v1/(?<segment>.*), /internal/$\{segment}
        - id: course-admin-authoring
          uri: ${COURSE_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/admin/v1/authoring/**
          filters:
            - RewritePath=/api/admin/v1/(?<segment>.*), /internal/$\{segment}
        - id: course-admin
          uri: ${COURSE_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/admin/v1/courses,/api/admin/v1/courses/**
          filters:
            - RewritePath=/api/admin/v1/(?<segment>.*), /internal/$\{segment}
        - id: enrollment-admin
          uri: ${ENROLLMENT_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/admin/v1/enrollments,/api/admin/v1/enrollments/**,/api/admin/v1/waitlist,/api/admin/v1/waitlist/**
          filters:
            - RewritePath=/api/admin/v1/(?<segment>.*), /internal/$\{segment}
        - id: assignment-admin
          uri: ${ASSIGNMENT_SERVICE_URI:http://localhost:8085}
          predicates:
            - Path=/api/admin/v1/assignments,/api/admin/v1/assignments/**,/api/admin/v1/submissions,/api/admin/v1/submissions/**
