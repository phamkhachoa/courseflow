courseflow:
  security:
    external-token:
      # Migration switch:
      # - legacy: verify CourseFlow HS256 tokens from identity-service.
      # - oidc: verify Keycloak/OIDC access tokens with issuer + JWKS + audience.
      # In oidc mode, legacy /api/v1/auth login/register/refresh endpoints are blocked at the edge.
      mode: ${EXTERNAL_TOKEN_MODE:oidc}
      issuer: ${KEYCLOAK_ISSUER_URI:${JWT_ISSUER:}}
      jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:}
      audiences: ${KEYCLOAK_AUDIENCE:courseflow-api}
    jwt:
      # Required only while EXTERNAL_TOKEN_MODE=legacy. Must match identity-service.
      secret: ${COURSEFLOW_JWT_SECRET:}
    token-converter:
      # Gateway must fail closed when the converter cannot mint an internal token.
      mode: ${TOKEN_CONVERTER_MODE:required}
      uri: ${TOKEN_CONVERTER_URI:http://identity-token-converter-service:8080}
      audience: ${COURSEFLOW_INTERNAL_JWT_AUDIENCE:courseflow-services}
      timeout-ms: ${TOKEN_CONVERTER_TIMEOUT_MS:800}
      client-id: ${COURSEFLOW_STS_CLIENT_ID:${spring.application.name:api-gateway}}
      client-secret: ${COURSEFLOW_STS_CLIENT_SECRET:}
    internal-jwt:
      algorithm: ${COURSEFLOW_INTERNAL_JWT_ALGORITHM:HS256}
      secret: ${COURSEFLOW_INTERNAL_JWT_SECRET:}
      public-key: ${COURSEFLOW_INTERNAL_JWT_PUBLIC_KEY:}
      verification-mode: ${COURSEFLOW_INTERNAL_JWT_VERIFICATION_MODE:local}
      jwks-uri: ${COURSEFLOW_INTERNAL_JWT_JWKS_URI:}
      jwks-cache-ttl-seconds: ${COURSEFLOW_INTERNAL_JWT_JWKS_CACHE_TTL_SECONDS:300}
      service-token-mode: ${COURSEFLOW_INTERNAL_SERVICE_TOKEN_MODE:local}
      token-converter-uri: ${TOKEN_CONVERTER_URI:http://identity-token-converter-service:8080}
      sts-client-secret: ${COURSEFLOW_STS_CLIENT_SECRET:}
  cors:
    # Comma-separated allowlist. Defaults cover common local-dev front-end ports.
    # Never use "*" together with allowCredentials.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus


eureka:
  client:
    enabled: ${SERVICE_DISCOVERY_ENABLED:false}
    register-with-eureka: ${SERVICE_DISCOVERY_REGISTER:true}
    fetch-registry: ${SERVICE_DISCOVERY_FETCH:true}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
