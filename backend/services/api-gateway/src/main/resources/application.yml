        - id: quiz-user
          uri: ${QUIZ_SERVICE_URI:http://localhost:8095}
          predicates:
            - Path=/api/v1/quizzes,/api/v1/quizzes/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /internal/$\{segment}
        - id: certificate-user
