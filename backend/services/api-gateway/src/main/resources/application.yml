courseflow:
  security:
    jwt:
      # No default: the gateway fails fast at startup (see JwtSecretProperties) if COURSEFLOW_JWT_SECRET
      # is unset, blank, the old dev placeholder, or shorter than 32 bytes. Must match identity-service.
      secret: ${COURSEFLOW_JWT_SECRET:}
  cors:
    # Comma-separated allowlist. Defaults cover common local-dev front-end ports.
    # Never use "*" together with allowCredentials.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}
management:
  endpoints:
    web:
      exposure:
        include: health
