server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-management-current-user
          uri: ${USER_MANAGEMENT_SERVICE_URI:lb://user-management-service}
          predicates:
            - Path=/api/v1/users/me
          filters:
            - SetPath=/internal/users/me
        - id: user-management-me-profile
          uri: ${USER_MANAGEMENT_SERVICE_URI:lb://user-management-service}
          predicates:
            - Path=/api/v1/users/me/profile
          filters:
            - SetPath=/internal/users/me/profile
        - id: user-management-profile-summaries
          uri: ${USER_MANAGEMENT_SERVICE_URI:lb://user-management-service}
          predicates:
            - Path=/api/v1/profiles/summary:batch
          filters:
            - SetPath=/internal/profiles/summary:batch
        - id: user-management-public-profiles
          uri: ${USER_MANAGEMENT_SERVICE_URI:lb://user-management-service}
          predicates:
            - Path=/api/v1/profiles/**
          filters:
            - RewritePath=/api/v1/(?<segment>profiles/.*), /public/$\{segment}
        - id: user-management-admin-directory
          uri: ${USER_MANAGEMENT_SERVICE_URI:lb://user-management-service}
          predicates:
            - Path=/api/admin/v1/user-directory
          filters:
            - SetPath=/backoffice/users
        - id: access-control-admin-user-assignments
          uri: ${ACCESS_CONTROL_SERVICE_URI:lb://access-control-service}
          predicates:
            - Path=/api/admin/v1/users/*/assignments,/api/admin/v1/users/*/assignments/**,/api/admin/v1/users/*/assignments:export
          filters:
            - RewritePath=/api/admin/v1/(?<segment>users/.+), /internal/$\{segment}
        - id: user-management-admin-users-root-read
          uri: ${USER_MANAGEMENT_SERVICE_URI:lb://user-management-service}
          predicates:
            - Path=/api/admin/v1/users,/api/admin/v1/users/
            - Method=GET
          filters:
            - SetPath=/backoffice/admin-users
        - id: user-management-admin-users-root-create
          uri: ${USER_MANAGEMENT_SERVICE_URI:lb://user-management-service}
          predicates:
            - Path=/api/admin/v1/users,/api/admin/v1/users/
            - Method=POST
          filters:
            - SetPath=/backoffice/admin-users
        - id: user-management-admin-users-detail-read
          uri: ${USER_MANAGEMENT_SERVICE_URI:lb://user-management-service}
          predicates:
            - Path=/api/admin/v1/users/{userId}
            - Method=GET
          filters:
            - RewritePath=/api/admin/v1/users/(?<userId>[^/]+), /backoffice/admin-users/$\{userId}
        - id: user-management-admin-users-privacy-export
          uri: ${USER_MANAGEMENT_SERVICE_URI:lb://user-management-service}
