server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: analytics-service
  datasource:
    url: ${ANALYTICS_DB_URL:jdbc:postgresql://localhost:5432/cf_analytics}
    username: ${ANALYTICS_DB_USERNAME:courseflow}
    password: ${ANALYTICS_DB_PASSWORD:courseflow}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog.xml
    contexts: ${SPRING_LIQUIBASE_CONTEXTS:prod}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: analytics-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record
courseflow:
  entitlement:
    enrollment-service-url: ${ENROLLMENT_SERVICE_URL:http://enrollment-service:8080}
    course-service-url: ${COURSE_SERVICE_URL:http://course-service:8080}
  analytics:
    recommendation-ml:
      enabled: ${RECOMMENDATION_ML_ENABLED:true}
      service-url: ${RECOMMENDATION_ML_SERVICE_URL:http://recommendation-ml-service:8080}
      timeout-ms: ${RECOMMENDATION_ML_TIMEOUT_MS:2500}
      max-training-events: ${RECOMMENDATION_ML_MAX_TRAINING_EVENTS:250000}
      materialization:
        enabled: ${RECOMMENDATION_ML_MATERIALIZATION_ENABLED:true}
        fixed-delay-ms: ${RECOMMENDATION_ML_MATERIALIZATION_FIXED_DELAY_MS:30000}
        min-check-interval-ms: ${RECOMMENDATION_ML_MATERIALIZATION_MIN_CHECK_INTERVAL_MS:30000}
        batch-size: ${RECOMMENDATION_ML_MATERIALIZATION_BATCH_SIZE:25}
        worker-id: ${RECOMMENDATION_ML_MATERIALIZATION_WORKER_ID:analytics-service}
        lock-lease-ms: ${RECOMMENDATION_ML_MATERIALIZATION_LOCK_LEASE_MS:300000}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus


eureka:
  client:
    enabled: ${SERVICE_DISCOVERY_ENABLED:false}
    register-with-eureka: ${SERVICE_DISCOVERY_REGISTER:true}
    fetch-registry: ${SERVICE_DISCOVERY_FETCH:true}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
