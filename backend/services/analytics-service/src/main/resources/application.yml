server:
  port: 8093
spring:
  application:
    name: analytics-service
  datasource:
    url: ${ANALYTICS_DB_URL:jdbc:postgresql://localhost:5432/cf_analytics}
    username: ${ANALYTICS_DB_USERNAME:courseflow}
    password: ${ANALYTICS_DB_PASSWORD:courseflow}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog.xml
    contexts: ${SPRING_LIQUIBASE_CONTEXTS:prod}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: analytics-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record
courseflow:
  security:
    service-token: ${COURSEFLOW_SERVICE_TOKEN:}
  entitlement:
    enrollment-service-url: ${ENROLLMENT_SERVICE_URL:http://localhost:8084}
    course-service-url: ${COURSE_SERVICE_URL:http://localhost:8083}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
