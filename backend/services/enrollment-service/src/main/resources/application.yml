server:
  port: 8084
spring:
  application:
    name: enrollment-service
  datasource:
    url: ${ENROLLMENT_DB_URL:jdbc:postgresql://localhost:5432/cf_enrollment}
    username: ${ENROLLMENT_DB_USERNAME:courseflow}
    password: ${ENROLLMENT_DB_PASSWORD:courseflow}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog.xml
    contexts: ${SPRING_LIQUIBASE_CONTEXTS:prod}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: enrollment-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
courseflow:  entitlement:
    course-service-url: ${COURSE_SERVICE_URL:http://localhost:8083}
    enrollment-service-url: ${ENROLLMENT_SERVICE_URL:http://localhost:8084}
  enrollment:
    default-capacity: ${ENROLLMENT_DEFAULT_CAPACITY:100}
