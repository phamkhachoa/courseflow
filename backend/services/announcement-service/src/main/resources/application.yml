server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: announcement-service
  datasource:
    url: ${ANNOUNCEMENT_DB_URL:jdbc:postgresql://localhost:5432/cf_announcement}
    username: ${ANNOUNCEMENT_DB_USERNAME:courseflow}
    password: ${ANNOUNCEMENT_DB_PASSWORD:courseflow}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog.xml
    contexts: ${SPRING_LIQUIBASE_CONTEXTS:prod}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
courseflow:
  entitlement:
    enrollment-service-url: ${ENROLLMENT_SERVICE_URL:http://enrollment-service:8080}
    course-service-url: ${COURSE_SERVICE_URL:http://course-service:8080}
  outbox:
    poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:1000}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus


eureka:
  client:
    enabled: ${SERVICE_DISCOVERY_ENABLED:false}
    register-with-eureka: ${SERVICE_DISCOVERY_REGISTER:true}
    fetch-registry: ${SERVICE_DISCOVERY_FETCH:true}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
