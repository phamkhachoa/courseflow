server:
  port: 8087
spring:
  application:
    name: announcement-service
  datasource:
    url: ${ANNOUNCEMENT_DB_URL:jdbc:postgresql://localhost:5432/cf_announcement}
    username: ${ANNOUNCEMENT_DB_USERNAME:courseflow}
    password: ${ANNOUNCEMENT_DB_PASSWORD:courseflow}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog.xml
    contexts: ${LIQUIBASE_CONTEXTS:prod}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
courseflow:
  outbox:
    poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:1000}
management:
  endpoints:
    web:
      exposure:
        include: health
