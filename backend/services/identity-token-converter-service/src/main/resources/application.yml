server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: identity-token-converter-service
courseflow:
  security:
    external-token:
      issuer: ${KEYCLOAK_ISSUER_URI:}
      jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:}
      audiences: ${KEYCLOAK_AUDIENCE:courseflow-api}
    internal-jwt:
      algorithm: ${COURSEFLOW_INTERNAL_JWT_ALGORITHM:HS256}
      secret: ${COURSEFLOW_INTERNAL_JWT_SECRET:}
      private-key: ${COURSEFLOW_INTERNAL_JWT_PRIVATE_KEY:}
      public-key: ${COURSEFLOW_INTERNAL_JWT_PUBLIC_KEY:}
      verification-mode: ${COURSEFLOW_INTERNAL_JWT_VERIFICATION_MODE:local}
      jwks-uri: ${COURSEFLOW_INTERNAL_JWT_JWKS_URI:}
      jwks-cache-ttl-seconds: ${COURSEFLOW_INTERNAL_JWT_JWKS_CACHE_TTL_SECONDS:300}
      issuer: ${COURSEFLOW_INTERNAL_JWT_ISSUER:courseflow-token-converter}
      audience: ${COURSEFLOW_INTERNAL_JWT_AUDIENCE:courseflow-services}
      allowed-audiences: ${COURSEFLOW_INTERNAL_JWT_ALLOWED_AUDIENCES:courseflow-services}
      ttl-seconds: ${COURSEFLOW_INTERNAL_JWT_TTL_SECONDS:180}
      clock-skew-seconds: ${COURSEFLOW_INTERNAL_JWT_CLOCK_SKEW_SECONDS:30}
    sts:
      client-secret: ${COURSEFLOW_STS_CLIENT_SECRET:}
      client-secrets: ${COURSEFLOW_STS_CLIENT_SECRETS:}
      allowed-clients: ${COURSEFLOW_STS_ALLOWED_CLIENTS:api-gateway,access-control-service,user-management-service,organization-service,course-service,enrollment-service,assignment-service,deadline-service,announcement-service,portfolio-service,discussion-service,notification-service,chat-service,media-service,search-service,analytics-service,gradebook-service,quiz-service,certificate-service,peer-review-service,live-session-service,review-service,checkout-service,promotion-service,loyalty-service,outbox-relay}
      allowed-service-scopes: ${COURSEFLOW_STS_ALLOWED_SERVICE_SCOPES:internal:service,internal:token-exchange,internal:user,internal:identity:resolve,internal:identity:provision,internal:authz:check,internal:authz:assert-topology,internal:user-directory:read,internal:user-directory:write,internal:role-assignment:read,internal:role-assignment:write,internal:role-management:read,internal:role-management:write,internal:profile:read,internal:profile:write,internal:backoffice,internal:promotion:admin,internal:promotion:evaluate,internal:promotion:reserve,internal:promotion:commit,internal:promotion:cancel,internal:promotion:reverse,internal:loyalty:admin,internal:loyalty:read,internal:loyalty:earn,internal:loyalty:burn,internal:loyalty:reverse,internal:loyalty:adjust,internal:loyalty:expire}
      client-scopes: ${COURSEFLOW_STS_CLIENT_SCOPES:}
    access-control:
      uri: ${ACCESS_CONTROL_SERVICE_URI:http://access-control-service:8080}
      mode: ${ACCESS_CONTROL_RESOLUTION_MODE:required}
      timeout-ms: ${ACCESS_CONTROL_TIMEOUT_MS:800}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus


eureka:
  client:
    enabled: ${SERVICE_DISCOVERY_ENABLED:false}
    register-with-eureka: ${SERVICE_DISCOVERY_REGISTER:true}
    fetch-registry: ${SERVICE_DISCOVERY_FETCH:true}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
