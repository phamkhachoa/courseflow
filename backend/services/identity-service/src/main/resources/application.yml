server:
  port: 8081
spring:
  application:
    name: identity-service
  datasource:
    # Local-dev defaults only. In production set IDENTITY_DB_USERNAME / IDENTITY_DB_PASSWORD
    # (and IDENTITY_DB_URL) via the environment — never ship the courseflow/courseflow default.
    url: ${IDENTITY_DB_URL:jdbc:postgresql://localhost:5432/cf_identity}
    username: ${IDENTITY_DB_USERNAME:courseflow}
    password: ${IDENTITY_DB_PASSWORD:courseflow}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog.xml
    contexts: ${LIQUIBASE_CONTEXTS:prod}
courseflow:
  security:
    require-mfa-for-operators: ${REQUIRE_MFA_FOR_OPERATORS:false}
    require-verified-email: ${REQUIRE_VERIFIED_EMAIL:false}
    jwt:
      # No default: the service fails fast at startup (see JwtProperties) if COURSEFLOW_JWT_SECRET
      # is unset, blank, the old dev placeholder, or shorter than 32 bytes. Must match the gateway.
      secret: ${COURSEFLOW_JWT_SECRET:}
      access-token-ttl-seconds: ${ACCESS_TOKEN_TTL_SECONDS:900}
      refresh-token-ttl-seconds: ${REFRESH_TOKEN_TTL_SECONDS:604800}
      issuer: ${JWT_ISSUER:courseflow-identity}
      clock-skew-seconds: ${JWT_CLOCK_SKEW_SECONDS:60}
management:
  endpoints:
    web:
      exposure:
        include: health
