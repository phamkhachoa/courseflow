server:
  port: 8086
spring:
  application:
    name: deadline-service
  datasource:
    url: ${DEADLINE_DB_URL:jdbc:postgresql://localhost:5432/cf_deadline}
    username: ${DEADLINE_DB_USERNAME:courseflow}
    password: ${DEADLINE_DB_PASSWORD:courseflow}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog.xml
    contexts: ${SPRING_LIQUIBASE_CONTEXTS:prod}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
courseflow:  deadline:
    reminders:
      auto-dispatch-enabled: ${DEADLINE_REMINDER_AUTO_DISPATCH_ENABLED:true}
      dispatch-interval-ms: ${DEADLINE_REMINDER_DISPATCH_INTERVAL_MS:60000}
  entitlement:
    enrollment-service-url: ${ENROLLMENT_SERVICE_URL:http://localhost:8084}
    course-service-url: ${COURSE_SERVICE_URL:http://localhost:8083}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
