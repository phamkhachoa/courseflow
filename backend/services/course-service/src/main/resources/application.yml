server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: course-service
  datasource:
    url: ${COURSE_DB_URL:jdbc:postgresql://localhost:5432/cf_course}
    username: ${COURSE_DB_USERNAME:courseflow}
    password: ${COURSE_DB_PASSWORD:courseflow}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog.xml
    contexts: ${SPRING_LIQUIBASE_CONTEXTS:prod}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
courseflow:
  entitlement:
    enrollment-service-url: ${ENROLLMENT_SERVICE_URL:http://enrollment-service:8080}
    course-service-url: ${COURSE_SERVICE_URL:http://course-service:8080}
  content:
    assignment-service-url: ${ASSIGNMENT_SERVICE_URL:http://assignment-service:8080}
    media-service-url: ${MEDIA_SERVICE_URL:http://media-service:8080}
    quiz-service-url: ${QUIZ_SERVICE_URL:http://quiz-service:8080}
  certificate:
    service-url: ${CERTIFICATE_SERVICE_URL:http://certificate-service:8080}
    eligibility-timeout-ms: ${CERTIFICATE_ELIGIBILITY_TIMEOUT_MS:1500}


eureka:
  client:
    enabled: ${SERVICE_DISCOVERY_ENABLED:false}
    register-with-eureka: ${SERVICE_DISCOVERY_REGISTER:true}
    fetch-registry: ${SERVICE_DISCOVERY_FETCH:true}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
