server:
  port: 8096
spring:
  application:
    name: certificate-service
  datasource:
    url: ${CERTIFICATE_DB_URL:jdbc:postgresql://localhost:5432/cf_certificate}
    username: ${CERTIFICATE_DB_USERNAME:courseflow}
    password: ${CERTIFICATE_DB_PASSWORD:courseflow}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog.xml
    contexts: ${LIQUIBASE_CONTEXTS:prod}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: certificate-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record
courseflow:
  certificate:
    public-base-url: ${CERTIFICATE_PUBLIC_BASE_URL:http://localhost:3000/certificates/verify}
management:
  endpoints:
    web:
      exposure:
        include: health
