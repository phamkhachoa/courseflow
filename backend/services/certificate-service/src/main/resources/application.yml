server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: certificate-service
  datasource:
    url: ${CERTIFICATE_DB_URL:jdbc:postgresql://localhost:5432/cf_certificate}
    username: ${CERTIFICATE_DB_USERNAME:courseflow}
    password: ${CERTIFICATE_DB_PASSWORD:courseflow}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog.xml
    contexts: ${SPRING_LIQUIBASE_CONTEXTS:prod}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: certificate-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record
courseflow:
  certificate:
    public-base-url: ${CERTIFICATE_PUBLIC_BASE_URL:http://localhost:3000/certificates/verify}
    course-service-url: ${CERTIFICATE_COURSE_SERVICE_URL:${COURSE_SERVICE_URL:http://course-service:8080}}
    enrollment-service-url: ${CERTIFICATE_ENROLLMENT_SERVICE_URL:${ENROLLMENT_SERVICE_URL:http://enrollment-service:8080}}
    eligibility-timeout-ms: ${CERTIFICATE_ELIGIBILITY_TIMEOUT_MS:1500}
    gradebook-service-url: ${CERTIFICATE_GRADEBOOK_SERVICE_URL:${GRADEBOOK_SERVICE_URL:http://gradebook-service:8080}}
    signing-secret: ${CERTIFICATE_SIGNING_SECRET:${COURSEFLOW_CERTIFICATE_SIGNING_SECRET:}}
  security:
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus


eureka:
  client:
    enabled: ${SERVICE_DISCOVERY_ENABLED:false}
    register-with-eureka: ${SERVICE_DISCOVERY_REGISTER:true}
    fetch-registry: ${SERVICE_DISCOVERY_FETCH:true}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
