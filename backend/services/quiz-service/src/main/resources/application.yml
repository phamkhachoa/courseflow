server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: quiz-service
  datasource:
    url: ${QUIZ_DB_URL:jdbc:postgresql://localhost:5432/cf_quiz}
    username: ${QUIZ_DB_USERNAME:courseflow}
    password: ${QUIZ_DB_PASSWORD:courseflow}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog.xml
    contexts: ${SPRING_LIQUIBASE_CONTEXTS:prod}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
courseflow:  entitlement:
    course-service-url: ${COURSE_SERVICE_URL:http://course-service:8080}
    enrollment-service-url: ${ENROLLMENT_SERVICE_URL:http://enrollment-service:8080}
  quiz:
    expiry-sweep-interval-ms: ${QUIZ_EXPIRY_SWEEP_INTERVAL_MS:60000}


eureka:
  client:
    enabled: ${SERVICE_DISCOVERY_ENABLED:false}
    register-with-eureka: ${SERVICE_DISCOVERY_REGISTER:true}
    fetch-registry: ${SERVICE_DISCOVERY_FETCH:true}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
