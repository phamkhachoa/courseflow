global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: courseflow-api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: courseflow-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - identity-service:8081
          - organization-service:8082
          - course-service:8083
          - enrollment-service:8084
          - assignment-service:8085
          - deadline-service:8086
          - announcement-service:8087
          - portfolio-service:8088
          - discussion-service:8089
          - notification-service:8090
          - media-service:8091
          - search-service:8092
          - analytics-service:8093
          - gradebook-service:8094
          - quiz-service:8095
          - certificate-service:8096
          - peer-review-service:8097
          - live-session-service:8101
          - review-service:8102
          - outbox-relay:8103
          - chat-service:8104
