x-service-common: &service-common
  restart: unless-stopped
  environment:
    <<: *service-env
  depends_on:
    postgres:
      condition: service_healthy
    kafka:
      condition: service_started
    mongo:
      condition: service_started
    redis:
      condition: service_started
    elasticsearch:
      condition: service_started
    minio-setup:
      condition: service_completed_successfully

services:
  api-gateway:
    <<: *service-common
    build:
      <<: *build-common
      args:
        MODULE: services/api-gateway
    environment:
      <<: *service-env
      ACCESS_CONTROL_SERVICE_URI: http://access-control-service:8106
      USER_MANAGEMENT_SERVICE_URI: http://user-management-service:8107
      ORGANIZATION_SERVICE_URI: http://organization-service:8082
      COURSE_SERVICE_URI: http://course-service:8083
      ENROLLMENT_SERVICE_URI: http://enrollment-service:8084
      ASSIGNMENT_SERVICE_URI: http://assignment-service:8085
      DEADLINE_SERVICE_URI: http://deadline-service:8086
      ANNOUNCEMENT_SERVICE_URI: http://announcement-service:8087
      PORTFOLIO_SERVICE_URI: http://portfolio-service:8088
      DISCUSSION_SERVICE_URI: http://discussion-service:8089
      NOTIFICATION_SERVICE_URI: http://notification-service:8090
      CHAT_SERVICE_URI: http://chat-service:8104
