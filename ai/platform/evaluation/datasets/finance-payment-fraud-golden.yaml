version: 1
dataset_id: finance-payment-fraud-golden-v1
model_id: finance-payment-fraud-baseline-v1
product: billing-finance
use_case_id: finance-payment-fraud-scoring
module: models/anomaly_fraud/payment_fraud_baseline/payment_fraud_baseline.py
feature_contract: contracts/features/finance-payment-risk-features.v1.yaml
model_io_contract: contracts/models/finance-payment-fraud-model-io.v1.yaml
thresholds:
  risk_band_accuracy_min: 1.0
  reason_code_recall_min: 0.85
  entity_link_recall_min: 0.85
  human_review_policy_pass_rate_min: 1.0
  score_threshold_pass_rate_min: 1.0
  risk_ordering_pass_rate_min: 1.0
cases:
  - case_id: fraud-high-entity-network
    input:
      tenant_id: tenant-finance
      payment_id: pay-001
      account_hash: acct_hash_001
      counterparty_hash: cp_hash_001
      amount_minor: 1250000
      currency: USD
      payment_method: card_not_present
      country_code: VN
      device_fingerprint_hash: dev_hash_001
      velocity_1h: 6
      velocity_24h: 16
      prior_failed_attempts_7d: 4
      account_age_days: 3
      verified_payment_methods_count: 0
      linked_account_count: 6
      shared_counterparty_count: 5
      prior_chargeback_count: 2
      risk_review_outcome: watchlist
    expected:
      risk_band: high
      min_risk_score: 0.95
      max_risk_score: 1.0
      risk_order: 4
      requires_human_review: true
      automated_adverse_action_allowed: false
      reason_codes:
        - HIGH_VALUE_PAYMENT
        - HIGH_VELOCITY_1H
        - FAILED_ATTEMPT_SPIKE
        - SHARED_COUNTERPARTY_NETWORK
        - PRIOR_CHARGEBACK_HISTORY
