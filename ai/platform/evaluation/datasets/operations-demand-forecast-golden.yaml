version: 1
dataset_id: operations-demand-forecast-golden-v1
model_id: operations-demand-forecast-baseline-v1
product: enterprise-operations
use_case_id: operations-demand-forecasting
module: models/forecasting/demand_forecast_baseline/demand_forecast_baseline.py
feature_contract: contracts/features/operations-demand-features.v1.yaml
model_io_contract: contracts/models/operations-demand-forecast-model-io.v1.yaml
thresholds:
  demand_band_accuracy_min: 1.0
  staffing_recommendation_accuracy_min: 1.0
  reason_code_recall_min: 0.85
  forecast_threshold_pass_rate_min: 1.0
  human_review_policy_pass_rate_min: 1.0
  forecast_ordering_pass_rate_min: 1.0
cases:
  - case_id: event-incident-surge
    input:
      tenant_id: tenant-ops
      forecast_id: fc-1001
      queue_id: support-identity
      historical_demand:
        - 78
        - 82
        - 84
        - 96
        - 114
        - 132
      planned_capacity: 110
      backlog_open_items: 28
      avg_handle_minutes: 52
      seasonal_index: 1.08
      special_event: true
      incident_open: true
      forecast_horizon_days: 7
      service_level_target: 0.92
    expected:
      demand_band: high
      staffing_recommendation: trigger_capacity_plan
      requires_human_review: true
      min_forecast_units: 190
      max_forecast_units: 215
      forecast_order: 4
      reason_codes:
        - DEMAND_TREND_UP
        - SPECIAL_EVENT_SPIKE
        - OPEN_INCIDENT_RISK
        - CAPACITY_SHORTFALL

  - case_id: stable-general-workload
    input:
      tenant_id: tenant-ops
      forecast_id: fc-1002
      queue_id: support-general
      historical_demand:
        - 96
        - 98
        - 100
        - 99
        - 101
        - 100
      planned_capacity: 108
      backlog_open_items: 3
      avg_handle_minutes: 24
      seasonal_index: 1.0
      special_event: false
      incident_open: false
      forecast_horizon_days: 7
      service_level_target: 0.85
    expected:
      demand_band: normal
      staffing_recommendation: maintain_capacity
      requires_human_review: false
      min_forecast_units: 98
      max_forecast_units: 105
      forecast_order: 2
      reason_codes:
        - DEMAND_STABLE

  - case_id: declining-demand-capacity-surplus
    input:
      tenant_id: tenant-ops
      forecast_id: fc-1003
      queue_id: support-billing
      historical_demand:
        - 150
        - 136
        - 120
        - 94
        - 82
        - 68
      planned_capacity: 120
      backlog_open_items: 0
      avg_handle_minutes: 28
      seasonal_index: 0.92
      special_event: false
      incident_open: false
      forecast_horizon_days: 7
      service_level_target: 0.8
    expected:
      demand_band: low
      staffing_recommendation: reduce_or_reallocate_capacity
      requires_human_review: false
      min_forecast_units: 50
      max_forecast_units: 70
      forecast_order: 1
      reason_codes:
        - DEMAND_TREND_DOWN
        - CAPACITY_SURPLUS

  - case_id: elevated-backlog-pressure
    input:
      tenant_id: tenant-ops
      forecast_id: fc-1004
      queue_id: support-refunds
      historical_demand:
        - 80
        - 84
        - 86
        - 90
        - 94
        - 98
      planned_capacity: 100
      backlog_open_items: 18
      avg_handle_minutes: 36
      seasonal_index: 1.02
      special_event: false
      incident_open: false
      forecast_horizon_days: 7
      service_level_target: 0.9
    expected:
      demand_band: elevated
      staffing_recommendation: add_staffing
      requires_human_review: false
      min_forecast_units: 104
      max_forecast_units: 112
      forecast_order: 3
      reason_codes:
        - DEMAND_TREND_UP
        - BACKLOG_PRESSURE
        - STRICT_SERVICE_LEVEL_TARGET
