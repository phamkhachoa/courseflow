version: 1
dataset_id: support-knowledge-hybrid-retrieval-shadow-v1
owner: ai-platform
product: support-platform
use_case_id: support-agent-assist
model_id: support-knowledge-hybrid-retriever-shadow-v1
collection: support_knowledge_articles
corpus: platform/evaluation/corpora/support-knowledge-corpus.yaml
collection_schema: platform/vector-store/collections/support-knowledge.yaml
description: Shadow evaluation for support knowledge hybrid lexical/vector retrieval.
config:
  k: 3
  index_id: support-knowledge-vector-index-baseline-v1
  algorithm: deterministic_hash_embedding_baseline_v1
  lexical_weight: 0.60
  vector_weight: 0.40
thresholds:
  lexical_recall_at_k_min: 1.00
  vector_recall_at_k_min: 1.00
  hybrid_recall_at_k_min: 1.00
  hybrid_not_worse_than_lexical_rate_min: 1.00
  tenant_isolation_rate_min: 1.00
queries:
  - query_id: support-hybrid-001
    tenant_id: tenant-a
    query: duplicate payment refund invoice charge
    expected_chunk_ids:
      - support-billing-refund-duplicate-charge

  - query_id: support-hybrid-002
    tenant_id: tenant-a
    query: administrators blocked by MFA timeout login
    expected_chunk_ids:
      - support-access-mfa-timeout

  - query_id: support-hybrid-003
    tenant_id: tenant-a
    query: API integration jobs fail after timeout
    expected_chunk_ids:
      - support-technical-api-timeout

  - query_id: support-hybrid-004
    tenant_id: tenant-a
    query: update organization admin profile email
    expected_chunk_ids:
      - support-account-admin-email
