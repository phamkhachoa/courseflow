version: 1
owner: ai-platform
policy_id: llm-provider-credential-readiness-v1
allowed_live_credential_ref_schemes:
  - vault://
  - aws-sm://
  - gcp-sm://
  - azure-kv://
max_rotation_days: 90
required_live_deployment_checks:
  - secret_ref_resolves_in_runtime_environment
  - network_egress_allowlist_applied
  - provider_cost_monitoring_configured
  - prompt_gateway_mandatory_in_service_path
next_actions:
  - connect_live_provider_secret_ref_without_plaintext_secret
  - validate_secret_rotation_control_plane_before_live_activation
  - run_provider_alert_delivery_drill_before_live_activation
providers:
  - provider_id: contract-stub-llm-v1
    credential_mode: local_stub
    credential_ref: local://contract-stub/no-secret
    rotation_required: false
    rotation_days: 0
    deployment_checks:
      - contract_stub_no_network
      - prompt_gateway_mandatory_in_service_path
  - provider_id: contract-stub-llm-failover-v1
    credential_mode: local_stub
    credential_ref: local://contract-stub/no-secret
    rotation_required: false
    rotation_days: 0
    deployment_checks:
      - contract_stub_no_network
      - prompt_gateway_mandatory_in_service_path
