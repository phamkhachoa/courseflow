version: 1
owner: ai-platform
policy_id: routing-policy-access-policy-v1
defaults:
  wildcard_scopes_allowed: false
  tenant_isolation_required: true
  direct_identifier_submission_allowed: false
  online_policy_activation_allowed: false
scope_aliases:
  recommend: internal:ai-platform:routing-policy:recommend
  ops: internal:ai-platform:routing-policy:ops
principals:
  - principal_id: service:ai-platform-routing-ops
    owner_role: Admin/Ops
    product: ai-platform
    scopes:
      - ops
    tenant_ids: []
    product_ids: []
    use_case_ids: []

  - principal_id: service:enterprise-operations-routing
    owner_role: Enterprise Operations routing service
    product: enterprise-operations
    scopes:
      - recommend
    tenant_ids:
      - tenant-ops
      - tenant-ops-sandbox
    product_ids:
      - enterprise-operations
    use_case_ids:
      - operations-routing-optimization
