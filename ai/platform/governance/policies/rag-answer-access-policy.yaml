version: 1
owner: ai-platform
policy_id: rag-answer-access-policy-v1
defaults:
  wildcard_scopes_allowed: false
  tenant_isolation_required: true
  citation_required: true
  external_auto_send_allowed: false
scope_aliases:
  answer: internal:ai-platform:rag-answer:answer
  ops: internal:ai-platform:rag-answer:ops
principals:
  - principal_id: service:ai-platform-rag-answer-ops
    owner_role: Admin/Ops
    product: ai-platform
    scopes:
      - ops
    tenant_ids: []
    product_ids: []
    use_case_ids: []
    collection_ids: []

  - principal_id: service:lms-courseflow-rag-answer
    owner_role: CourseFlow LMS service
    product: lms-courseflow
    scopes:
      - answer
    tenant_ids:
      - tenant-a
      - tenant-lms
    product_ids:
      - lms-courseflow
    use_case_ids:
      - lms-rag-tutor
    collection_ids:
      - course_content_chunks

  - principal_id: service:support-platform-rag-answer
    owner_role: Support Platform service
    product: support-platform
    scopes:
      - answer
    tenant_ids:
      - tenant-a
      - tenant-support
    product_ids:
      - support-platform
    use_case_ids:
      - support-agent-assist
    collection_ids:
      - support_knowledge_articles

  - principal_id: service:enterprise-knowledge-rag-answer
    owner_role: Enterprise Knowledge service
    product: ai-platform
    scopes:
      - answer
    tenant_ids:
      - tenant-a
      - tenant-enterprise
    product_ids:
      - ai-platform
    use_case_ids:
      - enterprise-knowledge-assistant
    collection_ids:
      - course_content_chunks
      - support_knowledge_articles
