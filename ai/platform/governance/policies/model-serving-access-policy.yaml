version: 1
owner: ai-platform
policy_id: model-serving-access-policy-v1
defaults:
  wildcard_scopes_allowed: false
  tenant_isolation_required: true
scope_aliases:
  catalog: internal:ai-platform:model-serving:catalog
  invoke: internal:ai-platform:model-serving:invoke
  ops: internal:ai-platform:model-serving:ops
principals:
  - principal_id: service:ai-platform-ops
    owner_role: Admin/Ops
    product: ai-platform
    scopes:
      - catalog
      - ops
    tenant_ids: []
    model_ids: []

  - principal_id: service:lms-courseflow-serving
    owner_role: CourseFlow LMS service
    product: lms-courseflow
    scopes:
      - catalog
      - invoke
    tenant_ids:
      - tenant-lms
    model_ids:
      - sequence-risk-baseline-v1

  - principal_id: service:support-platform-serving
    owner_role: Support Platform service
    product: support-platform
    scopes:
      - catalog
      - invoke
    tenant_ids:
      - tenant-support
    model_ids:
      - support-agent-assist-baseline-v1
      - support-sla-risk-baseline-v1

  - principal_id: service:finance-risk-serving
    owner_role: Billing/Finance service
    product: billing-finance
    scopes:
      - catalog
      - invoke
    tenant_ids:
      - tenant-finance
    model_ids:
      - finance-document-intelligence-baseline-v1
      - finance-payment-fraud-baseline-v1

  - principal_id: service:enterprise-operations-serving
    owner_role: Enterprise Operations service
    product: enterprise-operations
    scopes:
      - catalog
      - invoke
    tenant_ids:
      - tenant-ops
    model_ids:
      - operations-demand-forecast-baseline-v1
      - operations-routing-policy-simulator-v1
