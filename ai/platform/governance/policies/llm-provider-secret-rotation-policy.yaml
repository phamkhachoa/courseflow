version: 1
owner: ai-platform
policy_id: llm-provider-secret-rotation-policy-v1
allowed_secret_ref_schemes:
  - vault://
  - aws-sm://
  - gcp-sm://
  - azure-kv://
allowed_rotation_ref_schemes:
  - rotation://
allowed_evidence_ref_schemes:
  - evidence://
max_rotation_days: 90
required_live_controls:
  - secret_ref_resolves_in_runtime_environment
  - rotation_automation_registered
  - rotation_evidence_snapshot_current
  - no_plaintext_secret_material
  - prompt_gateway_mandatory_in_service_path
next_actions:
  - enable_live_network_provider_with_approved_secret_refs
  - run_live_provider_rotation_drill_before_production_rollout
providers:
  - provider_id: contract-stub-llm-v1
    binding_mode: not_required
    secret_ref: local://contract-stub/no-secret
    secret_ref_resolved: false
    rotation_interval_days: 0
    rotation_automation_ref: not_required
    rotation_evidence_ref: not_required
    rotation_drill_status: not_required
    control_checks:
      - contract_stub_no_network
      - no_plaintext_secret_material
      - prompt_gateway_mandatory_in_service_path
  - provider_id: contract-stub-llm-failover-v1
    binding_mode: not_required
    secret_ref: local://contract-stub/no-secret
    secret_ref_resolved: false
    rotation_interval_days: 0
    rotation_automation_ref: not_required
    rotation_evidence_ref: not_required
    rotation_drill_status: not_required
    control_checks:
      - contract_stub_no_network
      - no_plaintext_secret_material
      - prompt_gateway_mandatory_in_service_path
