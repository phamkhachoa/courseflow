version: 1
owner: ai-platform
request_registry_id: model-serving-access-change-requests-v1
requests:
  - request_id: lms-sequence-risk-serving-grant
    status: applied
    change_type: add_principal
    target_principal_id: service:lms-courseflow-serving
    product: lms-courseflow
    owner_role: CourseFlow LMS service
    requested_by: PO/BA
    business_justification: Serve the LMS sequence-risk baseline for learner-risk workflows.
    requested_scopes:
      - catalog
      - invoke
    requested_tenant_ids:
      - tenant-lms
    requested_model_ids:
      - sequence-risk-baseline-v1
    approvals:
      - role: PO/BA
        decision: approved
      - role: SA AI Platform
        decision: approved
      - role: SA AI Engineer
        decision: approved
    evidence_refs:
      - platform/artifacts/manifests/sequence-risk-baseline-v1.yaml
      - contracts/models/sequence-risk-model-io.v1.yaml

  - request_id: support-agent-assist-serving-grant
    status: applied
    change_type: add_principal
    target_principal_id: service:support-platform-serving
    product: support-platform
    owner_role: Support Platform service
    requested_by: PO/BA
    business_justification: Serve support agent-assist and SLA-risk baselines for governed support workflows.
    requested_scopes:
      - catalog
      - invoke
    requested_tenant_ids:
      - tenant-support
    requested_model_ids:
      - support-agent-assist-baseline-v1
      - support-sla-risk-baseline-v1
    approvals:
      - role: PO/BA
        decision: approved
      - role: SA AI Platform
        decision: approved
      - role: SA AI Engineer
        decision: approved
    evidence_refs:
      - platform/artifacts/manifests/support-agent-assist-baseline-v1.yaml
      - platform/artifacts/manifests/support-sla-risk-baseline-v1.yaml

  - request_id: lms-sequence-risk-sandbox-tenant
    status: approved
    change_type: expand_tenant
    target_principal_id: service:lms-courseflow-serving
    product: lms-courseflow
    owner_role: CourseFlow LMS service
    requested_by: PO/BA
    business_justification: Add a sandbox LMS tenant for pre-production sequence-risk rollout tests.
    requested_scopes:
      - catalog
      - invoke
    requested_tenant_ids:
      - tenant-lms
      - tenant-lms-sandbox
    requested_model_ids:
      - sequence-risk-baseline-v1
    approvals:
      - role: PO/BA
        decision: approved
      - role: SA AI Platform
        decision: approved
      - role: SA AI Engineer
        decision: approved
      - role: Governance Reviewer
        decision: approved
    evidence_refs:
      - platform/artifacts/manifests/sequence-risk-baseline-v1.yaml
      - platform/evaluation/reports/sequence-risk-baseline-v1-eval.yaml

  - request_id: enterprise-operations-serving-ops-observability
    status: submitted
    change_type: expand_scope
    target_principal_id: service:enterprise-operations-serving
    product: enterprise-operations
    owner_role: Enterprise Operations service
    requested_by: SA AI Platform
    business_justification: Allow operations service owners to read serving health for incident triage.
    requested_scopes:
      - catalog
      - invoke
      - ops
    requested_tenant_ids:
      - tenant-ops
    requested_model_ids:
      - operations-demand-forecast-baseline-v1
      - operations-routing-policy-simulator-v1
    approvals:
      - role: SA AI Platform
        decision: approved
      - role: SA AI Engineer
        decision: approved
    evidence_refs:
      - platform/operations/reports/operating-cockpit-v1.yaml
      - platform/governance/policies/model-serving-access-policy.yaml

  - request_id: finance-cross-product-support-risk-grant
    status: submitted
    change_type: expand_model
    target_principal_id: service:finance-risk-serving
    product: billing-finance
    owner_role: Billing/Finance service
    requested_by: PO/BA
    business_justification: Investigate support SLA signal reuse for finance exception triage.
    requested_scopes:
      - catalog
      - invoke
    requested_tenant_ids:
      - tenant-finance
    requested_model_ids:
      - support-sla-risk-baseline-v1
    approvals:
      - role: PO/BA
        decision: approved
      - role: SA AI Platform
        decision: approved
    evidence_refs:
      - platform/artifacts/manifests/support-sla-risk-baseline-v1.yaml
