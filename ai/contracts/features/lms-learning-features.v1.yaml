version: 1
contract: lms_learning_features
owner: ai-platform
producer: dp
consumer: ai
product: lms-courseflow
entities:
  tenant:
    key: tenant_id
    pii_class: none
  learner:
    key: learner_principal_hash
    pii_class: pseudonymous
  course:
    key: course_id
    pii_class: none
  lesson:
    key: lesson_id
    pii_class: none
feature_groups:
  learner_activity_daily:
    freshness: 24h
    features:
      - active_minutes_7d
      - lessons_completed_7d
      - quizzes_attempted_7d
      - days_since_last_activity
      - missed_deadlines_30d
    consumers:
      - at_risk_prediction
      - adaptive_learning_path

  learner_course_interactions:
    freshness: 24h
    features:
      - enrollment_count
      - click_count
      - impression_count
      - completion_status
      - last_interaction_at
    consumers:
      - recommendation
      - semantic_search_feedback

  course_content_profile:
    freshness: on_publish
    features:
      - title
      - description
      - tags
      - skill_ids
      - difficulty_level
      - language
      - content_version
    consumers:
      - semantic_search
      - rag_tutor
      - cold_start_recommendation

  assessment_performance:
    freshness: 24h
    features:
      - quiz_score_avg_30d
      - assignment_score_avg_30d
      - final_grade
      - attempts_count
      - weak_skill_ids
    consumers:
      - at_risk_prediction
      - knowledge_tracing
      - adaptive_learning_path
privacy:
  tenant_isolation_required: true
  raw_principal_id_allowed: false
  learner_hash_algorithm: hmac_sha256
  retention_days: 365
  deletion_export_impact_review_required: true
quality:
  require_not_null_keys: true
  max_lag_hours: 24
  owner_on_failure: data-platform
