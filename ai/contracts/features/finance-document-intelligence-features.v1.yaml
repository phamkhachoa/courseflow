version: 1
contract: finance_document_intelligence_features
owner: ai-platform
producer: billing-finance
consumer: ai-platform
product: billing-finance
entities:
  tenant:
    key: tenant_id
    pii_class: none
  document:
    key: document_id
    pii_class: moderate
  vendor:
    key: vendor_id
    pii_class: low
  receipt:
    key: receipt_id
    pii_class: moderate
feature_groups:
  invoice_documents:
    freshness: on_upload
    features:
      - document_uri
      - document_checksum
      - mime_type
      - page_count
      - vendor_id
      - invoice_number_hint
      - document_language
    consumers:
      - finance-document-intelligence

  receipt_images:
    freshness: on_upload
    features:
      - image_uri
      - image_checksum
      - capture_source
      - mime_type
      - vendor_id
      - transaction_date_hint
    consumers:
      - finance-document-intelligence

  vendor_master_data:
    freshness: 24h
    features:
      - vendor_name
      - vendor_country
      - tax_id_hash
      - payment_terms
      - active_status
    consumers:
      - finance-document-intelligence
privacy:
  tenant_isolation_required: true
  document_privacy_review_required: true
  raw_tax_id_allowed: false
  pii_redaction_before_indexing_required: true
  financial_adjustment_human_review_required: true
  deletion_export_impact_review_required: true
quality:
  require_not_null_keys: true
  require_document_checksum: true
  max_lag_hours: 24
  owner_on_failure: billing-finance
