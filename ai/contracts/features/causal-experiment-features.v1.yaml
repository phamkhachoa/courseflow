version: 1
contract: causal_experiment_features
owner: ai-platform
producer: product-experimentation
consumer: ai-platform
product: ai-platform
entities:
  tenant:
    key: tenant_id
    pii_class: none
  experiment:
    key: experiment_id
    pii_class: none
  outcome:
    key: outcome_name
    pii_class: none
feature_groups:
  experiment_assignment_snapshot:
    freshness: per_experiment_snapshot
    features:
      - treatment_name
      - control_name
      - treatment_count
      - control_count
      - assignment_snapshot_id
      - sample_ratio_expected
    consumers:
      - lms-intervention-effectiveness
      - enterprise-experimentation-uplift

  experiment_outcome_snapshot:
    freshness: per_experiment_snapshot
    features:
      - treatment_successes
      - control_successes
      - outcome_name
      - minimum_detectable_lift
      - confidence_level
    consumers:
      - lms-intervention-effectiveness
      - enterprise-experimentation-uplift

  experiment_guardrails:
    freshness: per_experiment_snapshot
    features:
      - guardrail_metric_delta
      - high_impact
      - segment_count
      - reviewer_group
    consumers:
      - lms-intervention-effectiveness
      - enterprise-experimentation-uplift
privacy:
  tenant_isolation_required: true
  raw_user_identifier_allowed: false
  aggregate_snapshot_required: true
  learner_or_customer_impact_requires_human_review: true
quality:
  require_not_null_keys: true
  min_observations_per_arm: 30
  assignment_snapshot_required: true
  owner_on_failure: ai-platform
