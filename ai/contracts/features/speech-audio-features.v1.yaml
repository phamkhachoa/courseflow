version: 1
contract: speech_audio_features
owner: ai-platform
producer: support-platform
consumer: ai-platform
product: support-platform
entities:
  tenant:
    key: tenant_id
    pii_class: none
  audio_interaction:
    key: audio_id
    pii_class: high
  speaker:
    key: speaker_role
    pii_class: low
feature_groups:
  support_call_transcripts:
    freshness: on_close
    features:
      - audio_checksum
      - transcript_language
      - duration_seconds
      - consent_captured
      - transcript_segments
      - segment_confidence
    consumers:
      - support-speech-quality-assurance

  lms_video_transcripts:
    freshness: on_publish
    features:
      - audio_checksum
      - transcript_language
      - duration_seconds
      - transcript_segments
      - segment_confidence
    consumers:
      - lms-video-transcript-summary
privacy:
  tenant_isolation_required: true
  audio_privacy_review_required: true
  raw_audio_processing_allowed: false
  transcript_segments_must_be_redacted: true
  consent_or_notice_required: true
  deletion_export_impact_review_required: true
quality:
  require_not_null_keys: true
  require_audio_checksum: true
  min_segment_confidence: 0.7
  max_lag_hours: 24
  owner_on_failure: support-platform
