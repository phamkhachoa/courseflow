version: 1
contract: support_case_features
owner: ai-platform
producer: support-platform
consumer: ai-platform
product: support-platform
entities:
  tenant:
    key: tenant_id
    pii_class: none
  case:
    key: case_id
    pii_class: low
  customer:
    key: customer_hash
    pii_class: pseudonymous
feature_groups:
  support_case_text:
    freshness: near_real_time
    features:
      - subject
      - latest_message
      - public_comment_count
      - internal_note_count
      - product_area
      - language
    consumers:
      - support-agent-assist
      - support-sla-risk

  support_case_lifecycle:
    freshness: 15m
    features:
      - created_at
      - updated_at
      - priority
      - status
      - sla_due_at
      - assigned_team
    consumers:
      - support-agent-assist
      - support-sla-risk

privacy:
  tenant_isolation_required: true
  raw_customer_identifier_allowed: false
  customer_hash_algorithm: hmac_sha256
  redact_secrets_before_ai: true
  deletion_export_impact_review_required: true
quality:
  require_not_null_keys: true
  max_lag_minutes: 15
  owner_on_failure: support-platform
