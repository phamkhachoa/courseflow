version: 1
contract: operations_demand_features
owner: ai-platform
producer: enterprise-operations
consumer: ai-platform
product: enterprise-operations
entities:
  tenant:
    key: tenant_id
    pii_class: none
  forecast:
    key: forecast_id
    pii_class: none
  queue:
    key: queue_id
    pii_class: none
feature_groups:
  workload_history:
    freshness: 24h
    features:
      - historical_demand
      - backlog_open_items
      - avg_handle_minutes
      - forecast_horizon_days
    consumers:
      - operations-demand-forecasting
      - lms-cohort-demand-forecasting

  staffing_capacity:
    freshness: 24h
    features:
      - planned_capacity
      - capacity_roster
      - service_level_target
      - max_overtime_hours
    consumers:
      - operations-demand-forecasting

  calendar_and_incident_signals:
    freshness: 1h
    features:
      - seasonal_index
      - special_event
      - incident_open
      - campaign_or_release_window
    consumers:
      - operations-demand-forecasting
      - lms-cohort-demand-forecasting
privacy:
  tenant_isolation_required: true
  raw_employee_identifier_allowed: false
  staffing_action_requires_human_review: true
  incident_context_minimization_required: true
quality:
  require_not_null_keys: true
  max_lag_minutes: 1440
  min_history_observations: 4
  owner_on_failure: enterprise-operations
