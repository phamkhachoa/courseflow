version: 1
contract: operations_routing_features
owner: ai-platform
producer: enterprise-operations
consumer: ai-platform
product: enterprise-operations
entities:
  tenant:
    key: tenant_id
    pii_class: none
  work_item:
    key: work_item_id
    pii_class: low
  queue:
    key: queue_id
    pii_class: none
  routing_policy:
    key: policy_id
    pii_class: none
feature_groups:
  work_item_arrivals:
    freshness: 15m
    features:
      - created_at
      - work_type
      - priority
      - required_skill_ids
      - current_queue_id
      - customer_segment
      - expected_effort_minutes
    consumers:
      - operations-routing-optimization

  queue_capacity:
    freshness: 15m
    features:
      - available_agent_count
      - backlog_count
      - average_handle_time_minutes
      - skill_coverage
      - max_concurrency
    consumers:
      - operations-routing-optimization

  routing_outcomes:
    freshness: 24h
    features:
      - assigned_queue_id
      - assigned_at
      - resolved_at
      - transfer_count
      - sla_met
      - customer_satisfaction_score
      - intervention_label
    consumers:
      - operations-routing-optimization
privacy:
  tenant_isolation_required: true
  safe_exploration_budget_required: true
  no_unreviewed_adverse_routing_required: true
  simulator_required_before_online_policy: true
  deletion_export_impact_review_required: true
quality:
  require_not_null_keys: true
  max_lag_minutes: 15
  simulator_replay_required: true
  owner_on_failure: enterprise-operations
