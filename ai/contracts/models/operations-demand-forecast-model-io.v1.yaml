  forecast_units: integer
  demand_band: string
  capacity_gap_units: integer
  utilization_ratio: number
  staffing_recommendation: string
  reason_codes:
    type: array
  scenario_actions:
    type: array
  requires_human_review: boolean
sla:
  p95_latency_ms: 150
  fallback_required: true
  batch_refresh: daily
governance:
  tenant_isolation_required: true
  staffing_action_requires_human_review: true
  incident_or_high_shortfall_requires_human_review: true
