version: 1
owner: ai-platform
platform_product: ai-platform
use_cases:
  - id: platform-llm-safety-gateway
    name: LLM Safety Gateway
    status: baseline_implemented
    phase: 1
    product: ai-platform
    model: prompt-safety-baseline-v1
    model_family:
      - llm
      - genai
      - rules
      - evaluation
      - deterministic_baseline
    dependencies:
      - contracts/prompts/llm-prompt-envelope.v1.yaml
      - platform/prompt-safety/redaction-policy.yaml
      - platform/evaluation/datasets/prompt-safety-golden.yaml
      - services/governance-evaluation-service/service.yaml
      - platform/governance/policies/governance-evaluation-access-policy.yaml
    business_kpis:
      - pii_leakage_findings
      - unsafe_prompt_block_rate
      - llm_cost_budget_adherence
    capabilities:
      - prompt_redaction
      - tenant_context_filtering
      - cost_budget_gate
      - prompt_response_audit_policy
      - governance_release_gate
    governance:
      human_in_the_loop: required_for_external_or_high_impact_outputs

  - id: platform-llm-adapter-shadow-gateway
    name: LLM Adapter Shadow Gateway
    status: shadow_gate_implemented
    phase: 1
    product: ai-platform
    model: llm-adapter-shadow-gateway-v1
    model_family:
      - llm
      - genai
      - rag
      - evaluation
      - deterministic_baseline
    dependencies:
      - platform/governance/policies/prompt-gateway-access-policy.yaml
      - platform/evaluation/datasets/llm-adapter-shadow-gateway-golden.yaml
      - platform/evaluation/reports/llm-adapter-shadow-gateway-v1-eval.yaml
      - services/governance-evaluation-service/service.yaml
      - platform/governance/policies/governance-evaluation-access-policy.yaml
    business_kpis:
      - prompt_gateway_pre_call_coverage
      - blocked_generation_skip_rate
      - grounded_shadow_answer_rate
    capabilities:
      - prompt_gateway_bound_adapter_shadow_eval
      - blocked_prompt_generation_skip
      - grounded_answer_after_gateway
      - tenant_safe_context_filtering
      - governance_shadow_release_gate
    governance:
      human_in_the_loop: required_for_all_shadow_outputs

  - id: lms-ai-mentor
    name: CourseFlow AI Mentor
    status: proposed
    phase: 0
    type: umbrella
    product: lms-courseflow
    product_owner: courseflow-po
    business_kpis:
      - course_completion_rate
      - recommendation_ctr
      - search_success_rate
      - dropout_rate
      - grading_time_saved
    modules:
      - recommendation
      - semantic_search
      - at_risk_prediction
      - knowledge_tracing
      - adaptive_learning_path
      - auto_grading
      - rag_tutor
      - content_generation
      - speech_video_ai
      - ai_governance

  - id: lms-related-course-recommendation
    name: Related Course Recommendation
    status: active_baseline
    phase: 0
    product: lms-courseflow
    service: services/recommendation-ml-service
    model_family:
      - classical_ml
      - recommender_systems
      - future_deep_learning
    current_algorithm: IMPLICIT_ITEM_CF_V1
    metrics:
      - recall_at_k
      - ndcg_at_k
      - ctr
      - enrollment_conversion

  - id: lms-semantic-search
    name: Semantic Search And Course Cold-start
    status: service_integrated_baseline
    phase: 1
    product: lms-courseflow
    service: services/nlp-understanding-service
    model_family:
      - embeddings
      - vector_search
      - nlp
      - transformer
    dependencies:
      - contracts/features/lms-learning-features.v1.yaml
      - platform/vector-store/collections/course-content.yaml
      - services/nlp-understanding-service/service.yaml
      - platform/governance/policies/nlp-understanding-access-policy.yaml
      - services/retrieval-service/service.yaml

  - id: lms-auto-grading
    name: Auto-grading And Feedback
    status: service_integrated_baseline
    phase: 1
    product: lms-courseflow
    service: services/nlp-understanding-service
    model_family:
      - nlp
      - transformer
      - llm
      - genai
      - evaluation
    dependencies:
      - contracts/features/lms-learning-features.v1.yaml
      - services/nlp-understanding-service/service.yaml
      - platform/governance/policies/nlp-understanding-access-policy.yaml
      - services/governance-evaluation-service/service.yaml
      - platform/governance/policies/governance-evaluation-access-policy.yaml
    capabilities:
      - rubric_feedback
      - semantic_answer_understanding
      - human_reviewed_grading_assist
      - governance_release_gate
    governance:
      human_in_the_loop: required_for_final_grade
      direct_learner_identifier_submission: forbidden

  - id: lms-at-risk-prediction
    name: Learner At-risk Prediction
    status: service_integrated_baseline
    phase: 1
    product: lms-courseflow
    service: services/sequence-risk-service
    model: sequence-risk-baseline-v1
    model_family:
      - classical_ml
      - sequence_deep_learning
    baseline_first: true
    dependencies:
      - contracts/features/lms-learning-features.v1.yaml
      - contracts/models/sequence-risk-model-io.v1.yaml
      - platform/evaluation/datasets/sequence-risk-baseline-golden.yaml
      - platform/artifacts/manifests/sequence-risk-baseline-v1.yaml
      - services/sequence-risk-service/service.yaml
      - platform/governance/policies/sequence-risk-access-policy.yaml
    business_kpis:
      - dropout_rate
      - intervention_acceptance_rate
      - course_completion_rate
    governance:
      direct_learner_identifier_submission: forbidden
      human_in_the_loop: required_for_medium_or_high_risk_intervention

  - id: lms-rag-tutor
    name: RAG AI Tutor
    status: service_integrated_baseline
    phase: 2
    product: lms-courseflow
    service: services/rag-answer-service
    model_family:
      - rag
      - llm
      - embeddings
      - retrieval
    dependencies:
      - platform/vector-store/collections/course-content.yaml
      - platform/evaluation/datasets/course-rag-answer-golden.yaml
      - platform/evaluation/reports/course-rag-answer-v1-eval.yaml
      - services/rag-answer-service/service.yaml
      - platform/governance/policies/rag-answer-access-policy.yaml
      - services/governance-evaluation-service/service.yaml
      - platform/governance/policies/governance-evaluation-access-policy.yaml
    requires:
      - lms-semantic-search
    business_kpis:
      - grounded_answer_acceptance_rate
      - citation_precision
      - tutor_deflection_rate
    capabilities:
      - grounded_course_qa
      - citation_enforcement
      - insufficient_context_refusal
      - human_reviewed_tutor_answer
      - governance_release_gate
    governance:
      human_in_the_loop: required_for_baseline_answers
      direct_learner_identifier_submission: forbidden
      external_auto_send_allowed: false

  - id: lms-knowledge-tracing
    name: Knowledge Tracing
    status: service_integrated_baseline
    phase: 3
