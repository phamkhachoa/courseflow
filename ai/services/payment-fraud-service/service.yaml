version: 1
service_id: payment-fraud-service
owner: ai-platform
status: service_package_ready
runtime:
  language: python
  entrypoint: courseflow_payment_fraud_service.cli:main
  dockerfile: Dockerfile
security:
  default_auth: policy_enforced
  policy:
    - platform/governance/policies/ai-governance-policy.yaml
    - platform/governance/policies/payment-fraud-access-policy.yaml
observability:
  metrics: in_memory_score_error_identifier_hitl_entity_link_counters
  tenant_safety: cross_tenant_payment_fraud_forbidden
routes:
  - method: POST
    path: /v1/payment-fraud/score
    scope: internal:ai-platform:payment-fraud:score
    purpose: payment_fraud_risk_scoring
  - method: GET
    path: /v1/payment-fraud/health
    scope: internal:ai-platform:payment-fraud:ops
    purpose: payment_fraud_health
  - method: GET
    path: /v1/payment-fraud/metrics
    scope: internal:ai-platform:payment-fraud:ops
    purpose: payment_fraud_metrics
dependencies:
  platform_modules:
    - platform/src/courseflow_ai_platform/payment_fraud_service.py
  model_modules:
    - models/anomaly_fraud/payment_fraud_baseline/payment_fraud_baseline.py
  artifacts:
    - contracts/features/finance-payment-risk-features.v1.yaml
    - contracts/models/finance-payment-fraud-model-io.v1.yaml
    - platform/evaluation/reports/finance-payment-fraud-v1-eval.yaml
    - platform/artifacts/manifests/finance-payment-fraud-baseline-v1.yaml
promotion_guardrails:
  - route_scopes_must_match_payment_fraud_access_policy
  - principals_must_be_product_use_case_and_tenant_scoped
  - raw_account_counterparty_device_identifiers_must_be_rejected
  - medium_and_high_risk_payment_actions_must_require_human_review
  - automated_adverse_payment_or_account_action_must_remain_forbidden
  - payment_fraud_quality_gate_must_remain_green
