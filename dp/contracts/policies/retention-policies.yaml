version: 1
registry_scope: group-enterprise-data-platform
policies:
  - id: standard_personal_data_3y
    name: Standard Personal Data Retention
    policyVersion: 1
    status: active
    severity: P0
    owner: data-governance-office
    effectiveFrom: "2026-01-01"
    description: Standard retention and erasure controls for personal or sensitive analytical data outside regulated finance and assessment records.
    appliesTo:
      layers: [BRONZE, SILVER, GOLD]
      classifications: [PII, SENSITIVE, CONFIDENTIAL]
      domains: [customer, learning, recommendation, product-analytics, ml-ai, workforce, compliance]
      products: [lms-courseflow, crm-sales, hris-workforce, identity-platform, support-platform]
    maxRetentionDays: 1095
    minRetentionDays: 30
    erasureRequired: true
    evidenceRequirements:
      - retention_job_run_id
      - subject_key_coverage
      - expired_record_scan
      - erasure_request_replay
      - residual_subject_scan
      - legal_hold_check
    controls:
      requirePartitionPruning: true
      requireDeleteVectorOrRewrite: true
      requireAuditLog: true
      requireLegalHoldCheck: true

  - id: non_personal_finance_aggregate_7y
    name: Non Personal Finance Aggregate Retention
    policyVersion: 1
    status: active
    severity: P0
    owner: compliance-office
    effectiveFrom: "2026-01-01"
    description: Seven-year retention for non-personal certified finance aggregates used by accounting, FP&A and executive reporting.
    appliesTo:
      layers: [GOLD]
      classifications: [CONFIDENTIAL]
      domains: [finance]
      products: [billing-platform]
    maxRetentionDays: 2555
    minRetentionDays: 365
    erasureRequired: false
    evidenceRequirements:
      - retention_job_run_id
      - expired_record_scan
      - legal_hold_check
    controls:
      requirePartitionPruning: true
      requireDeleteVectorOrRewrite: false
      requireAuditLog: true
      requireLegalHoldCheck: true

  - id: regulated_finance_and_assessment_7y
    name: Regulated Finance and Assessment Retention
    policyVersion: 1
    status: active
    severity: P0
    owner: compliance-office
    effectiveFrom: "2026-01-01"
    description: Longer retention for finance, benefits, gradebook and assessment records with erasure support constrained by regulatory holds.
    appliesTo:
      layers: [BRONZE, SILVER, GOLD]
      classifications: [PII, SENSITIVE, CONFIDENTIAL]
      domains: [finance, assessment, workforce]
      products: [lms-courseflow, enterprise-commerce, billing-platform]
    maxRetentionDays: 2555
    minRetentionDays: 365
    erasureRequired: true
    evidenceRequirements:
      - retention_job_run_id
      - subject_key_coverage
      - expired_record_scan
      - erasure_request_replay
      - residual_subject_scan
      - legal_hold_check
    controls:
      requirePartitionPruning: true
      requireDeleteVectorOrRewrite: true
      requireAuditLog: true
      requireLegalHoldCheck: true

  - id: certified_ml_feature_2y
    name: Certified ML Feature Retention
    policyVersion: 1
    status: active
    severity: P0
    owner: ml-ai-platform
    effectiveFrom: "2026-01-01"
    description: Shorter retention for certified ML feature outputs and recommendation interaction aggregates.
    appliesTo:
      layers: [GOLD]
      classifications: [PII, SENSITIVE, CONFIDENTIAL]
      domains: [recommendation, ml-ai]
      products: [lms-courseflow]
    maxRetentionDays: 730
    minRetentionDays: 30
    erasureRequired: true
    evidenceRequirements:
      - retention_job_run_id
      - subject_key_coverage
      - expired_record_scan
      - erasure_request_replay
      - residual_subject_scan
      - legal_hold_check
    controls:
      requirePartitionPruning: true
      requireDeleteVectorOrRewrite: true
      requireAuditLog: true
      requireLegalHoldCheck: true

  - id: non_personal_operational_3y
    name: Non Personal Operational Retention
    policyVersion: 1
    status: active
    severity: P1
    owner: data-governance-office
    effectiveFrom: "2026-01-01"
    description: Retention controls for internal non-personal operational datasets that do not need person erasure workflows.
    appliesTo:
      layers: [BRONZE, SILVER, GOLD]
      classifications: [PUBLIC, INTERNAL, CONFIDENTIAL]
      domains: [learning, recommendation, enterprise-reporting, product-analytics, workforce]
      products: [lms-courseflow, enterprise-commerce, crm-sales, hris-workforce, identity-platform, support-platform, enterprise-data-platform]
    maxRetentionDays: 1095
    minRetentionDays: 30
    erasureRequired: false
    evidenceRequirements:
      - retention_job_run_id
      - expired_record_scan
      - legal_hold_check
    controls:
      requirePartitionPruning: true
      requireDeleteVectorOrRewrite: false
      requireAuditLog: true
      requireLegalHoldCheck: true
