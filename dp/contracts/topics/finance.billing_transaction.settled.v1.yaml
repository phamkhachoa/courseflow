contractVersion: 1
topic:
  name: finance.billing_transaction.settled.v1
  domain: finance
  product: billing-platform
  domainOwner: finance-domain-council
  ownerTeam: data-platform
  dataSteward: enterprise-data-steward
  sourceServices:
    - billing-service
    - subscription-service
    - invoice-service
    - revenue-recognition-service
    - payment-platform
  description: Billing transaction settlement events used to build certified enterprise revenue facts.
  status: ACTIVE

schema:
  format: JSON_SCHEMA
  compatibility: BACKWARD_TRANSITIVE
  envelopeSchema: contracts/event-envelope.v1.schema.json
  payloadSchema: contracts/events/finance.billing_transaction.settled.v1.schema.json

privacy:
  classification: SENSITIVE
  dataResidency: REGION_CONTROLLED
  containsPii: true
  tenantIsolation: REQUIRED
  retentionDays: 2555
  erasureSupported: true
  subjectKeys:
    - name: customer_id_hash
      topicPath: $.payload.customerIdHash
      type: tokenized_subject_id
      required: true
  erasureMode: REGULATED_SUBJECT_DELETE
  legalHoldPolicy: regulated_legal_hold_check
  rawPayloadPolicy: SECURE_RAW_PAYLOAD_WITH_SUBJECT_ERASURE

ingestion:
  bronzeTarget: bronze.events_billing_transaction_settled
  partitionStrategy: event_date/source_service/org_id

quality:
  freshnessSloMinutes: 15
  checks:
    - name: event_id_not_null
      type: not_null
      column: eventId
    - name: billing_transaction_event_type_allowed
      type: accepted_values
      column: payload.eventType
      values: [BILLING_TRANSACTION_SETTLED]
    - name: source_offset_unique
      type: unique
      columns: [topic, partition, offset]
    - name: no_sensitive_payload
      type: no_sensitive_payload
      column: payload
