contractVersion: 1
topic:
  name: finance.benefit_settled.v1
  domain: finance
  product: enterprise-commerce
  domainOwner: finance-domain-council
  ownerTeam: data-platform
  dataSteward: enterprise-data-steward
  sourceServices:
    - payment-platform
    - billing-service
    - benefit-ledger-service
  description: Benefit settlement events used to reconcile paid orders, discounts, points, rewards and refunds.
  status: ACTIVE

schema:
  format: JSON_SCHEMA
  compatibility: BACKWARD_TRANSITIVE
  envelopeSchema: contracts/event-envelope.v1.schema.json
  payloadSchema: contracts/events/finance.benefit_settled.v1.schema.json

privacy:
  classification: CONFIDENTIAL
  dataResidency: REGION_CONTROLLED
  containsPii: true
  tenantIsolation: REQUIRED
  retentionDays: 2555
  erasureSupported: true
  subjectKeys:
    - name: beneficiary_id_hash
      topicPath: $.payload.beneficiaryIdHash
      type: tokenized_subject_id
      required: true
  erasureMode: REGULATED_SUBJECT_DELETE
  legalHoldPolicy: regulated_legal_hold_check
  rawPayloadPolicy: SECURE_RAW_PAYLOAD_WITH_SUBJECT_ERASURE

ingestion:
  bronzeTarget: bronze.events_benefit_settled
  partitionStrategy: event_date/source_service/org_id

quality:
  freshnessSloMinutes: 15
  checks:
    - name: event_id_not_null
      type: not_null
      column: eventId
    - name: benefit_event_type_allowed
      type: accepted_values
      column: payload.eventType
      values: [BENEFIT_SETTLED]
    - name: source_offset_unique
      type: unique
      columns: [topic, partition, offset]
    - name: no_sensitive_payload
      type: no_sensitive_payload
      column: payload
