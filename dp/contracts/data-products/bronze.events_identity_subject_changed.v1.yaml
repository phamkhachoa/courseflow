contractVersion: 1
dataProduct:
  name: bronze.events_identity_subject_changed
  layer: BRONZE
  domain: compliance
  product: identity-platform
  domainOwner: compliance-domain-council
  ownerTeam: data-platform
  businessOwner: security-platform-lead
  technicalOwner: senior-data-platform
  dataSteward: enterprise-data-steward
  description: Raw identity subject lifecycle and access-risk events for enterprise access governance.
  status: ACTIVE
  deprecationPolicy: 180_day_notice_and_dual_publish_for_breaking_changes

source:
  upstream: []
  ingestionMode: streaming
  eventTimeColumn: occurred_at

schema:
  columns:
    - name: product_id
      type: string
      nullable: false
      pii: false
      description: Enterprise product code that produced or owns this record.
    - name: domain_id
      type: string
      nullable: false
      pii: false
      description: Enterprise data domain code used for mesh ownership and catalog grouping.
    - name: event_id
      type: uuid
      nullable: false
      pii: false
      description: Global event idempotency key.
    - name: event_type
      type: string
      nullable: false
      pii: false
      description: Identity subject event type.
      allowedValues: [IDENTITY_SUBJECT_CHANGED]
    - name: event_version
      type: int
      nullable: false
      pii: false
      description: Version of the source event contract.
    - name: source_service
      type: string
      nullable: false
      pii: false
      description: Service that emitted the event.
    - name: tenant_id
      type: string
      nullable: false
      pii: false
      description: Enterprise tenant boundary from the source event envelope.
    - name: org_id
      type: uuid
      nullable: false
      pii: false
      description: Organization boundary used for tenant isolation.
    - name: subject_id_hash
      type: string
      nullable: false
      pii: true
      description: Tokenized enterprise subject identifier.
    - name: subject_type
      type: string
      nullable: false
      pii: false
      description: Enterprise subject category.
    - name: lifecycle_status
      type: string
      nullable: false
      pii: false
      description: Current identity lifecycle state.
    - name: risk_level
      type: string
      nullable: false
      pii: false
      description: Source access-risk level for the subject.
    - name: entitlement_count
      type: int
      nullable: false
      pii: false
      description: Number of active entitlements observed for the subject.
    - name: privileged_entitlement_count
      type: int
      nullable: false
      pii: false
      description: Number of privileged entitlements observed for the subject.
    - name: mfa_enabled
      type: boolean
      nullable: false
      pii: false
      description: Whether MFA is enabled for this subject.
    - name: last_access_at
      type: timestamp
      nullable: true
      pii: false
      description: Most recent access timestamp from identity or access-control source.
    - name: changed_at
      type: timestamp
      nullable: false
      pii: false
      description: Source business timestamp for the identity change.
    - name: source_product_id
      type: string
      nullable: true
      pii: false
      description: Optional upstream business product related to the subject.
    - name: occurred_at
      type: timestamp
      nullable: false
      pii: false
      description: Business event time from the envelope.
    - name: published_at
      type: timestamp
      nullable: false
      pii: false
      description: Time the event was published into the platform stream.
    - name: ingested_at
      type: timestamp
      nullable: false
      pii: false
      description: Time the event landed in Bronze.
    - name: source_system
      type: string
      nullable: false
      pii: false
      description: Logical source system name from the source registry.
    - name: source_topic
      type: string
      nullable: false
      pii: false
      description: Kafka topic or equivalent source stream.
    - name: source_partition
      type: int
      nullable: true
      pii: false
      description: Kafka partition for replay lineage.
    - name: source_offset
      type: long
      nullable: true
      pii: false
      description: Kafka offset for replay lineage.
    - name: source_snapshot_id
      type: string
      nullable: true
      pii: false
      description: CDC snapshot, file manifest or source export id when no stream offset exists.
    - name: source_record_key
      type: string
      nullable: false
      pii: false
      description: Non-sensitive source key used for replay and deduplication evidence.
    - name: source_record_hash_sha256
      type: string
      nullable: false
      pii: false
      description: SHA-256 hash of canonical source identity and raw source record.
    - name: payload_hash_sha256
      type: string
      nullable: false
      pii: false
      description: SHA-256 hash of the platform-approved event payload.
    - name: schema_subject
      type: string
      nullable: false
      pii: false
      description: Schema registry subject used to validate the event payload.
    - name: schema_id
      type: string
      nullable: false
      pii: false
      description: Schema id used for compatibility verification.
    - name: raw_headers
      type: json
      nullable: false
      pii: false
      description: Non-secret source headers after platform filtering.
    - name: raw_payload
      type: json
      nullable: false
      pii: true
      description: Raw identity payload retained under governed Bronze controls.
    - name: ingest_run_id
      type: string
      nullable: false
      pii: false
      description: Platform ingestion run id.
    - name: event_date
      type: date
      nullable: false
      pii: false
      description: Date partition derived from occurred_at.
    - name: ingest_date
      type: date
      nullable: false
      pii: false
      description: Date partition derived from ingested_at.

quality:
  freshnessSloMinutes: 15
  checks:
    - name: event_id_not_null
      type: not_null
      column: event_id
    - name: subject_id_hash_not_null
      type: not_null
      column: subject_id_hash
    - name: org_id_not_null
      type: not_null
      column: org_id
    - name: source_offset_unique
      type: unique
      columns: [source_topic, source_partition, source_offset]

privacy:
  classification: PII
  dataResidency: REGION_CONTROLLED
  containsPii: true
  tenantIsolation: REQUIRED
  retentionDays: 1095
  erasureSupported: true
  subjectKeys:
    - name: subject_id_hash
      column: subject_id_hash
      type: tokenized_subject_id
      required: true
  erasureMode: SUBJECT_DELETE
  legalHoldPolicy: standard_legal_hold_check
  rawPayloadPolicy: SECURE_RAW_PAYLOAD_WITH_SUBJECT_ERASURE

serving:
  consumers: [DataPlatform]
  accessPolicy: platform_engineer_only
  accessPersonas: [DataPlatformOperator, DomainDataOwner]
  consumerContract: catalog_registered_access_request_required
  publicationGate: platform_operator_approval

lineage:
  catalog: DataHub
  lineageRequired: true
