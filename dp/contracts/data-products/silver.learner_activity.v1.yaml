contractVersion: 1
dataProduct:
  name: silver.learner_activity
  layer: SILVER
  domain: workforce
  product: lms-courseflow
  domainOwner: lms-domain-council
  ownerTeam: data-platform
  businessOwner: learner-success-po
  technicalOwner: senior-data-platform
  dataSteward: enterprise-data-steward
  description: Conformed learner activity timeline across course, enrollment, assessment and recommendation events.
  status: ACTIVE
  deprecationPolicy: 180_day_notice_and_dual_publish_for_breaking_changes

source:
  upstream:
    - name: bronze.events_recommendation_tracking
      type: lakehouse_table
      contractVersion: 1
  ingestionMode: batch
  eventTimeColumn: occurred_at

schema:
  columns:
    - name: product_id
      type: string
      nullable: false
      pii: false
      description: Enterprise product code that produced or owns this record.
    - name: activity_id
      type: string
      nullable: false
      pii: false
      description: Stable id generated from source event id and activity type.
    - name: org_id
      type: uuid
      nullable: false
      pii: false
      description: Organization boundary used for tenant isolation.
    - name: learner_id_hash
      type: string
      nullable: true
      pii: true
      description: Tokenized learner identifier.
    - name: session_id_hash
      type: string
      nullable: true
      pii: true
      description: Tokenized session identifier.
    - name: course_id
      type: uuid
      nullable: false
      pii: false
      description: Course associated with the activity.
    - name: related_course_id
      type: uuid
      nullable: true
      pii: false
      description: Related course associated with recommendation activity.
    - name: activity_type
      type: string
      nullable: false
      pii: false
      description: Conformed activity taxonomy.
      allowedValues: [RECOMMENDATION_IMPRESSION, RECOMMENDATION_CLICK, RECOMMENDATION_ENROLLMENT]
    - name: occurred_at
      type: timestamp
      nullable: false
      pii: false
      description: Event-time timestamp.
    - name: source_event_id
      type: uuid
      nullable: false
      pii: false
      description: Original source event id for lineage and idempotency.
    - name: source_service
      type: string
      nullable: false
      pii: false
      description: Source service or collector.
    - name: ingested_at
      type: timestamp
      nullable: false
      pii: false
      description: Bronze ingestion timestamp.

quality:
  freshnessSloMinutes: 60
  checks:
    - name: product_id_not_null
      type: not_null
      column: product_id
    - name: activity_id_not_null
      type: not_null
      column: activity_id
    - name: activity_id_unique
      type: unique
      column: activity_id
    - name: activity_type_allowed
      type: accepted_values
      column: activity_type
      values: [RECOMMENDATION_IMPRESSION, RECOMMENDATION_CLICK, RECOMMENDATION_ENROLLMENT]
    - name: source_event_id_not_null
      type: not_null
      column: source_event_id

privacy:
  classification: CONFIDENTIAL
  dataResidency: REGION_CONTROLLED
  containsPii: true
  tenantIsolation: REQUIRED
  retentionDays: 1095
  erasureSupported: true
  subjectKeys:
    - name: learner_id_hash
      column: learner_id_hash
      type: tokenized_subject_id
      required: true
  erasureMode: SUBJECT_DELETE
  legalHoldPolicy: standard_legal_hold_check
  rawPayloadPolicy: NO_RAW_PAYLOAD

serving:
  consumers: [DataPlatform, BI, ML]
  accessPolicy: row_level_org_isolation
  accessPersonas: [DataPlatformOperator, DomainDataOwner, ApprovedBIConsumer, ApprovedMLConsumer]
  consumerContract: catalog_registered_access_request_required
  publicationGate: quality_checks_must_pass

lineage:
  catalog: DataHub
  lineageRequired: true
