contractVersion: 1
dataProduct:
  name: gold.lms_recommendation_training_interactions
  layer: GOLD
  domain: recommendation
  product: lms-courseflow
  domainOwner: lms-domain-council
  ownerTeam: data-platform
  businessOwner: learner-experience-po
  technicalOwner: senior-data-platform
  dataSteward: enterprise-data-steward
  description: Quality-gated learner-course implicit interaction snapshot for AI related-course training.
  status: ACTIVE
  deprecationPolicy: 180_day_notice_and_dual_publish_for_breaking_changes

source:
  upstream:
    - name: bronze.events_enrollment_completed
      type: lakehouse_table
      contractVersion: 1
    - name: gold.lms_recommendation_course_catalog
      type: lakehouse_table
      contractVersion: 1
  ingestionMode: batch
  eventTimeColumn: occurred_at

schema:
  columns:
    - name: dataset_snapshot_id
      type: string
      nullable: false
      pii: false
      description: Immutable feature snapshot identifier used by AI model training.
    - name: product_id
      type: string
      nullable: false
      pii: false
      description: Enterprise product code that owns this feature.
    - name: org_id
      type: uuid
      nullable: false
      pii: false
      description: Organization boundary used for tenant isolation.
    - name: learner_id_hash
      type: string
      nullable: false
      pii: true
      description: Tokenized learner identifier used for collaborative filtering grouping.
    - name: course_id
      type: uuid
      nullable: false
      pii: false
      description: Published course completed by the learner.
    - name: event_type
      type: string
      nullable: false
      pii: false
      description: Training signal consumed by recommendation ML.
      allowedValues: [ENROLLMENT]
    - name: event_weight
      type: double
      nullable: false
      pii: false
      description: Numeric model weight derived from completion signal strength.
    - name: occurred_at
      type: timestamp
      nullable: false
      pii: false
      description: Business event time for training and holdout windows.
    - name: source_event_id
      type: uuid
      nullable: false
      pii: false
      description: Original enrollment completion event id for traceability.
    - name: source_enrollment_id
      type: uuid
      nullable: false
      pii: false
      description: Source enrollment identifier.
    - name: built_at
      type: timestamp
      nullable: false
      pii: false
      description: Time the Gold feature snapshot was built.
    - name: quality_passed
      type: boolean
      nullable: false
      pii: false
      description: Whether row passed Gold feature checks.

quality:
  freshnessSloMinutes: 240
  checks:
    - name: learner_id_hash_not_null
      type: not_null
      column: learner_id_hash
    - name: course_id_not_null
      type: not_null
      column: course_id
    - name: training_interaction_key_unique
      type: unique
      columns: [dataset_snapshot_id, source_event_id, learner_id_hash, course_id]
    - name: training_event_type_allowed
      type: accepted_values
      column: event_type
      values: [ENROLLMENT]
    - name: training_snapshot_freshness
      type: freshness
      column: built_at

privacy:
  classification: CONFIDENTIAL
  dataResidency: REGION_CONTROLLED
  containsPii: true
  tenantIsolation: REQUIRED
  retentionDays: 730
  erasureSupported: true
  subjectKeys:
    - name: learner_id_hash
      column: learner_id_hash
      type: tokenized_subject_id
      required: true
  erasureMode: SUBJECT_DELETE
  legalHoldPolicy: standard_legal_hold_check
  rawPayloadPolicy: NO_RAW_PAYLOAD

serving:
  consumers: [ML]
  accessPolicy: row_level_org_isolation
  accessPersonas: [DataPlatformOperator, DomainDataOwner, ApprovedMLConsumer]
  consumerContract: catalog_registered_access_request_required
  publicationGate: quality_checks_must_pass

lineage:
  catalog: DataHub
  lineageRequired: true
