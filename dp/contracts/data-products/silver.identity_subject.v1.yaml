contractVersion: 1
dataProduct:
  name: silver.identity_subject
  layer: SILVER
  domain: compliance
  product: identity-platform
  domainOwner: compliance-domain-council
  ownerTeam: data-platform
  businessOwner: security-platform-lead
  technicalOwner: senior-data-platform
  dataSteward: enterprise-data-steward
  description: Conformed enterprise identity subject state used for access governance, risk and downstream Customer 360 joins.
  status: ACTIVE
  deprecationPolicy: 180_day_notice_and_dual_publish_for_breaking_changes

source:
  upstream:
    - name: bronze.events_identity_subject_changed
      type: lakehouse_table
      contractVersion: 1
  ingestionMode: batch
  eventTimeColumn: changed_at

schema:
  columns:
    - name: subject_state_id
      type: string
      nullable: false
      pii: false
      description: Deterministic row id derived from subject, snapshot and source event.
    - name: product_id
      type: string
      nullable: false
      pii: false
      description: Product that owns the identity subject source.
    - name: org_id
      type: uuid
      nullable: false
      pii: false
      description: Organization boundary used for tenant isolation.
    - name: subject_id_hash
      type: string
      nullable: false
      pii: true
      description: Tokenized enterprise subject identifier.
    - name: subject_type
      type: string
      nullable: false
      pii: false
      description: Enterprise subject category.
      allowedValues: [USER, SERVICE_ACCOUNT, ADMIN, WORKFORCE_USER, EMPLOYEE, CUSTOMER_USER]
    - name: lifecycle_status
      type: string
      nullable: false
      pii: false
      description: Current identity lifecycle state.
      allowedValues: [PENDING, ACTIVE, SUSPENDED, DEPROVISIONED]
    - name: risk_level
      type: string
      nullable: false
      pii: false
      description: Current access-risk level.
      allowedValues: [LOW, MEDIUM, HIGH, CRITICAL]
    - name: entitlement_count
      type: int
      nullable: false
      pii: false
      description: Number of active entitlements.
    - name: privileged_entitlement_count
      type: int
      nullable: false
      pii: false
      description: Number of privileged entitlements.
    - name: mfa_enabled
      type: boolean
      nullable: false
      pii: false
      description: Whether MFA is enabled.
    - name: last_access_at
      type: timestamp
      nullable: true
      pii: false
      description: Most recent access timestamp.
    - name: changed_at
      type: timestamp
      nullable: false
      pii: false
      description: Source business timestamp for this identity state.
    - name: source_event_id
      type: uuid
      nullable: false
      pii: false
      description: Original source event id for lineage.
    - name: source_record_hash_sha256
      type: string
      nullable: false
      pii: false
      description: Bronze source record hash.

quality:
  freshnessSloMinutes: 60
  checks:
    - name: subject_state_id_not_null
      type: not_null
      column: subject_state_id
    - name: subject_state_id_unique
      type: unique
      columns: [subject_state_id]
    - name: subject_id_hash_not_null
      type: not_null
      column: subject_id_hash
    - name: org_id_not_null
      type: not_null
      column: org_id

privacy:
  classification: PII
  dataResidency: REGION_CONTROLLED
  containsPii: true
  tenantIsolation: REQUIRED
  retentionDays: 1095
  erasureSupported: true
  subjectKeys:
    - name: subject_id_hash
      column: subject_id_hash
      type: tokenized_subject_id
      required: true
  erasureMode: SUBJECT_DELETE
  legalHoldPolicy: standard_legal_hold_check
  rawPayloadPolicy: NO_RAW_PAYLOAD

serving:
  consumers: [DataPlatform, Compliance, Risk]
  accessPolicy: row_level_org_isolation
  accessPersonas: [DataPlatformOperator, DomainDataOwner, ComplianceConsumer, RiskOperator]
  consumerContract: catalog_registered_access_request_required
  publicationGate: quality_checks_must_pass

lineage:
  catalog: DataHub
  lineageRequired: true
