contractVersion: 1
dataProduct:
  name: gold.finance_revenue_daily
  layer: GOLD
  domain: finance
  product: billing-platform
  domainOwner: finance-domain-council
  ownerTeam: data-platform
  businessOwner: finance-analytics-po
  technicalOwner: senior-data-platform
  dataSteward: enterprise-data-steward
  description: Certified daily enterprise revenue aggregate sourced from Billing Platform settlement events.
  status: ACTIVE
  deprecationPolicy: 180_day_notice_and_dual_publish_for_breaking_changes

source:
  upstream:
    - name: silver.finance_billing_transactions
      type: lakehouse_table
      contractVersion: 1
  ingestionMode: batch
  eventTimeColumn: accounting_date

schema:
  columns:
    - name: product_id
      type: string
      nullable: false
      pii: false
      description: Enterprise product code that produced or owns this revenue aggregate.
    - name: source_product_id
      type: string
      nullable: false
      pii: false
      description: Business product that originated the billed product or service.
    - name: dataset_snapshot_id
      type: string
      nullable: false
      pii: false
      description: Immutable snapshot identifier used for finance close and audit evidence.
    - name: revenue_daily_id
      type: string
      nullable: false
      pii: false
      description: Deterministic daily revenue aggregate row id.
    - name: org_id
      type: uuid
      nullable: false
      pii: false
      description: Organization boundary used for tenant isolation.
    - name: report_date
      type: date
      nullable: false
      pii: false
      description: Report date for semantic metric time slicing.
    - name: accounting_date
      type: date
      nullable: false
      pii: false
      description: Finance accounting date used for revenue reporting.
    - name: product_line
      type: string
      nullable: false
      pii: false
      description: Finance product line or revenue stream grouping.
    - name: currency
      type: string
      nullable: false
      pii: false
      description: ISO-4217 currency code.
    - name: transaction_count
      type: long
      nullable: false
      pii: false
      description: Number of billing transactions in the aggregate.
    - name: invoice_count
      type: long
      nullable: false
      pii: false
      description: Number of distinct invoices represented in the aggregate.
    - name: gross_amount_cents
      type: long
      nullable: false
      pii: false
      description: Gross billing amount in minor currency units.
    - name: discount_amount_cents
      type: long
      nullable: false
      pii: false
      description: Discount amount in minor currency units.
    - name: tax_amount_cents
      type: long
      nullable: false
      pii: false
      description: Tax amount in minor currency units.
    - name: refund_amount_cents
      type: long
      nullable: false
      pii: false
      description: Refund amount in minor currency units.
    - name: net_revenue_cents
      type: long
      nullable: false
      pii: false
      description: Net revenue in minor currency units after discounts and refunds.
    - name: recognized_revenue_cents
      type: long
      nullable: false
      pii: false
      description: Revenue recognized for the accounting date in minor currency units.
    - name: deferred_revenue_cents
      type: long
      nullable: false
      pii: false
      description: Revenue deferred beyond the accounting date in minor currency units.
    - name: pending_transaction_count
      type: long
      nullable: false
      pii: false
      description: Number of pending billing transactions in the aggregate.
    - name: failed_transaction_count
      type: long
      nullable: false
      pii: false
      description: Number of failed billing transactions in the aggregate.
    - name: reversed_transaction_count
      type: long
      nullable: false
      pii: false
      description: Number of refunded, chargeback or reversed transactions in the aggregate.
    - name: revenue_status
      type: string
      nullable: false
      pii: false
      description: Aggregate revenue health for the grain.
      allowedValues: [CLOSED, PENDING_SOURCE, EXCEPTION]
    - name: source_record_hash_sha256
      type: string
      nullable: false
      pii: false
      description: Deterministic hash of input source record hashes represented by this aggregate.
    - name: built_at
      type: timestamp
      nullable: false
      pii: false
      description: Time the Gold snapshot was built.
    - name: quality_passed
      type: boolean
      nullable: false
      pii: false
      description: Whether row passed structural Gold quality checks.

quality:
  freshnessSloMinutes: 240
  checks:
    - name: revenue_daily_id_not_null
      type: not_null
      column: revenue_daily_id
    - name: snapshot_id_not_null
      type: not_null
      column: dataset_snapshot_id
    - name: revenue_daily_unique
      type: unique
      columns: [dataset_snapshot_id, revenue_daily_id]
    - name: revenue_status_allowed
      type: accepted_values
      column: revenue_status
      values: [CLOSED, PENDING_SOURCE, EXCEPTION]
    - name: net_revenue_available
      type: not_null
      column: net_revenue_cents
    - name: gold_snapshot_freshness
      type: freshness
      column: built_at

privacy:
  classification: CONFIDENTIAL
  dataResidency: REGION_CONTROLLED
  containsPii: false
  tenantIsolation: REQUIRED
  retentionDays: 2555
  erasureSupported: false
  subjectKeys: []
  erasureMode: NONE
  legalHoldPolicy: regulated_legal_hold_check
  rawPayloadPolicy: NO_RAW_PAYLOAD

serving:
  consumers: [DataPlatform, BI, Compliance, Reporting]
  accessPolicy: row_level_org_isolation
  accessPersonas: [DataPlatformOperator, DomainDataOwner, ApprovedBIConsumer, ComplianceConsumer, ExecutiveConsumer]
  consumerContract: catalog_registered_access_request_required
  publicationGate: quality_checks_must_pass

lineage:
  catalog: DataHub
  lineageRequired: true
