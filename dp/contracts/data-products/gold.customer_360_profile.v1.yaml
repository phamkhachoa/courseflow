contractVersion: 1
dataProduct:
  name: gold.customer_360_profile
  layer: GOLD
  domain: customer
  product: crm-sales
  domainOwner: customer-domain-council
  ownerTeam: data-platform
  businessOwner: customer-success-po
  technicalOwner: senior-data-platform
  dataSteward: enterprise-data-steward
  description: Business-ready customer profile snapshot for account health, lifecycle analytics, ML features and controlled activation.
  status: ACTIVE
  deprecationPolicy: 180_day_notice_and_dual_publish_for_breaking_changes

source:
  upstream:
    - name: silver.customer_identity_link
      type: lakehouse_table
      contractVersion: 1
  ingestionMode: batch
  eventTimeColumn: report_date

schema:
  columns:
    - name: product_id
      type: string
      nullable: false
      pii: false
      description: Product that produced the source account signal.
    - name: dataset_snapshot_id
      type: string
      nullable: false
      pii: false
      description: Immutable snapshot identifier used for audit and release evidence.
    - name: customer_profile_id
      type: string
      nullable: false
      pii: false
      description: Deterministic customer profile row id.
    - name: org_id
      type: uuid
      nullable: false
      pii: false
      description: Organization boundary used for tenant isolation.
    - name: report_date
      type: date
      nullable: false
      pii: false
      description: Reporting date for the customer profile observation.
    - name: account_id
      type: string
      nullable: false
      pii: false
      description: Product-local account identifier used for controlled reverse ETL and lineage.
    - name: customer_id_hash
      type: string
      nullable: false
      pii: true
      description: Tokenized customer subject identifier.
    - name: external_account_id_hash
      type: string
      nullable: false
      pii: true
      description: Tokenized external account identifier.
    - name: account_type
      type: string
      nullable: false
      pii: false
      description: Account category.
      allowedValues: [BUSINESS, INDIVIDUAL, PUBLIC_SECTOR, PARTNER, UNKNOWN]
    - name: lifecycle_stage
      type: string
      nullable: false
      pii: false
      description: Customer lifecycle stage.
      allowedValues: [PROSPECT, TRIAL, ACTIVE_CUSTOMER, EXPANSION, RENEWAL, DORMANT, CHURNED]
    - name: account_status
      type: string
      nullable: false
      pii: false
      description: Current account state.
      allowedValues: [ACTIVE, INACTIVE, TRIAL, AT_RISK, CHURNED, SUSPENDED]
    - name: market_segment
      type: string
      nullable: false
      pii: false
      description: Commercial segment for reporting and routing.
    - name: region_code
      type: string
      nullable: false
      pii: false
      description: Region or sales territory code.
    - name: consent_status
      type: string
      nullable: false
      pii: false
      description: Consent state for analytics and activation use.
      allowedValues: [OPTED_IN, OPTED_OUT, UNKNOWN, NOT_APPLICABLE]
    - name: health_score
      type: int
      nullable: false
      pii: false
      description: Normalized customer health score.
    - name: engagement_score
      type: int
      nullable: false
      pii: false
      description: Normalized engagement score.
    - name: revenue_signal_cents
      type: long
      nullable: false
      pii: false
      description: Revenue signal in minor currency units.
    - name: open_opportunity_count
      type: int
      nullable: false
      pii: false
      description: Number of open revenue opportunities.
    - name: open_support_case_count
      type: int
      nullable: false
      pii: false
      description: Number of open support cases known to the source.
    - name: product_usage_score
      type: int
      nullable: false
      pii: false
      description: Normalized product usage score.
    - name: risk_level
      type: string
      nullable: false
      pii: false
      description: Source account risk level.
      allowedValues: [LOW, MEDIUM, HIGH, CRITICAL]
    - name: profile_status
      type: string
      nullable: false
      pii: false
      description: Customer profile health status for account teams and scorecards.
      allowedValues: [HEALTHY, WATCH, RISK, CHURNED]
    - name: source_coverage_count
      type: int
      nullable: false
      pii: false
      description: Count of contributing source products represented in this first profile snapshot.
    - name: source_event_id
      type: uuid
      nullable: false
      pii: false
      description: Original source event id for lineage.
    - name: source_customer_identity_link_id
      type: string
      nullable: false
      pii: false
      description: Silver identity link row id used to build this Gold row.
    - name: last_signal_at
      type: timestamp
      nullable: false
      pii: false
      description: Latest source signal timestamp represented by this profile.
    - name: built_at
      type: timestamp
      nullable: false
      pii: false
      description: Time the Gold snapshot was built.
    - name: quality_passed
      type: boolean
      nullable: false
      pii: false
      description: Whether row passed structural Gold quality checks.

quality:
  freshnessSloMinutes: 240
  checks:
    - name: customer_profile_id_not_null
      type: not_null
      column: customer_profile_id
    - name: customer_id_hash_not_null
      type: not_null
      column: customer_id_hash
    - name: org_id_not_null
      type: not_null
      column: org_id
    - name: profile_status_allowed
      type: accepted_values
      column: profile_status
      values: [HEALTHY, WATCH, RISK, CHURNED]
    - name: customer_profile_snapshot_unique
      type: unique
      columns: [dataset_snapshot_id, customer_id_hash, report_date]
    - name: customer_profile_snapshot_freshness
      type: freshness
      column: built_at

privacy:
  classification: PII
  dataResidency: REGION_CONTROLLED
  containsPii: true
  tenantIsolation: REQUIRED
  retentionDays: 1095
  erasureSupported: true
  subjectKeys:
    - name: customer_id_hash
      column: customer_id_hash
      type: tokenized_subject_id
      required: true
  erasureMode: SUBJECT_DELETE
  legalHoldPolicy: standard_legal_hold_check
  rawPayloadPolicy: NO_RAW_PAYLOAD

serving:
  consumers: [BI, ML, ReverseETL]
  accessPolicy: row_level_org_isolation
  accessPersonas: [DataPlatformOperator, DomainDataOwner, ApprovedBIConsumer, ApprovedMLConsumer]
  consumerContract: catalog_registered_access_request_required
  publicationGate: quality_checks_must_pass

lineage:
  catalog: DataHub
  lineageRequired: true
