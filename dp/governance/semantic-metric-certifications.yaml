version: 1
registry_scope: group-enterprise-data-platform
owner: enterprise-reporting
description: >
  Maker-checker certification ledger for governed semantic metrics. A metric may be marked
  certified in platform/serving/semantic-metrics.yaml only when this registry has an approved
  certification covering its formula, source lineage, quality dependencies, diff and impact.
certifications:
  - certificationId: certify_finance_metrics_20260617
    status: approved
    changeType: initial_certification
    metricIds:
      - revenue_net
      - revenue_gross
      - recognized_revenue_amount
      - deferred_revenue_amount
      - refund_amount
      - billing_transaction_count
      - committed_discount_amount
      - points_earned
      - points_reversed
      - unreconciled_benefit_count
      - benefit_reconciliation_gap
    requestedBy: finance-analytics-po
    requestedAt: "2026-06-17T09:00:00Z"
    approvedBy: enterprise-data-steward
    approvedAt: "2026-06-17T10:00:00Z"
    approverRole: data_steward
    reason: Finance and reconciliation KPIs are required for enterprise executive scorecard and benefit settlement review.
    evidence:
      metricOwnerApprovalUri: governance://semantic-metrics/finance/owner-approval-20260617
      formulaReviewUri: governance://semantic-metrics/finance/formula-review-20260617
      sourceLineageUri: governance://semantic-metrics/finance/source-lineage-20260617
      qualityDependencyUri: governance://semantic-metrics/finance/quality-dependencies-20260617
      impactAnalysisUri: governance://semantic-metrics/finance/impact-analysis-20260617
    diff:
      baseline: no_prior_certification
      changedFields:
        - status
        - source
        - grain
        - dimensions
        - calculation
        - filters
        - serving
      impactSummary: Initial certification of finance metrics over revenue and benefit reconciliation Gold products.
    impact:
      useCases:
        - enterprise-kpi-scorecard
        - enterprise-revenue-intelligence
        - finance-benefit-reconciliation
      consumers:
        - ApprovedBIConsumer
        - ComplianceConsumer
        - DomainDataOwner
        - ExecutiveConsumer
      sourceDataProducts:
        - gold.finance_benefit_reconciliation
        - gold.finance_revenue_daily

