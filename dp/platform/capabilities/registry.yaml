version: 1
registry_scope: group-enterprise-data-platform
target_maturity:
  P0: L3
  P1: L2
  P2: L1
reference_models:
  - id: apache-iceberg
    name: Apache Iceberg table specification
    url: https://iceberg.apache.org/spec/
    adoptedPattern: Open table format with snapshots, manifests, schema evolution and partition evolution.
  - id: openlineage
    name: OpenLineage object model
    url: https://openlineage.io/docs/spec/object-model/
    adoptedPattern: Runtime lineage modeled as jobs, runs and datasets with extensible facets.
  - id: datahub
    name: DataHub metadata platform
    url: https://docs.datahub.com/docs/features
    adoptedPattern: Discovery, lineage, profiling, governance, data contracts and collaborative metadata.
  - id: dagster-assets
    name: Dagster software-defined assets
    url: https://dagster.io/glossary/software-defined-assets
    adoptedPattern: Orchestration should model produced assets, dependencies and materialization state.
  - id: kafka-connect
    name: Apache Kafka Connect
    url: https://kafka.apache.org/documentation/
    adoptedPattern: Reusable source and sink connector model for enterprise event movement.
  - id: dbt-semantic-layer
    name: dbt Semantic Layer
    url: https://docs.getdbt.com/docs/use-dbt-semantic-layer/dbt-sl
    adoptedPattern: Centralized, governed metric definitions for consistent downstream consumption.
  - id: feast-feature-store
    name: Feast feature store
    url: https://docs.feast.dev/
    adoptedPattern: Production ML feature definition, validation and online/offline serving.
  - id: great-expectations
    name: Great Expectations checkpoints
    url: https://docs.greatexpectations.io/docs/reference/api/Checkpoint_class
    adoptedPattern: Production data validation checkpoints with validation results and actions.

capabilities:
  - id: source-onboarding
    name: Product Source Onboarding
    category: ingestion
    phase: P0
    owner: data-platform-team
    status: validated_as_code
    currentLevel: L1
    targetLevel: L3
    productAgnostic: true
    description: Register product sources, ownership, canonical topics, bridge mode, privacy and production evidence requirements.
    enterpriseOutcome: Every product joins the foundation through the same governed source path.
    platformScope:
      - product onboarding
      - source inventory
      - canonical topic mapping
      - source readiness
    referenceModels:
      - kafka-connect
      - datahub
    domainBindings:
      - finance
      - customer
      - ml-ai
      - enterprise-reporting
    useCaseBindings:
      - finance-benefit-reconciliation
      - ml-feature-governance
      - customer-account-health
    productionGates:
      - source_readiness_report_passed
      - schema_subject_registered
      - replay_proof_attached
      - change_control_approved
    requiredEvidence:
      - source registry entry
      - product onboarding metadata
      - source-to-Bronze readiness report
      - change-control evidence
    evidenceArtifacts:
      - path: products/README.md
        type: product_onboarding_standard
        purpose: Defines the repeatable product onboarding boundary.
        requiredForCurrentLevel: true
      - path: platform/ingestion/source-registry.yaml
        type: source_registry
        purpose: Registers source systems, canonical topics and production evidence requirements.
        requiredForCurrentLevel: true
      - path: src/enterprise_dp/source_registry.py
        type: validator
        purpose: Emits and validates source readiness evidence.
        requiredForCurrentLevel: true
    gaps:
      - Production connector runtime is not deployed as live infrastructure.
      - Several pilot sources still depend on planned bridges or normalizers.
    nextMilestones:
      - Deploy staging source connector and registry integration for one non-LMS product.
      - Require source readiness evidence before enabling production Bronze ingestion.

  - id: event-cdc-ingestion-runtime
    name: Event and CDC Ingestion Runtime
    category: ingestion
    phase: P0
    owner: data-platform-team
    status: integrated_runtime
    currentLevel: L2
    targetLevel: L3
    productAgnostic: true
    description: Live Kafka, outbox, CDC and batch connector runtime for Bronze source movement.
    enterpriseOutcome: Product data moves into the foundation reliably without direct OLTP reads by BI or ML.
    platformScope:
      - Kafka topics
      - outbox relay
      - Debezium CDC
      - connector operations
    referenceModels:
      - kafka-connect
      - openlineage
    domainBindings:
      - finance
      - customer
      - product-analytics
      - workforce
    useCaseBindings:
      - finance-benefit-reconciliation
      - product-usage-funnel
      - workforce-training-compliance
    productionGates:
      - ingestion_lag_slo_green
      - dlt_policy_enabled
      - backpressure_test_passed
      - offset_ledger_recorded
      - control_tower_ingestion_runtime_passed
    requiredEvidence:
      - connector deployment manifest
      - lag metrics
      - DLT operations evidence
      - source offset ledger
    evidenceArtifacts:
      - path: platform/ingestion/event-cdc-ingestion-runtime.md
        type: production_gate_standard
        purpose: Defines the runtime evidence contract and P0 blocker rules.
        requiredForCurrentLevel: true
      - path: src/enterprise_dp/ingestion_runtime.py
        type: production_gate_cli
        purpose: Normalizes runtime exports into ingestion_runtime_evidence.v1 and produces event_cdc_ingestion_runtime_report.v1.
        requiredForCurrentLevel: true
      - path: src/enterprise_dp/control_tower.py
        type: control_tower_gate
        purpose: Blocks production signoff when ingestion runtime evidence is missing, mismatched or failing.
        requiredForCurrentLevel: true
      - path: tests/test_ingestion_runtime.py
        type: verification_suite
        purpose: Covers local preflight, production evidence, connector lag, DLT, backpressure and stale evidence gates.
        requiredForCurrentLevel: true
      - path: tests/test_control_tower.py
        type: verification_suite
        purpose: Covers Control Tower ingestion runtime blocker, environment mismatch and CLI attachment.
        requiredForCurrentLevel: true
      - path: platform/environments/prod/manifest.yaml
        type: environment_manifest
        purpose: Declares required production runtime services and current readiness.
        requiredForCurrentLevel: true
      - path: platform/ingestion/local-bronze-ingestion.md
        type: local_preflight
        purpose: Documents local ingestion flow before live runtime exists.
        requiredForCurrentLevel: true
      - path: src/enterprise_dp/event_backbone_smoke.py
        type: local_runtime_smoke
        purpose: Starts local Redpanda, produces and consumes contracted finance events, then feeds consumed records into the data-plane smoke.
        requiredForCurrentLevel: true
      - path: tests/test_event_backbone_smoke.py
        type: verification_suite
        purpose: Covers local Redpanda round-trip evidence generation and downstream data-plane smoke binding.
        requiredForCurrentLevel: true
      - path: platform/runtime/local-event-backbone-smoke.md
        type: local_runtime_runbook
        purpose: Documents the local Redpanda event-backbone smoke and remaining production connector gaps.
        requiredForCurrentLevel: true
    gaps:
      - Local Redpanda round-trip is wired into make ci, but Kafka Connect/Debezium or transactional-outbox source connectors are not writing Bronze in a live runtime yet.
      - Runtime DLT, backpressure, ACL/topic and consumer lag evidence is not collected automatically from live monitoring yet.
      - Production manifest declares topology, but deployed connector runtime still needs live environment evidence for L3.
    nextMilestones:
      - Wire Kafka Connect, Debezium or transactional-outbox source connectors into Bronze ingestion and ingestion_runtime_evidence.v1 generation.
      - Attach broker ACL/topic, consumer lag, DLT, backpressure and Prometheus exporter evidence to the local runtime gate.
      - Attach live staging and production evidence to Control Tower signoff.

  - id: schema-registry-compatibility
    name: Schema Registry and Compatibility
    category: governance
    phase: P0
    owner: data-platform-team
    status: integrated_runtime
    currentLevel: L2
    targetLevel: L3
    productAgnostic: true
    description: Enforce event schema subjects, compatibility mode and producer or normalizer compliance.
    enterpriseOutcome: Source changes cannot silently break consumers or Bronze ingestion.
    platformScope:
      - JSON schema contracts
      - subject naming
      - backward-transitive compatibility
      - release evidence
    referenceModels:
      - kafka-connect
      - datahub
    domainBindings:
      - finance
      - recommendation
      - product-analytics
      - compliance
    useCaseBindings:
      - finance-benefit-reconciliation
      - ml-feature-governance
      - product-usage-funnel
    productionGates:
      - schema_registry_report_passed
      - producer_schema_id_present
      - backward_transitive_ci_passed
      - schema_registry_ops_passed
    requiredEvidence:
      - topic contract
      - payload schema
      - compatibility report
      - schema registry operations report
      - schema registry publication manifest
      - external attestation for production
    evidenceArtifacts:
      - path: platform/ingestion/schema-registry.md
        type: standard
        purpose: Defines subject naming and compatibility policy.
        requiredForCurrentLevel: true
      - path: src/enterprise_dp/schema_registry.py
        type: production_gate_cli
        purpose: Produces local compatibility and production schema registry ops reports with signed attestation checks.
        requiredForCurrentLevel: true
      - path: tests/test_schema_registry.py
        type: verification_suite
        purpose: Covers local compatibility, production publication evidence, producer enforcement and attestation gates.
        requiredForCurrentLevel: true
      - path: src/enterprise_dp/schema_registry_runtime_smoke.py
        type: local_runtime_smoke
        purpose: Starts local Apicurio Registry, publishes topic payload schemas through the Confluent-compatible v7 API and verifies read-back hashes.
        requiredForCurrentLevel: true
      - path: tests/test_schema_registry_runtime_smoke.py
        type: verification_suite
        purpose: Covers Apicurio publication/read-back success and read-back hash mismatch failure handling.
        requiredForCurrentLevel: true
      - path: tests/test_control_tower.py
        type: verification_suite
        purpose: Proves Control Tower consumes schema_registry_ops_report.v1 as a P0 production gate.
        requiredForCurrentLevel: true
      - path: contracts/event-envelope.v1.schema.json
        type: schema
        purpose: Shared enterprise event envelope.
        requiredForCurrentLevel: true
      - path: platform/control-tower/README.md
        type: operating_model
        purpose: Defines schema registry operations as a Control Tower P0 blocker.
        requiredForCurrentLevel: true
    gaps:
      - Local Apicurio Confluent-compatible publication and read-back are wired into make ci, but production registry authentication, authorization, HA storage and signed attestation are not deployed.
      - Producer-side schema id enforcement is not collected from live producers; rpk schema-id encoding still needs registry root/proxy or native registry configuration.
      - Broker/sink validation is evidence-backed, not collected from live ingestion runtime yet.
    nextMilestones:
      - Configure a Confluent-compatible registry root/proxy or native Redpanda registry path so live producers can use rpk --schema-id in runtime smoke.
      - Collect producer schema id and broker/sink rejection evidence from live ingestion runtime.
      - Deploy production registry auth/RBAC, HA storage, backup and signed publication attestation.
      - Enforce schema_registry_ops_report.v1 in release promotion for staging/prod.

  - id: bronze-lakehouse-evidence
    name: Bronze Lakehouse Evidence
    category: lakehouse
    phase: P0
    owner: data-platform-team
    status: validated_as_code
    currentLevel: L1
    targetLevel: L3
    productAgnostic: true
    description: Immutable Bronze records with source-position idempotency, hashes and offset ledger binding.
    enterpriseOutcome: Every landed record is replayable, auditable and tied to source positions.
    platformScope:
      - Bronze landing
      - source offset ledger
      - replay idempotency
      - quarantine evidence
    referenceModels:
      - apache-iceberg
      - openlineage
    domainBindings:
      - finance
      - recommendation
      - product-analytics
      - compliance
    useCaseBindings:
      - finance-benefit-reconciliation
      - ml-feature-governance
    productionGates:
      - source_offset_ledger_passed
      - quarantine_rows_within_policy
      - iceberg_commit_evidence_present
      - bronze_lakehouse_ops_passed
    requiredEvidence:
      - Bronze ingestion manifest
      - source offset ledger
      - source record hash bindings
      - quarantine summary
      - Bronze lakehouse maintenance evidence
    evidenceArtifacts:
      - path: platform/lakehouse/bronze-lakehouse-ops.md
        type: production_gate_standard
        purpose: Defines Bronze lakehouse ops report and maintenance evidence requirements.
        requiredForCurrentLevel: true
      - path: platform/ingestion/bronze-landing.md
        type: standard
        purpose: Defines Bronze landing and PII handling rules.
        requiredForCurrentLevel: true
      - path: platform/ingestion/source-offset-hash-idempotency.md
        type: standard
        purpose: Defines source offset and hash idempotency policy.
        requiredForCurrentLevel: true
      - path: src/enterprise_dp/offset_ledger.py
        type: evidence_cli
        purpose: Emits source offset ledger evidence.
        requiredForCurrentLevel: true
      - path: src/enterprise_dp/lakehouse_ops.py
        type: production_gate_cli
        purpose: Emits Bronze lakehouse operations report from offset ledgers and maintenance evidence.
        requiredForCurrentLevel: true
      - path: tests/test_lakehouse_ops.py
        type: verification_suite
        purpose: Covers local preflight, production-like ledger and maintenance gates.
        requiredForCurrentLevel: true
      - path: tests/test_control_tower.py
        type: verification_suite
        purpose: Covers Control Tower Bronze lakehouse blocker, environment mismatch and CLI attachment.
        requiredForCurrentLevel: true
    gaps:
      - Iceberg sink runtime is not yet deployed as live staging or production infrastructure.
      - Append-only enforcement and compaction can be checked from evidence artifacts but are not emitted by live runtime yet.
    nextMilestones:
      - Persist offset ledger and Bronze maintenance evidence to immutable evidence storage.
      - Connect live Bronze commits to Iceberg metadata snapshots and table maintenance exporters.
      - Enforce bronze_lakehouse_ops_report.v1 in CI/CD and release promotion for staging/prod.

  - id: silver-gold-publication
