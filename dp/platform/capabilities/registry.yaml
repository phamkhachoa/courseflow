      - Great Expectations, Soda or dbt runtime artifacts are evidence-contract backed, not emitted by live production jobs yet.
      - Alerting, incident burn-rate and paging state are evidence-contract backed, not pulled from live SRE systems yet.
      - CI/CD and release promotion do not yet require quality_slo_release_gates_ops_report.v1.
    nextMilestones:
      - Wire Great Expectations/Soda/dbt runtime exporters to quality_runtime_evidence.v1.
      - Wire Prometheus/Alertmanager/SRE exports to slo_alert_evidence.v1.
      - Enforce quality_slo_release_gates_ops_report.v1 in CI/CD and release promotion for staging/prod.

