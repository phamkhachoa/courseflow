      - Live staging or production orchestration does not yet emit immutable publication ops evidence from actual release jobs.
      - Active pointer and rollback checks are evidence-backed, but not enforced by CI/CD or production exposure controls.
      - Catalog/Iceberg active snapshot drift is not collected directly from live serving runtime.
    nextMilestones:
      - Persist active pointer state and publication reports to immutable evidence storage.
      - Connect publication ops to live Iceberg/catalog active snapshot exports.
      - Enforce silver_gold_publication_ops_report.v1 in CI/CD and release promotion for staging/prod.

  - id: catalog-lineage-control-plane
    name: Catalog and Lineage Control Plane
    category: catalog_lineage
    phase: P0
    owner: data-platform-team
    status: validated_as_code
    currentLevel: L1
    targetLevel: L3
    productAgnostic: true
    description: Publish metadata, lineage, ownership and runtime evidence into the enterprise catalog.
    enterpriseOutcome: Users can discover trusted data and understand upstream/downstream impact.
    platformScope:
      - catalog bundle
      - OpenLineage export
      - publish manifest
      - owner and steward metadata
    referenceModels:
      - datahub
      - openlineage
    domainBindings:
      - finance
      - enterprise-reporting
      - compliance
      - ml-ai
    useCaseBindings:
      - finance-benefit-reconciliation
      - enterprise-kpi-scorecard
      - ml-feature-governance
    productionGates:
      - catalog_publish_manifest_passed
      - catalog_lineage_ops_passed
      - lineage_edges_complete
      - owner_steward_visible
    requiredEvidence:
      - catalog bundle
      - OpenLineage events
      - catalog publish manifest
      - catalog lineage operations report
      - publish receipt for production-like environments
      - change-control evidence
    evidenceArtifacts:
      - path: platform/lineage/catalog-lineage-ops.md
        type: production_gate_standard
        purpose: Defines catalog lineage ops report, publish receipt and Control Tower blocker rules.
        requiredForCurrentLevel: true
      - path: src/enterprise_dp/catalog.py
        type: catalog_export
        purpose: Exports catalog and lineage metadata from contracts and manifests.
        requiredForCurrentLevel: true
      - path: src/enterprise_dp/openlineage.py
        type: lineage_export
        purpose: Exports OpenLineage-style runtime events.
        requiredForCurrentLevel: true
      - path: src/enterprise_dp/catalog_publish.py
        type: publish_manifest
        purpose: Produces auditable DataHub/OpenMetadata publish manifest.
        requiredForCurrentLevel: true
      - path: src/enterprise_dp/catalog_lineage_ops.py
        type: production_gate_cli
        purpose: Emits catalog_lineage_ops_report.v1 from catalog, publish, OpenLineage and publish receipt evidence.
        requiredForCurrentLevel: true
      - path: src/enterprise_dp/control_tower.py
        type: data_product_control_tower_report
        purpose: Aggregates catalog lineage ops, quality, access, release and capability evidence into a production-readiness decision report.
        requiredForCurrentLevel: true
      - path: tests/test_catalog_lineage_ops.py
        type: verification_suite
        purpose: Covers local preflight, production-like missing evidence, invalid OpenLineage and CLI behavior.
        requiredForCurrentLevel: true
      - path: tests/test_control_tower.py
        type: verification_suite
        purpose: Covers Control Tower catalog lineage ops blocker, hash drift, CLI attachment and Gold lineage materialization.
        requiredForCurrentLevel: true
      - path: platform/control-tower/README.md
        type: operating_model
        purpose: Defines the Data Product Control Tower operating view, personas, gates and escalation model.
        requiredForCurrentLevel: true
    gaps:
      - Catalog publish and publish receipt are artifact-backed, not emitted by live DataHub/OpenMetadata jobs.
      - OpenLineage events are generated from saved manifests, not collected from a live orchestrator or collector.
      - Catalog visibility in a real UI is not proven by the local ops report.
    nextMilestones:
      - Push catalog bundle to DataHub or OpenMetadata in staging and persist catalog_publish_receipt.v1.
      - Collect OpenLineage events from actual orchestration jobs and validate collector receipt evidence.
      - Enforce catalog_lineage_ops_report.v1 in CI/CD and release promotion for staging/prod.

  - id: quality-slo-release-gates
