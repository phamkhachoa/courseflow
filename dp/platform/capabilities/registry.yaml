    phase: P0
    owner: data-platform-team
    status: validated_as_code
    currentLevel: L1
    targetLevel: L3
    productAgnostic: true
    description: Data quality profiles, freshness, ingestion lag, evidence profile and release gate decisions.
    enterpriseOutcome: Bad, stale or unevidenced data cannot become active enterprise data.
    platformScope:
      - quality profiles
      - freshness SLO
      - release evidence profiles
      - operations runbooks
    referenceModels:
      - great-expectations
      - dagster-assets
    domainBindings:
      - finance
      - ml-ai
      - enterprise-reporting
      - risk-compliance
    useCaseBindings:
      - finance-benefit-reconciliation
      - ml-feature-governance
      - risk-control-exception-monitoring
    productionGates:
      - quality_profile_passed
      - ingestion_lag_slo_green
      - freshness_slo_green
      - release_evidence_profile_passed
      - quality_slo_release_gates_ops_passed
    requiredEvidence:
      - quality profile
      - release evidence profile
      - release evidence report
      - quality/SLO release gates operations report
      - runtime quality evidence
      - SLO alert evidence
      - SLO runbook
    evidenceArtifacts:
      - path: platform/quality/profiles.yaml
        type: quality_profile_registry
        purpose: Defines reusable quality gates by use case and output.
        requiredForCurrentLevel: true
      - path: platform/observability/production-slo-release-gates.md
        type: release_gate_spec
        purpose: Defines P0 SLO and release gate policy.
        requiredForCurrentLevel: true
      - path: platform/observability/quality-slo-release-gates-ops.md
        type: operations_gate_spec
        purpose: Defines the quality_slo_release_gates_ops_report.v1 artifact and runtime evidence contracts.
        requiredForCurrentLevel: true
      - path: src/enterprise_dp/release.py
        type: release_gate_engine
        purpose: Evaluates release evidence gates.
        requiredForCurrentLevel: true
      - path: src/enterprise_dp/quality_slo_ops.py
        type: operations_gate_engine
        purpose: Builds artifact-backed quality/SLO release gates operations reports for Control Tower.
        requiredForCurrentLevel: true
      - path: tests/test_quality_slo_ops.py
        type: automated_tests
        purpose: Proves local/prod evidence behavior, runtime freshness, writer and CLI behavior.
        requiredForCurrentLevel: true
      - path: tests/test_control_tower.py
        type: automated_tests
        purpose: Proves Control Tower consumes the quality/SLO ops report as a P0 production gate.
        requiredForCurrentLevel: true
