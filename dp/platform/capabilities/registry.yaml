      - silver_gold_publication_ops_passed
    requiredEvidence:
      - pipeline manifest
      - lakehouse snapshot evidence
      - release evidence
      - activation manifest
      - active pointer state
      - rollback target evidence
    evidenceArtifacts:
      - path: platform/lakehouse/silver-gold-publication-ops.md
        type: production_gate_standard
        purpose: Defines Silver/Gold publication ops report, active pointer and rollback requirements.
        requiredForCurrentLevel: true
      - path: src/enterprise_dp/snapshot_evidence.py
        type: evidence_cli
        purpose: Binds Silver and Gold outputs to Iceberg snapshot metadata.
        requiredForCurrentLevel: true
      - path: src/enterprise_dp/promotion.py
        type: activation_cli
        purpose: Writes promotion and activation manifests with active pointer state.
        requiredForCurrentLevel: true
      - path: src/enterprise_dp/publication_ops.py
        type: production_gate_cli
        purpose: Emits silver_gold_publication_ops_report.v1 from release, promotion, activation and active pointer evidence.
        requiredForCurrentLevel: true
      - path: src/enterprise_dp/control_tower.py
        type: control_tower_gate
        purpose: Blocks production signoff when Silver/Gold publication evidence is missing, mismatched or failing.
        requiredForCurrentLevel: true
      - path: platform/lakehouse/iceberg-table-standards.md
        type: standard
        purpose: Defines Iceberg table, partition and retention standards.
        requiredForCurrentLevel: true
      - path: tests/test_publication_ops.py
        type: verification_suite
