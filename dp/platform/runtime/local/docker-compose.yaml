name: enterprise-dp-local

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.8
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - INTERNAL://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - INTERNAL://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q Healthy"]
      interval: 10s
      timeout: 5s
      retries: 12

  schema-registry:
    image: apicurio/apicurio-registry-mem:2.6.5.Final
    ports:
      - "18082:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: enterprise_dp_local
      MINIO_ROOT_PASSWORD: enterprise_dp_local_only_change_me
      MINIO_KMS_SECRET_KEY: local-sse-key:ZW50ZXJwcmlzZS1kcC1sb2NhbC1zc2Uta2V5LTMyYiE=
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - dp-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  iceberg-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: iceberg
      POSTGRES_PASSWORD: iceberg_local_only_change_me
      POSTGRES_DB: iceberg
    ports:
      - "15432:5432"
    volumes:
      - dp-iceberg-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iceberg -d iceberg"]
      interval: 10s
      timeout: 5s
      retries: 12

  source-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dp_source
      POSTGRES_PASSWORD: dp_source_local_only_change_me
      POSTGRES_DB: source_runtime
    ports:
      - "15433:5432"
    volumes:
      - dp-source-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dp_source -d source_runtime"]
      interval: 10s
      timeout: 5s
      retries: 12

  trino:
    image: trinodb/trino:454
    ports:
      - "18081:8080"
    volumes:
      - ./trino/access-control.properties:/etc/trino/access-control.properties:ro
      - ./trino/access-control-rules.json:/etc/trino/access-control-rules.json:ro
      - ./trino/catalog/iceberg.properties:/etc/trino/catalog/iceberg.properties:ro
    depends_on:
      minio:
        condition: service_healthy
      iceberg-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/v1/info || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "19090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  dp-runner:
    image: python:3.11-slim
    command: ["sleep", "infinity"]
    working_dir: /workspace/dp
    volumes:
      - ../../../:/workspace/dp:ro
    depends_on:
      redpanda:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  dp-minio-data:
  dp-iceberg-postgres-data:
  dp-source-postgres-data:
