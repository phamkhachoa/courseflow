version: 1
platform: enterprise-data-platform
owner: data-platform-team
scope: group_enterprise
topologyStatus: validated_as_code_not_live_deployed
readinessClaim: L1 topology, environment bindings and IaC profile metadata are validated as code.
environments:
  - environment: local
    manifest: platform/environments/local/manifest.yaml
    iacProfile: local-compose
    runtimeReadiness: local_preflight_only
    evidenceMode: developer_feedback
    deploymentMode: single_developer_container_stack
  - environment: staging
    manifest: platform/environments/staging/manifest.yaml
    iacProfile: staging-opentofu
    runtimeReadiness: topology_manifested_not_live_iac
    evidenceMode: production_like_preflight
    deploymentMode: production_like_private_network
  - environment: prod
    manifest: platform/environments/prod/manifest.yaml
    iacProfile: prod-opentofu
    runtimeReadiness: topology_manifested_not_live_iac
    evidenceMode: production_signoff
    deploymentMode: production_private_network
runtimeServices:
  - serviceId: event_backbone
    capability: Event backbone
    technology: Kafka-compatible event backbone
    phase: P0
    p0Required: true
    runtimeRole: data_plane
    iacModule: event-backbone
    haMode: multi_az_required_in_prod
    drTier: tier1
    stateful: true
    backupRequired: true
    dataClass: enterprise_event_stream
    networkZone: private_platform_network
    identityMode: service_account_oidc
    secretsMode: external_secret_reference
    adoptionDecision: adopted_p0
    evidenceKinds:
      - broker_health
      - topic_acl
      - consumer_lag
    environmentOverrides:
      local:
        technology: Kafka-compatible local broker
        implementationStatus: local_emulated
        evidence: local broker health and topic listing
      staging:
        technology: Kafka
        implementationStatus: planned_managed_or_self_hosted
        evidence: broker health, topic ACL and consumer lag report
      prod:
        technology: Kafka
        implementationStatus: planned_managed_or_self_hosted
        evidence: broker health, topic ACL and consumer lag report
  - serviceId: outbox_relay
    capability: Transactional event publishing
    technology: Outbox relay pattern
    phase: P0
    p0Required: true
    runtimeRole: data_plane
    iacModule: outbox-relay
    haMode: active_active_required_in_prod
    drTier: tier1
    stateful: false
    backupRequired: false
    dataClass: product_transactional_event_bridge
    networkZone: private_product_network
    identityMode: service_account_oidc
    secretsMode: external_secret_reference
    adoptionDecision: adopted_p0
    evidenceKinds:
      - relay_deployment
      - replay_proof
      - idempotency_report
    environmentOverrides:
      local:
        technology: Outbox relay pattern
        implementationStatus: local_contract_only
        evidence: product outbox bridge or fixture replay evidence
      staging:
        technology: Outbox relay pattern
        implementationStatus: planned_product_bridge
        evidence: source outbox relay deployment and replay proof
      prod:
        technology: Outbox relay pattern
        implementationStatus: planned_product_bridge
        evidence: source outbox relay deployment and replay proof
  - serviceId: cdc
    capability: Change data capture
    technology: Debezium-compatible connector runtime
    phase: P0
    p0Required: true
    runtimeRole: data_plane
    iacModule: cdc-connect
    haMode: restartable_workers_required_in_prod
    drTier: tier1
    stateful: true
    backupRequired: true
    dataClass: source_change_log
    networkZone: private_platform_network
    identityMode: service_account_oidc
    secretsMode: external_secret_reference
    adoptionDecision: adopted_p0
    evidenceKinds:
      - connector_status
      - source_offset
      - schema_history
    environmentOverrides:
      local:
        technology: Debezium-compatible connector
        implementationStatus: planned
        evidence: connector config validation before CDC-backed Bronze
      staging:
        technology: Debezium
        implementationStatus: planned_connector_runtime
        evidence: connector status, offset and schema history report
      prod:
        technology: Debezium
        implementationStatus: planned_connector_runtime
        evidence: connector status, offset and schema history report
  - serviceId: schema_registry
    capability: Schema registry
    technology: Apicurio or Confluent Schema Registry
    phase: P0
    p0Required: true
    runtimeRole: control_plane
    iacModule: schema-registry
    haMode: ha_required_in_prod
    drTier: tier1
    stateful: true
    backupRequired: true
    dataClass: schema_contract_metadata
    networkZone: private_platform_network
    identityMode: service_account_oidc
    secretsMode: external_secret_reference
    adoptionDecision: adopted_p0
    evidenceKinds:
      - subject_export
      - compatibility_report
      - registry_backup
    environmentOverrides:
      local:
        technology: Apicurio or Confluent-compatible registry
        implementationStatus: local_emulated
        evidence: subject registration and compatibility report
      staging:
        technology: Apicurio or Confluent Schema Registry
        implementationStatus: planned_managed_or_self_hosted
        evidence: compatibility report and subject version export
      prod:
        technology: Apicurio or Confluent Schema Registry
        implementationStatus: planned_managed_or_self_hosted
        evidence: compatibility report and subject version export
  - serviceId: object_storage
    capability: Object storage
    technology: S3/GCS/ADLS-compatible object storage
    phase: P0
    p0Required: true
    runtimeRole: data_plane
    iacModule: object-storage
    haMode: managed_regional_required_in_prod
    drTier: tier1
    stateful: true
    backupRequired: true
    dataClass: lakehouse_objects
    networkZone: private_storage_endpoint
    identityMode: workload_identity
    secretsMode: external_secret_reference
    adoptionDecision: adopted_p0
    evidenceKinds:
      - bucket_policy
      - lifecycle_policy
      - encryption_report
    environmentOverrides:
      local:
        technology: MinIO
        implementationStatus: local_emulated
        evidence: disposable lakehouse bucket
      staging:
        technology: S3/GCS/ADLS-compatible object storage
        implementationStatus: planned_managed_service
        evidence: bucket policy, lifecycle and encryption report
      prod:
        technology: S3/GCS/ADLS-compatible object storage
